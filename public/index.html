function addChat(role, text) {
  const ts = new Date().toLocaleTimeString([], { hour:"numeric", minute:"2-digit" });
  chatHistory.push({ role, text, ts });
  const c = document.getElementById("chatMessages");
  c.innerHTML = chatHistory.map(m => `<div class="chat-msg ${m.role}">${m.text}<div class="ts">${m.ts}</div></div>`).join("");
  c.scrollTop = c.scrollHeight;
}

function sendChat() {
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if (!text) return;
  addChat("user", text); input.value = ""; input.style.height = "40px";
  // Track any company/deal mentioned in user text for pronoun resolution
  trackMentionedCompany(text);
  if (handleLocalCommand(text)) return;
  // Fallback: send to AI for a response
  addChat("agent", `<div class="modal-loading" style="padding:0;"><div class="spin"></div>Thinking...</div>`);
  const thinkingIdx = chatHistory.length - 1;
  apiFetch('/api/ai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt: text }),
  }).then(r => r.json()).then(data => {
    const ts = new Date().toLocaleTimeString([], {hour:"numeric",minute:"2-digit"});
    let responseText = data.text || 'No response.';
    // Append action chips if an item is selected
    const selForChips = getSelected();
    if (selForChips) responseText += renderActionChips(selForChips);
    // Update both chatHistory and DOM
    if (chatHistory[thinkingIdx]) {
      chatHistory[thinkingIdx].text = responseText;
      chatHistory[thinkingIdx].ts = ts;
    }
    const c = document.getElementById("chatMessages");
    c.innerHTML = chatHistory.map(m => `<div class="chat-msg ${m.role}">${m.text}<div class="ts">${m.ts}</div></div>`).join("");
    c.scrollTop = c.scrollHeight;
  }).catch(() => {
    const fallback = `Try: <strong>draft</strong>, <strong>crm</strong>, <strong>proposal</strong>, <strong>prep</strong>, <strong>linkedin</strong>, or a company name.`;
    if (chatHistory[thinkingIdx]) chatHistory[thinkingIdx].text = fallback;
    const c = document.getElementById("chatMessages");
    c.innerHTML = chatHistory.map(m => `<div class="chat-msg ${m.role}">${m.text}<div class="ts">${m.ts}</div></div>`).join("");
    c.scrollTop = c.scrollHeight;
  });
}

// ═══════════════════════════════════════════════════════════════════
// INTENT-BASED COMMAND ROUTER
// ═══════════════════════════════════════════════════════════════════
const DEBUG_ROUTER = false; // Set to true to enable command routing debug logs in console

// State for entity tracking
let _lastEntitySource = null;
let _lastResolvedIntent = null;

// Canonical intent patterns — checked in priority order
const INTENT_PATTERNS = [
  // Status dispositions (highest priority)
  { intent: 'confirmed', pattern: /\b(on my calendar|scheduled|confirmed|already booked|meeting.?s? (set|booked|confirmed)|it.?s on|booked it)\b/ },
  { intent: 'already_done', pattern: /\b(already (replied|responded|emailed|sent)|i (replied|responded|sent)|wrote them|emailed them|sent (it|that|the email))\b/ },
  { intent: 'not_interested', pattern: /\b(not interested|pass on|not a fit|not for us|too early|not now|waste of time|spam|junk)\b/ },
  { intent: 'archive', pattern: /\b(archive|dismiss|remove|kill it|nah|drop it|forget it|trash)\b/ },
  { intent: 'skip', pattern: /\b(skip|next|move on|pass|later|come back|tomorrow|no action)\b/ },
  { intent: 'done', pattern: /\b(done|finished|complete|handled|checked off)\b/ },
  // Start day
  { intent: 'start', pattern: /^(start|begin|go|let.?s go|ready|work|run through)/ },
  // End of day
  { intent: 'end_day', pattern: /\b(end my day|wrap up.* day|close out today|summarize today|prep tomorrow|what should i finish|log off|logging off|eod|end of day)\b/ },
  // End of week
  { intent: 'end_week', pattern: /\b(end of week|wrap up.* week|close out.* week|summarize.* week|prep next week|what happened this week|weekly recap|weekly summary|eow)\b/ },
  // CRM query (read-only — must come before crm_update)
  { intent: 'crm_query', pattern: /\b(deal stage|current stage|what stage|which stage|where.* in.* pipeline|pipeline status|deal status|what.* deal|deal info)\b/ },
  // CRM update (write action — opens editor)
  { intent: 'crm_update', pattern: /\b(update.*(?:hubspot|crm|hub)|(?:hubspot|crm).*update|change.*(?:hubspot|crm)|(?:hubspot|crm).*change|modify.*(?:hubspot|crm)|edit.*(?:hubspot|crm)|log.*(?:hubspot|crm|in crm)|(?:hubspot|crm).*edit|update deal|update stage)\b/ },
  // CRM update via stage language — "move X to closed lost", "mark X as committed", "close lost X"
  { intent: 'crm_update', pattern: /\b(move|change|set|mark)\b.*\b(to|as)\s+(closed?\s*(lost|won)|negotiat|commit|demo|disco|nurture|booking)\b/i },
  { intent: 'crm_update', pattern: /\bclose[d]?\s*(lost|won)\b/i },
  // CRM create (new deal)
  { intent: 'crm_create', pattern: /\b(create (new |a )?(opportunity|deal|opp)|new (opportunity|deal)|add (to |in )?hubspot|create in hubspot|log (new |a )?(deal|opportunity)|new hubspot)\b/ },
  // Post-call / Granola notes
  { intent: 'postcall', pattern: /\b(post.?call|after.?call|granola|call notes|recording|debrief|pull.*(notes|call|recording)|notes from)\b/ },
  // Proposal / pricing
  { intent: 'proposal', pattern: /\b(order form|contract|proposal|generate proposal)\b/ },
  { intent: 'pricing', pattern: /\b(pricing|price|quote)\b/ },
  // Draft email
  { intent: 'draft', pattern: /\b(draft|email|write an? email|send an? email|reply|compose|follow.?up email)\b/ },
  // Bump / nudge
  { intent: 'bump', pattern: /\b(bump|nudge|ping|poke|follow up again|circle back|touch base|gentle reminder)\b/ },
  // Prep / research
  { intent: 'prep', pattern: /\b(prep|prepare|get ready|talking points|agenda|brief me|meeting prep)\b/ },
  { intent: 'research', pattern: /\b(who (is|are)|look.* up|research|what do we know|tell me (more|about)|background|check (on|this|them))\b/ },
  // LinkedIn
  { intent: 'linkedin', pattern: /\b(linkedin|connect on linkedin|send connection|li request)\b/ },
  // Slack
  { intent: 'slack', pattern: /\b(slack|share to|post to|send to #|dm |message )\b/ },
  // Delegate
  { intent: 'delegate', pattern: /\b(forward|send to brian|delegate|hand off|brian.?s|assign|pass to|have brian|tell brian)\b/ },
  // Bare CRM/HubSpot mention (lower confidence, must be last CRM-related)
  { intent: 'crm_bare', pattern: /\b(hubspot|crm)\b/ },
];

// Negative guards — informational questions bypass write flows
const NEGATIVE_GUARDS = [
  /\b(what is (hubspot|crm|a deal stage|pipeline)|how (do|does|to) (i |we )?(use|update|set up|configure)|tell me about (hubspot|crm|deal stages|pipelines)|explain|how does .* work)\b/,
  /\b(what are .*(stages|fields|properties)|help me understand|can you explain|what.?s the difference)\b/
];

const PRONOUN_PATTERN = /\b(them|they|their|it|this one|that one|that company|this company|same)\b/;

// Expanded stop words for deal name matching
const DEAL_STOP_WORDS = ['the','and','for','new','deal','with','from','prescient','test','demo',
  'update','change','edit','modify','make','want','hubspot','crm','pipeline','stage','call',
  'notes','add','log','current','what','where','which','how','is','are','in','to','a','my',
  'this','that','pull','get','check','tell','about','show'];

function trackMentionedCompany(text) {
  const t = text.toLowerCase();
  // Check ACTIONS first
  const actionMatch = ACTIONS.find(a => a.status === "open" && t.includes(a.company.toLowerCase()));
  if (actionMatch) { _lastMentionedCompany = actionMatch.company; return; }
  // Check PIPELINE deals
  const dealMatch = findDealInText(t);
  if (dealMatch) { _lastMentionedCompany = dealMatch.name; return; }
}

function detectIntent(text) {
  const t = text.toLowerCase();
  // Check negative guards first — if matched, skip write intents
  const isInformational = NEGATIVE_GUARDS.some(g => g.test(t));
  if (isInformational) {
    if (DEBUG_ROUTER) console.log('[router] negative_guard matched — informational question, sending to AI');
    return { intent: null, confidence: 0 };
  }
  for (const { intent, pattern } of INTENT_PATTERNS) {
    if (pattern.test(t)) {
      const confidence = (intent === 'crm_bare') ? 0.5 : 0.9;
      if (DEBUG_ROUTER) console.log(`[router] matched_intent: ${intent} (confidence: ${confidence}) text: "${text}"`);
      _lastResolvedIntent = intent;
      return { intent, confidence };
    }
  }
  // "update [company]" — if "update" + resolvable entity, treat as CRM update
  if (/\bupdate\b/.test(t) && !t.match(/\b(update.*password|software update|app update)\b/)) {
    const dealCheck = findDealInText(t);
    const actionCheck = ACTIONS.find(a => a.status === "open" && t.includes(a.company.toLowerCase()));
    if (dealCheck || actionCheck) {
      if (DEBUG_ROUTER) console.log(`[router] matched_intent: crm_update (via "update" + entity) text: "${text}"`);
      _lastResolvedIntent = 'crm_update';
      return { intent: 'crm_update', confidence: 0.8 };
    }
  }
  // Check for pricing pattern (inline deal details)
  const pricingParsed = parsePricingFromChat(text);
  if (pricingParsed) {
    if (DEBUG_ROUTER) console.log(`[router] matched_intent: inline_pricing text: "${text}"`);
    return { intent: 'inline_pricing', confidence: 0.9, parsed: pricingParsed };
  }
  if (DEBUG_ROUTER) console.log(`[router] no_intent_match text: "${text}"`);
  return { intent: null, confidence: 0 };
}

function resolveEntity(text) {
  const t = text.toLowerCase();
  // 1. Explicit company name in ACTIONS
  const actionMatch = ACTIONS.find(a => a.status === "open" && t.includes(a.company.toLowerCase()));
  if (actionMatch) {
    _lastMentionedCompany = actionMatch.company;
    _lastEntitySource = 'actions_direct';
    if (DEBUG_ROUTER) console.log(`[router] resolved_entity: ${actionMatch.company} source: actions_direct`);
    return { entity: actionMatch, source: 'actions_direct' };
  }
  // 2. Explicit company/deal name in PIPELINE
  const dealMatch = findDealInText(t);
  if (dealMatch) {
    _lastMentionedCompany = dealMatch.name;
    // Try to find corresponding action
    const actionForDeal = ACTIONS.find(a => a.status === "open" && a.company.toLowerCase() === dealMatch.name.toLowerCase());
    if (actionForDeal) {
      _lastEntitySource = 'pipeline_to_action';
      if (DEBUG_ROUTER) console.log(`[router] resolved_entity: ${actionForDeal.company} source: pipeline_to_action`);
      return { entity: actionForDeal, source: 'pipeline_to_action' };
    }
    // Create synthetic item for pipeline-only entity
    const synthItem = { id: -1, company: dealMatch.name, task: '', status: 'open', dealValue: dealMatch.amount };
    _lastEntitySource = 'pipeline_synthetic';
    if (DEBUG_ROUTER) console.log(`[router] resolved_entity: ${dealMatch.name} source: pipeline_synthetic`);
    return { entity: synthItem, source: 'pipeline_synthetic' };
  }
  // 3. Currently selected item
  const sel = getSelected();
  if (sel) {
    _lastEntitySource = 'selected';
    if (DEBUG_ROUTER) console.log(`[router] resolved_entity: ${sel.company} source: selected`);
    return { entity: sel, source: 'selected' };
  }
  // 4. Pronoun → _lastMentionedCompany
  if (_lastMentionedCompany && PRONOUN_PATTERN.test(t)) {
    const resolved = ACTIONS.find(a => a.status === "open" && a.company === _lastMentionedCompany);
    if (resolved) {
      _lastEntitySource = 'pronoun';
      if (DEBUG_ROUTER) console.log(`[router] pronoun_resolution: pronoun → ${resolved.company}`);
      return { entity: resolved, source: 'pronoun' };
    }
    // Synthetic from last mentioned
    const synthItem = { id: -1, company: _lastMentionedCompany, task: '', status: 'open' };
    _lastEntitySource = 'pronoun_synthetic';
    if (DEBUG_ROUTER) console.log(`[router] pronoun_resolution: pronoun → ${_lastMentionedCompany} (synthetic)`);
    return { entity: synthItem, source: 'pronoun_synthetic' };
  }
  // 5. _lastMentionedCompany as implicit context (for follow-up messages)
  if (_lastMentionedCompany) {
    const lastAction = ACTIONS.find(a => a.status === "open" && a.company === _lastMentionedCompany);
    if (lastAction) {
      _lastEntitySource = 'last_mentioned';
      if (DEBUG_ROUTER) console.log(`[router] resolved_entity: ${lastAction.company} source: last_mentioned`);
      return { entity: lastAction, source: 'last_mentioned' };
    }
    const lastDeal = PIPELINE.find(d => d.name.toLowerCase() === _lastMentionedCompany.toLowerCase());
    if (lastDeal) {
      const synthItem = { id: -1, company: lastDeal.name, task: '', status: 'open', dealValue: lastDeal.amount };
      _lastEntitySource = 'last_mentioned_pipeline';
      if (DEBUG_ROUTER) console.log(`[router] resolved_entity: ${lastDeal.name} source: last_mentioned_pipeline`);
      return { entity: synthItem, source: 'last_mentioned_pipeline' };
    }
  }
  if (DEBUG_ROUTER) console.log(`[router] resolved_entity: NONE`);
  return { entity: null, source: null };
}

function renderEntitySuggestions() {
  const open = ACTIONS.filter(a => a.status === "open").slice(0, 5);
  if (open.length === 0) return '';
  return '<div style="margin-top:8px;">' + open.map(a =>
    `<button class="action-chip" onclick="selectItem(${a.id})" style="background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:4px 10px;border-radius:12px;margin:2px;cursor:pointer;font-size:11px;">${a.company}</button>`
  ).join('') + '</div>';
}

function showDealStageInfo(target) {
  const deals = PIPELINE.filter(d => d.name.toLowerCase().includes(target.company.toLowerCase()));
  if (deals.length > 0) {
    let html = `<strong>${target.company} — Pipeline</strong>`;
    deals.forEach(d => {
      const stageLabel = STAGE_MAP[d.dealstage] || d.stage || 'Unknown';
      html += `<div style="background:#0a0e1a;border:1px solid #1e293b;border-radius:6px;padding:10px 12px;margin:6px 0;font-size:12px;line-height:1.6;">`;
      html += `<div><strong style="color:#fff;">${d.name}</strong> — <span style="color:#f59e0b;">${stageLabel}</span></div>`;
      html += `<div style="color:#94a3b8;">${fmtMoney(d.amount)} · ${d.owner || 'Unassigned'}${d.close ? ' · Close: ' + new Date(d.close).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : ''}</div>`;
      html += `</div>`;
    });
    html += renderActionChips(target);
    addChat("agent", html);
    return true;
  }
  addChat("agent", `No HubSpot deals found for ${target.company}.` + renderActionChips(target));
  return true;
}

function showRecoveryResponse(intent) {
  if (DEBUG_ROUTER) console.log(`[router] recovery_response: intent=${intent} reason=no_entity`);
  const suggestions = renderEntitySuggestions();
  const msgs = {
    crm_update: "Which company should I update in HubSpot?" + suggestions,
    crm_query: "Which company's deal stage do you want to see?" + suggestions,
    crm_bare: "Which company? Type a name or select one:" + suggestions,
    crm_create: "Which company should I create a deal for?" + suggestions,
    postcall: "Which call? Type a company name or select one:" + suggestions,
    draft: "Who should I draft an email for?" + suggestions,
    proposal: "Which company should I generate a proposal for?" + suggestions,
    pricing: "Which company's pricing should I look up?" + suggestions,
    prep: "Which company should I prep for?" + suggestions,
    research: "Who should I research?" + suggestions,
    linkedin: "Who should I look up on LinkedIn?" + suggestions,
    slack: "Which company should I share to Slack?" + suggestions,
    delegate: "Which company should I delegate?" + suggestions,
    bump: "Who should I bump?" + suggestions,
    confirmed: "Which company is confirmed?" + suggestions,
    already_done: "Which company is already handled?" + suggestions,
    not_interested: "Which company is not a fit?" + suggestions,
    archive: "Which company should I archive?" + suggestions,
    skip: "Which company should I skip?" + suggestions,
    done: "Which company is done?" + suggestions,
  };
  addChat("agent", msgs[intent] || ("Which company?" + suggestions));
}

function extractStageFromText(text) {
  const t = text.toLowerCase();
  if (t.match(/close[d]?\s*lost/)) return 'Closed Lost';
  if (t.match(/close[d]?\s*won/)) return 'Closed Won';
  if (t.match(/negotiat/)) return 'Negotiating';
  if (t.match(/committed/)) return 'Committed';
  if (t.match(/demo\s*scheduled/)) return 'Demo Scheduled';
  if (t.match(/demo\s*completed/)) return 'Demo Completed';
  if (t.match(/disco\s*booked/)) return 'Disco Booked';
  if (t.match(/disco\s*complete/)) return 'Disco Complete';
  if (t.match(/nurture/)) return 'Nurture';
  return null;
}

function ensureSelected(entity) {
  if (entity && entity.id && entity.id !== -1) selectItem(entity.id);
}

function handleLocalCommand(text) {
  const t = text.toLowerCase();
  const { intent, confidence, parsed } = detectIntent(text);

  // No intent matched — try company name match to auto-select
  if (!intent) {
    const { entity } = resolveEntity(text);
    if (entity && entity.id !== -1 && entity.source === 'actions_direct') {
      selectItem(entity.id);
      return true;
    }
    if (DEBUG_ROUTER) console.log(`[router] fallback_ai text: "${text}" reason: no_intent`);
    return false;
  }

  // Inline pricing — no entity needed
  if (intent === 'inline_pricing') {
    runChatPricing(parsed);
    return true;
  }

  // Start — no entity needed
  if (intent === 'start') { startWork(); return true; }

  // End of day — no entity needed
  if (intent === 'end_day') { endMyDay(); return true; }

  // End of week — no entity needed
  if (intent === 'end_week') { endOfWeek(); return true; }

  // Resolve entity for all other intents
  const { entity, source } = resolveEntity(text);

  // Route by intent
  switch (intent) {
    case 'confirmed':
      if (!entity) { showRecoveryResponse(intent); return true; }
      ensureSelected(entity);
      addChat("agent", `✓ ${entity.company} — on calendar.`);
      if (entity.id !== -1) markDone(entity.id);
      return true;

    case 'already_done':
      if (!entity) { showRecoveryResponse(intent); return true; }
      ensureSelected(entity);
      addChat("agent", `✓ ${entity.company} — already handled.`);
      if (entity.id !== -1) markDone(entity.id);
      return true;

    case 'not_interested':
      if (!entity) { showRecoveryResponse(intent); return true; }
      ensureSelected(entity);
      addChat("agent", `✕ ${entity.company} — not a fit.`);
      if (entity.id !== -1) archiveItem(entity.id);
      return true;

    case 'archive':
      if (!entity) { showRecoveryResponse(intent); return true; }
      ensureSelected(entity);
      if (entity.id !== -1) archiveItem(entity.id);
      return true;

    case 'skip':
      if (!entity) { showRecoveryResponse(intent); return true; }
      ensureSelected(entity);
      addChat("agent", `Skipping <strong>${entity.company}</strong>.`);
      if (entity.id !== -1) setTimeout(() => advanceToNext(), 200);
      return true;

    case 'done':
      if (!entity) { showRecoveryResponse(intent); return true; }
      ensureSelected(entity);
      if (entity.id !== -1) markDone(entity.id);
      return true;

    case 'crm_query':
      if (!entity) { showRecoveryResponse(intent); return true; }
      ensureSelected(entity);
      return showDealStageInfo(entity);

    case 'crm_update':
    case 'crm_bare': {
      if (!entity) { showRecoveryResponse(intent); return true; }
      ensureSelected(entity);
      const stageHint = extractStageFromText(t);
      const crmOpts = stageHint ? { presetStage: stageHint } : {};
      showCrmEditor(entity, _lastActionContext.analysis, crmOpts);
      return true;
    }

    case 'crm_create':
      if (!entity) { showRecoveryResponse(intent); return true; }
      ensureSelected(entity);
      showCrmWizard(entity);
      return true;

    case 'postcall': {
      if (entity) {
        ensureSelected(entity);
        // Detect chained actions in the same message
        const wantsQuote = t.match(/\b(quote|proposal|order form|contract|pricing)\b/);
        const wantsCrm = t.match(/\b(hubspot|crm|update hubspot|log|update crm)\b/);
        const wantsDraft = t.match(/\b(draft|email|follow.?up|write|send|reply)\b/) && !wantsQuote;
        if (wantsQuote || wantsCrm || wantsDraft) {
          runChainedPostCall(entity, { quote: !!wantsQuote, crm: !!wantsCrm, draft: !!wantsDraft });
          return true;
        }
        showPostCallFlow(entity);
        return true;
      }
      // No entity — try pronoun resolution for Granola search
      if (_lastMentionedCompany && PRONOUN_PATTERN.test(t)) {
        fetchGranolaBySearch(_lastMentionedCompany);
        return true;
      }
      // Extract keyword for Granola search
      const keyword = t.replace(/\b(pull|up|my|the|get|granola|call|notes|from|recording|for|please|today|add|last|with|them|their|it|post|call|after|debrief)\b/g, '').replace(/\s+/g, ' ').trim();
      if (keyword && keyword.length > 2) {
        fetchGranolaBySearch(keyword);
        return true;
      }
      if (_lastMentionedCompany) {
        fetchGranolaBySearch(_lastMentionedCompany);
        return true;
      }
      showRecoveryResponse(intent);
      return true;
    }

    case 'proposal': {
      const pricingParsed = parsePricingFromChat(text);
      if (pricingParsed) { runChatPricing(pricingParsed); return true; }
      if (!entity) { showRecoveryResponse(intent); return true; }
      ensureSelected(entity);
      showProposalModal(entity);
      return true;
    }

    case 'pricing': {
      const pricingParsed = parsePricingFromChat(text);
      if (pricingParsed) { runChatPricing(pricingParsed); return true; }
      if (!entity) { showRecoveryResponse(intent); return true; }
      ensureSelected(entity);
      showProposalModal(entity);
      return true;
    }

    case 'draft':
      if (!entity) { showRecoveryResponse(intent); return true; }
      ensureSelected(entity);
      if (entity.draftPrompt) { showDraftModal(entity); return true; }
      showDraftModal(entity);
      return true;

    case 'bump':
      if (!entity) { showRecoveryResponse(intent); return true; }
      ensureSelected(entity);
      if (entity.draftPrompt) {
        const origPrompt = entity.draftPrompt;
        entity._bumpPrompt = origPrompt.replace(/Draft a follow-up/, "Draft a gentle bump").replace(/Draft a reply/, "Draft a gentle follow-up") + " Keep it 2-3 sentences max. Light and friendly.";
        showDraftModal({ ...entity, draftPrompt: entity._bumpPrompt });
      } else {
        showDraftModal(entity);
      }
      return true;

    case 'prep':
    case 'research':
      if (!entity) { showRecoveryResponse(intent); return true; }
      ensureSelected(entity);
      buildPrep(entity);
      return true;

    case 'linkedin':
      if (!entity) { showRecoveryResponse(intent); return true; }
      ensureSelected(entity);
      showLinkedInModal(entity);
      return true;

    case 'slack':
      if (!entity) { showRecoveryResponse(intent); return true; }
      ensureSelected(entity);
      showSlackMenu(entity.id);
      setTimeout(() => {
        const toInput = document.getElementById("slackTo");
        if (!toInput) return;
        const ch = t.match(/#(\w+)/);
        const per = t.match(/\b(brian|will|jason|elliot|ali)\b/i);
        if (ch) toInput.value = "#" + ch[1];
        else if (per) toInput.value = per[1].charAt(0).toUpperCase() + per[1].slice(1).toLowerCase();
      }, 100);
      return true;

    case 'delegate':
      if (!entity) { showRecoveryResponse(intent); return true; }
      ensureSelected(entity);
      const who = t.match(/brian/) ? "Brian" : t.match(/will/) ? "Will" : t.match(/jason/) ? "Jason" : "the team";
      showSlackMenu(entity.id);
      addChat("agent", `Delegating ${entity.company} → ${who}. Update the Slack message below.`);
      return true;

    default:
      if (DEBUG_ROUTER) console.log(`[router] fallback_ai text: "${text}" reason: unhandled_intent ${intent}`);
      return false;
  }
}

// ENTITY LOOKUP HELPERS

function findCompanyInText(text) {
  const { entity } = resolveEntity(text);
  return entity;
}

function findDealInText(text) {
  const t = text.toLowerCase();
  return PIPELINE.find(d => {
    const name = d.name.toLowerCase();
    if (t.includes(name)) return true;
    // Check if any significant word (4+ chars, not a stop word) from the deal name appears
    const words = name.split(/[\s\-–—\/,]+/).filter(w => w.length >= 4 && !DEAL_STOP_WORDS.includes(w));
    return words.some(w => t.includes(w));
  });
}

async function fetchGranolaBySearch(keyword) {
  addChat("agent", `<div class="modal-loading" style="padding:0;"><div class="spin"></div>Searching Granola for "${keyword}"...</div>`);
  const searchIdx = chatHistory.length - 1;
  try {
    const res = await apiFetch('/api/granola', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ company: keyword, analyze: false }),
    });
    const data = await res.json();
    if (data.success && data.note) {
      const n = data.note;
      const attendees = (n.attendees || []).map(a => a.name || a.email).join(', ');
      let html = `<div style="margin-bottom:8px;"><strong>${n.title}</strong></div>`;
      html += `<div style="font-size:11px;color:#64748b;margin-bottom:8px;">${new Date(n.createdAt).toLocaleDateString()} · ${attendees}</div>`;
      if (n.summaryText) html += `<div style="background:#0a0e1a;border:1px solid #1e293b;border-radius:6px;padding:10px 12px;font-size:12px;line-height:1.6;color:#94a3b8;max-height:300px;overflow-y:auto;white-space:pre-wrap;">${n.summaryMarkdown || n.summaryText}</div>`;
      else html += `<div style="color:#475569;font-size:12px;">No summary available.</div>`;
      // Show action chips if there's a matching action item
      const match = ACTIONS.find(a => a.status === 'open' && (a.company.toLowerCase().includes(keyword.toLowerCase()) || keyword.toLowerCase().includes(a.company.toLowerCase())));
      if (match) {
        html += renderActionChips(match, { granolaNote: n });
      }
      chatHistory[searchIdx] = { role: 'agent', text: html, ts: new Date().toLocaleTimeString([], {hour:'numeric',minute:'2-digit'}) };
    } else {
      chatHistory[searchIdx] = { role: 'agent', text: `No Granola notes found for "${keyword}".`, ts: new Date().toLocaleTimeString([], {hour:'numeric',minute:'2-digit'}) };
    }
  } catch {
    chatHistory[searchIdx] = { role: 'agent', text: `Could not reach Granola. Check API key.`, ts: new Date().toLocaleTimeString([], {hour:'numeric',minute:'2-digit'}) };
  }
  const c = document.getElementById("chatMessages");
  c.innerHTML = chatHistory.map(m => `<div class="chat-msg ${m.role}">${m.text}<div class="ts">${m.ts}</div></div>`).join("");
  c.scrollTop = c.scrollHeight;
}

async function runChainedPostCall(item, opts = {}) {
  const { quote, crm, draft } = opts;

  addChat("agent", `<strong>${item.company}</strong> — Fetching call notes...`);

  // Step 1: Fetch Granola notes and show summary with action chips
  let granolaNote = null;
  let analysis = null;
  try {
    const res = await apiFetch('/api/granola', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ company: item.company, analyze: true }),
    });
    const data = await res.json();
    if (data.success && data.note) {
      granolaNote = data.note;
      analysis = data.note.analysis;
      const summary = granolaNote.summaryText || granolaNote.summaryMarkdown || '';
      const attendees = (granolaNote.attendees || []).map(a => a.name || a.email).join(', ');
      let html = `<div style="margin-bottom:6px;"><strong>Call Notes — ${granolaNote.title || item.company}</strong></div>`;
      html += `<div style="font-size:11px;color:#64748b;margin-bottom:6px;">${attendees}</div>`;
      if (summary) {
        html += `<div style="background:#0a0e1a;border:1px solid #1e293b;border-radius:6px;padding:10px 12px;font-size:12px;line-height:1.6;color:#94a3b8;max-height:200px;overflow-y:auto;">${summary.substring(0, 1500)}</div>`;
      }
      if (analysis?.summary) {
        html += `<div style="margin-top:8px;font-size:12px;color:#a855f7;"><strong>AI:</strong> ${analysis.summary}</div>`;
        if (analysis.nextSteps?.length) {
          html += `<div style="font-size:11px;color:#64748b;margin-top:4px;">Next steps: ${analysis.nextSteps.join(' · ')}</div>`;
        }
      }
      // Show action chips — user reviews and clicks to proceed
      html += renderActionChips(item, { granolaNote, analysis });
      addChat("agent", html);
    } else {
      let html = `<span style="color:#f59e0b;">Granola notes not found for ${item.company}. Use actions below with available context.</span>`;
      html += renderActionChips(item, { granolaNote: null, analysis: null });
      addChat("agent", html);
    }
  } catch {
    let html = `<span style="color:#f59e0b;">Could not reach Granola. Use actions below with available context.</span>`;
    html += renderActionChips(item, { granolaNote: null, analysis: null });
    addChat("agent", html);
  }

  // Queue up requested modals sequentially — each opens after the user acts
  const _chainQueue = [];
  if (quote) _chainQueue.push(() => showProposalModal(item));
  if (draft) _chainQueue.push(() => showDraftModal(item, { granolaBody: granolaNote?.summaryText || '', callAnalysis: analysis }));
  if (crm) _chainQueue.push(() => showCrmEditor(item, analysis));

  // Open the first requested modal immediately (user reviews before submitting)
  if (_chainQueue.length > 0) {
    _chainQueue[0]();
    // Store remaining modals so they can be triggered after close
    window._pendingChainModals = _chainQueue.slice(1);
  }

  renderContextBar();
}

function copyToClipboard(text) {
  // file:// protocol doesn't support navigator.clipboard — always use fallback first
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    ta.style.top = "-9999px";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    if (ok) { showToast("Copied — paste in Cowork"); return; }
  } catch(e) {}
  // Fallback to modern API if available (HTTPS only)
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast("Copied — paste in Cowork")).catch(() => showToast("Copy failed — select text manually"));
  } else {
    showToast("Copy failed — select text manually");
  }
}

function showToast(msg) {
  const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

function fixCrmGap(idx) {
  const g = window._crmGaps && window._crmGaps[idx];
  if (!g) return;

  const fakeItem = { id: g.id, company: g.name, crmPrompt: g.fixPrompt, dealValue: g.amount };
  showCrmWizard(fakeItem);
}

function getCrmGaps() {
  const gaps = [];
  PIPELINE.forEach(d => {
    if (d.stage === "Nurture" || d.stage === "Booking") return;
    const closeDate = d.close ? new Date(d.close) : null;
    // Overdue close dates
    if (closeDate && closeDate < TODAY && d.stage !== "Committed") {
      gaps.push({ ...d, issue: `Close date was ${closeDate.toLocaleDateString("en-US",{month:"short",day:"numeric"})} — overdue. Update stage or close date.`, fixPrompt: `Deal close date is overdue (${d.close}). Either update the close date or change the stage. Current stage: ${d.stage}.` });
    }
    // No owner
    else if (!d.owner) {
      gaps.push({ ...d, issue: `No owner assigned. Someone needs to own this deal.`, fixPrompt: `This deal has no owner. Assign Mike, Brian, Will, or Jason as owner.` });
    }
  });
  return gaps;
}

  const sevColors = { high: '#ef4444', medium: '#f59e0b', low: '#3b82f6' };

function renderLeadsView(main) {
  let filtered = [...ACTIONS];

  // Apply filter
  if (leadsFilter === "open") filtered = filtered.filter(a => a.status === "open");
  else if (leadsFilter === "done") filtered = filtered.filter(a => a.status === "done");
  else if (leadsFilter === "inbound") filtered = filtered.filter(a => a.cat === "inbound");
  else if (leadsFilter === "sales") filtered = filtered.filter(a => a.cat === "sales" || a.cat === "partnerships" || a.cat === "strategic");

  // Apply search
  if (leadsSearch) {
    const q = leadsSearch.toLowerCase();
    filtered = filtered.filter(a => a.company.toLowerCase().includes(q) || a.task.toLowerCase().includes(q) || (a.meta && a.meta.toLowerCase().includes(q)));
  }

  // Sort: open first, then by staleness
  filtered.sort((a,b) => {
    if (a.status === "open" && b.status !== "open") return -1;
    if (a.status !== "open" && b.status === "open") return 1;
    return daysStale(b.lastActivity) - daysStale(a.lastActivity);
  });

  const openCount = ACTIONS.filter(a => a.status === "open").length;
  const doneCount = ACTIONS.filter(a => a.status === "done").length;

  let html = `<h1>All Leads</h1>`;
  html += `<div class="subtitle">${openCount} open · ${doneCount} done · ${ACTIONS.length} total</div>`;

  // Search + filters
  html += `<div class="search-bar">
    <input class="search-input" id="leadsSearchInput" type="text" placeholder="Search leads..." value="${leadsSearch}" oninput="leadsSearch=this.value;leadsSearchCursor=this.selectionStart;renderLeadsView(document.getElementById('main'))">
    <button class="filter-btn ${leadsFilter==='all'?'active':''}" onclick="leadsFilter='all';renderLeadsView(document.getElementById('main'))">All</button>
    <button class="filter-btn ${leadsFilter==='open'?'active':''}" onclick="leadsFilter='open';renderLeadsView(document.getElementById('main'))">Open</button>
    <button class="filter-btn ${leadsFilter==='inbound'?'active':''}" onclick="leadsFilter='inbound';renderLeadsView(document.getElementById('main'))">Inbound</button>
    <button class="filter-btn ${leadsFilter==='sales'?'active':''}" onclick="leadsFilter='sales';renderLeadsView(document.getElementById('main'))">Sales</button>
    <button class="filter-btn ${leadsFilter==='done'?'active':''}" onclick="leadsFilter='done';renderLeadsView(document.getElementById('main'))">Done</button>
  </div>`;

  if (filtered.length === 0) {
    html += `<div class="section-empty">No leads match your filter.</div>`;
  }

  filtered.forEach(a => {
    const isDone = a.status === "done";
    const isSel = a.id === selectedId;
    const days = daysStale(a.lastActivity);
    const badge = !isDone ? staleBadge(days, a) : "";
    const dv = a.dealValue ? `<span class="deal-val">${fmtMoney(a.dealValue)}</span>` : "";
    const catCfg = CAT_CONFIG[a.cat];
    const introBadge = a.isIntro ? `<span style="font-size:9px;font-weight:700;color:#10b981;background:rgba(16,185,129,0.15);padding:1px 6px;border-radius:3px;">🤝 intro</span> ` : '';
    const catBadge = catCfg ? `<span style="font-size:9px;font-weight:600;color:${catCfg.color};background:${catCfg.color}20;padding:1px 6px;border-radius:3px;">${a.cat}</span>` : "";
    let aiRec = "";
    if (a._signalState?.recommendation?.overridden) {
      const sc = getStateColor(a._signalState.canonicalState);
      aiRec = `<span class="ai-badge" style="background:${sc}15;color:${sc};"><span style="font-weight:700;">${formatStateName(a._signalState.canonicalState)}</span> ${a._signalState.recommendation.text}</span>`;
    } else if (a.aiRec) {
      aiRec = `<span class="ai-badge">AI: ${a.aiRec}</span>`;
    }

    html += `<div class="item ${isDone?'done-item':''} ${isSel?'selected':''}" onclick="${isDone?'':`selectItem(${a.id})`}">
      <span class="company tag ${a.color}">${a.company}</span>
      <div class="body">
        <div class="task">${a.task}</div>
        <div class="meta">${introBadge}${catBadge} ${a.meta||""} ${badge} ${dv}</div>
        ${aiRec ? `<div style="margin-top:4px;">${aiRec}</div>` : ""}

        ${a.emailUrl ? `<button class="btn-sm" onclick="event.stopPropagation();window.open('${a.emailUrl}','_blank')">Superhuman</button>` : ""}
        ${a.granola ? `<button class="btn-sm" onclick="event.stopPropagation();window.open('${a.granola}','_blank')">Notes</button>` : ""}
        ${a.hubspot ? `<button class="btn-sm" onclick="event.stopPropagation();window.open('${a.hubspot}','_blank')">CRM</button>` : ""}

function toggleDropdown(btn) {
  // Close all other dropdowns first
  document.querySelectorAll('.action-dropdown.open').forEach(d => d.classList.remove('open'));
  const dd = btn.nextElementSibling;
  dd.classList.toggle('open');
  // Remove old listener if exists
  if (btn._closeListener) document.removeEventListener('click', btn._closeListener);
  // Close on click outside
  const close = (e) => { if (!dd.contains(e.target) && e.target !== btn) { dd.classList.remove('open'); document.removeEventListener('click', close); btn._closeListener = null; } };
  btn._closeListener = close;
  setTimeout(() => document.addEventListener('click', close), 0);
}

// ── Chat → Pricing: parse natural language deal details ──
function parsePricingFromChat(text) {
  const t = text.toLowerCase();
  const spendMatch = text.match(/\$\s*([\d,]+(?:\.\d+)?)\s*(m(?:illion)?|mm|k)?(?:\s+(?:in\s+)?(?:spend|media|ltm))?/i)
    || text.match(/(?:spend|media|ltm)[^$]*\$\s*([\d,]+(?:\.\d+)?)\s*(m(?:illion)?|mm|k)?/i)
    || text.match(/([\d,]+(?:\.\d+)?)\s*(m(?:illion)?|mm)\b/i);
  if (!spendMatch) return null;
  let spend = parseFloat(spendMatch[1].replace(/,/g, ''));
  const unit = (spendMatch[2] || '').toLowerCase();
  if (unit.startsWith('m')) spend *= 1_000_000;
  else if (unit === 'k') spend *= 1_000;
  if (spend < 1000) return null;
  const channels = [];
  if (t.match(/\bdtc\b|direct.to.consumer|shopify/)) channels.push('DTC');
  if (t.match(/\bamazon\b|amz\b/)) channels.push('Amazon');
  if (t.match(/\btik\s?tok/)) channels.push('TikTok Shop');
  let retailCount = 0;
  const retailMatch = t.match(/(\d+)\s*retail(?:er)?s?/);
  if (retailMatch) { retailCount = parseInt(retailMatch[1]); channels.push('Retail'); }
  else if (t.match(/\bretail\b/)) { retailCount = 1; channels.push('Retail'); }
  if (!channels.length) return null;
  const skipWords = new Set(['the','brand','is','has','have','they','with','and','in','spend','media','ltm','create','generate','proposal','order','form','pricing','price','quote','contract','for','a','an','million','dtc','amazon','tiktok','shop','retail','retailers','channels','channel','i','want','to','my','me','can','you','please','make','build','draft','up']);
  const quotedMatch = text.match(/["']([^"']+)["']/);
  let brandName = null;
  if (quotedMatch) { brandName = quotedMatch[1]; }
  else {
    const words = text.split(/[\s,]+/);
    const brandWords = [];
    for (const w of words) {
      const clean = w.replace(/[^a-zA-Z0-9]/g, '');
      if (!clean) continue;
      if (clean[0] === clean[0].toUpperCase() && clean[0] !== clean[0].toLowerCase() && !skipWords.has(clean.toLowerCase()) && !clean.match(/^\$/) && !clean.match(/^\d/)) brandWords.push(clean);
    }
    if (brandWords.length) brandName = brandWords.join(' ');
  }
  if (!brandName) brandName = 'Unknown Brand';
  return { brandName, ltmMediaSpend: spend, enabledChannels: channels, numberOfRetailChannels: retailCount || 1 };
}

async function runChatPricing(parsed) {
  const channelsStr = parsed.enabledChannels.join(', ');
  const spendStr = '$' + parsed.ltmMediaSpend.toLocaleString();
  addChat("agent", `<div class="modal-loading" style="padding:0;"><div class="spin"></div>Calculating pricing for <strong>${parsed.brandName}</strong> — ${spendStr} across ${channelsStr}...</div>`);
  const thinkingIdx = chatHistory.length - 1;
  try {
    const res = await apiFetch('/api/pricing', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(parsed) });
    const data = await res.json();
    if (!res.ok || !data.success) { chatHistory[thinkingIdx].text = `<div style="color:#ef4444;">${data.error || 'Calculation failed'}</div>`; refreshChat(); return; }
    const p = data.pricing, a = data.approval;
    const fmtM = (n) => '$' + (n||0).toLocaleString('en-US', {maximumFractionDigits:0});
    const fmtM2 = (n) => '$' + (n||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    let badge;
    if (a.status === 'auto_approved') badge = '<span style="background:rgba(16,185,129,0.15);color:#10b981;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;">AUTO-APPROVED</span>';
    else if (a.status === 'requires_dealdesk') badge = '<span style="background:rgba(245,158,11,0.15);color:#f59e0b;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;">DEAL DESK REQUIRED</span>';
    else badge = '<span style="background:rgba(239,68,68,0.15);color:#ef4444;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;">HARD STOP</span>';
    const dealdeskReasons = a.reasons.filter(r => r.severity === 'dealdesk').map(r => `<div style="font-size:11px;color:#f59e0b;">- ${r.message}</div>`).join('');
    const breakdownHtml = p.baseFeeBreakdown.map(b => {
      const tier = b.gmvTier ? ` <span style="color:#64748b;font-size:10px;">(${b.gmvTier})</span>` : '';
      return `<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0;"><span>${b.channel}${tier}</span><span>${fmtM(b.discountedMonthlyFee || b.monthlyFee)}/mo</span></div>`;
    }).join('');
    let html = `<strong>Pricing: ${p.brandName}</strong> ${badge}`;
    html += `<div style="background:#0a0e1a;border:1px solid #1e293b;border-radius:6px;padding:12px;margin:8px 0;">`;
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;">`;
    html += `<div style="text-align:center;"><div style="font-size:18px;font-weight:800;color:#22d3ee;">${fmtM2(p.totalMonthly)}</div><div style="font-size:9px;color:#64748b;">MONTHLY</div></div>`;
    html += `<div style="text-align:center;"><div style="font-size:18px;font-weight:800;color:#10b981;">${fmtM2(p.totalAnnual)}</div><div style="font-size:9px;color:#64748b;">ANNUAL</div></div>`;
    html += `</div>`;
    html += `<div style="font-size:11px;color:#94a3b8;margin-bottom:6px;">Effective Rate: <strong style="color:#f59e0b;">${p.effectiveRatePercent.toFixed(3)}%</strong> of ${fmtM(p.ltmMediaSpend)} LTM spend</div>`;
    html += `<div style="font-size:11px;color:#94a3b8;font-weight:600;margin-bottom:4px;">Model Fees</div>${breakdownHtml}`;
    html += `<div style="font-size:11px;color:#94a3b8;font-weight:600;margin-top:8px;margin-bottom:4px;">Media Fee</div>`;
    html += `<div style="font-size:12px;display:flex;justify-content:space-between;"><span>${((p.tierBreakdown[0]?.rate||0.005)*100).toFixed(2)}% of LTM Spend</span><span>${fmtM(p.variableFeeAnnual)}/yr</span></div>`;
    if (dealdeskReasons) html += `<div style="margin-top:8px;border-top:1px solid #1e293b;padding-top:6px;">${dealdeskReasons}</div>`;
    html += `</div>`;
    html += `<div style="display:flex;gap:6px;margin-top:4px;"><button class="btn-action" onclick="pricingChatGenerateProposal()">Generate Order Form</button><button class="btn-sm" onclick="showTab('pricing')">Open Calculator</button><button class="btn-sm" onclick="pricingChatCopySummary()">Copy</button></div>`;
    html += `<div id="chatProposalResult"></div>`;
    chatHistory[thinkingIdx].text = html;
    refreshChat();
    _lastPricingInput = parsed;
    _lastChatPricingSummary = data.summary;
  } catch (err) { chatHistory[thinkingIdx].text = `<div style="color:#ef4444;">Pricing error: ${err.message}</div>`; refreshChat(); }
}

const AD_SPEND_CHANNELS = [
  { id: 'pSpendMeta', label: 'Meta (FB/IG)' },
  { id: 'pSpendGoogle', label: 'Google' },
  { id: 'pSpendTikTok', label: 'TikTok' },

function toggleAdSpend() {
  const panel = document.getElementById('adSpendBreakdown');
  const toggle = document.getElementById('adSpendToggle');
  if (panel.style.display === 'none') {
    panel.style.display = 'block';
    toggle.textContent = '▼';
  } else {
    panel.style.display = 'none';
    toggle.textContent = '▶';
  }
}

function sumAdSpend() {
  let total = 0;
  for (const ch of AD_SPEND_CHANNELS) {
    total += parseFloat(document.getElementById(ch.id)?.value) || 0;
  }
  document.getElementById('pSpend').value = total > 0 ? total : '';
}

function getAdSpendBreakdown() {
  const breakdown = [];
  for (const ch of AD_SPEND_CHANNELS) {
    const val = parseFloat(document.getElementById(ch.id)?.value) || 0;
    if (val > 0) breakdown.push({ channel: ch.label, spend: val });
  }
  return breakdown;
}

function pricingChannelToggle() {
  const retail = document.getElementById('pChRetail');
  const retailFields = document.getElementById('pRetailFields');
  const retailCount = document.getElementById('pRetailCount');
  if (retail && retailFields) retailFields.style.display = retail.checked ? 'block' : 'none';
  if (retail?.checked && retailCount && (parseInt(retailCount.value) || 0) === 0) retailCount.value = 1;
  if (!retail?.checked && retailCount) retailCount.value = 0;

  const channels = [];
  if (document.getElementById('pChDTC')?.checked) channels.push({ id: 'pGmvDTC', label: 'DTC GMV ($)' });
  if (document.getElementById('pChAmazon')?.checked) channels.push({ id: 'pGmvAmazon', label: 'Amazon GMV ($)' });
  if (document.getElementById('pChTikTok')?.checked) channels.push({ id: 'pGmvTikTok', label: 'TikTok Shop GMV ($)' });

let _lastPricingInput = null;

async function runPricingCalc() {
  const brand = document.getElementById('pBrand')?.value?.trim();
  const spend = parseFloat(document.getElementById('pSpend')?.value);
  if (!brand) { showToast('Brand name required'); return; }
  if (!spend || spend <= 0) { showToast('LTM Media Spend required'); return; }

  const channels = [];
  if (document.getElementById('pChDTC')?.checked) channels.push('DTC');
  if (document.getElementById('pChAmazon')?.checked) channels.push('Amazon');
  if (document.getElementById('pChTikTok')?.checked) channels.push('TikTok Shop');
  if (document.getElementById('pChRetail')?.checked) channels.push('Retail');
  if (!channels.length) { showToast('Select at least one channel'); return; }

  const retailCount = parseInt(document.getElementById('pRetailCount')?.value) || 0;
  // Auto-check Retail if count > 0
  if (retailCount > 0 && !channels.includes('Retail')) channels.push('Retail');

  const targetAnnual = parseFloat(document.getElementById('pTargetPrice')?.value) || null;

  const adSpendBreakdown = getAdSpendBreakdown();

  const input = {
    brandName: brand,
    ltmMediaSpend: spend,
    adSpendBreakdown: adSpendBreakdown.length > 0 ? adSpendBreakdown : null,
    enabledChannels: channels,
    numberOfRetailChannels: retailCount || 1,
    retailerNames: document.getElementById('pRetailNames')?.value?.split(',').map(s => s.trim()).filter(Boolean) || null,
    dtcGmv: parseFloat(document.getElementById('pGmvDTC')?.value) || null,
    amazonGmv: parseFloat(document.getElementById('pGmvAmazon')?.value) || null,
    tiktokGmv: parseFloat(document.getElementById('pGmvTikTok')?.value) || null,
    retailGmv: parseFloat(document.getElementById('pGmvRetail')?.value) || null,
    requestedDiscountPercent: targetAnnual ? null : (parseFloat(document.getElementById('pDiscount')?.value) || null),
    discountType: targetAnnual ? 'both' : (document.getElementById('pDiscountType')?.value || 'none'),
    paymentTerms: document.getElementById('pPayment')?.value || 'Semi-Annual Net 7',
    termMonths: parseInt(document.getElementById('pTerm')?.value) || 12,
    optOutMonths: parseInt(document.getElementById('pOptOut')?.value),
    customBaseFeeMonthly: parseFloat(document.getElementById('pCustomBase')?.value) || null,
    variableRateMultiplier: parseFloat(document.getElementById('pRateMultiplier')?.value) || null,
    additionalDiscountAmount: parseFloat(document.getElementById('pAddlDiscount')?.value) || null,
    excludedOrNonManagedSpend: parseFloat(document.getElementById('pExcluded')?.value) || null,
  };
  if (targetAnnual) input.targetAnnual = targetAnnual;

  _lastPricingInput = input;
  const resultsDiv = document.getElementById('pricingResults');
  resultsDiv.innerHTML = '<div style="text-align:center;padding:40px;color:#64748b;">Calculating...</div>';

  try {
    const res = await apiFetch('/api/pricing', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(input),
    });
    const data = await res.json();
    if (!res.ok || !data.success) {
      resultsDiv.innerHTML = `<div style="color:#ef4444;padding:20px;">${data.error || 'Calculation failed'}${data.validationErrors ? '<br>' + data.validationErrors.join('<br>') : ''}</div>`;
      return;
    }
    renderPricingResults(data, resultsDiv);
  } catch (err) {
    resultsDiv.innerHTML = `<div style="color:#ef4444;padding:20px;">Error: ${err.message}</div>`;
  }
}

      </div>
    </div>
    ${data.reverseResult ? `<div style="background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.2);border-radius:6px;padding:8px 10px;margin-bottom:12px;">
      <div style="font-size:11px;color:#22d3ee;font-weight:600;">Balanced ${data.reverseResult.discountPercent.toFixed(2)}% discount applied to Model Fees + Media Fee</div>
      <div style="font-size:10px;color:#64748b;margin-top:2px;">Target: ${fmtMoney2(data.reverseResult.achievedAnnual)} | List: ${fmtMoney(data.reverseResult.listPriceAnnual)}/yr | Savings: ${fmtMoney(data.reverseResult.listPriceAnnual - data.reverseResult.achievedAnnual)}/yr</div>
    </div>` : p.discountPercent ? `<div style="font-size:11px;color:#f59e0b;margin-bottom:12px;">Discount: ${p.discountPercent}% (-${fmtMoney(p.discountAmount)}) | List: ${fmtMoney(p.listPriceAnnual)}/yr</div>` : ''}
    ${_lastPricingInput?.adSpendBreakdown?.length ? `<div style="margin-bottom:16px;">
      <div style="font-size:11px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;">Ad Spend Breakdown</div>
      <table style="width:100%;border-collapse:collapse;">
        ${_lastPricingInput.adSpendBreakdown.map(s =>
          `<tr style="border-bottom:1px solid #1e293b;"><td style="padding:4px 8px;font-size:12px;color:#cbd5e1;">${s.channel}</td><td style="padding:4px 8px;font-size:12px;text-align:right;color:#a855f7;">${fmtMoney(s.spend)}</td><td style="padding:4px 8px;font-size:11px;text-align:right;color:#64748b;">${(s.spend / p.ltmMediaSpend * 100).toFixed(1)}%</td></tr>`
        ).join('')}
        <tr style="border-top:1px solid #334155;"><td style="padding:4px 8px;font-size:12px;color:#94a3b8;font-weight:600;">Total</td><td style="padding:4px 8px;font-size:12px;text-align:right;color:#a855f7;font-weight:600;">${fmtMoney(p.ltmMediaSpend)}</td><td style="padding:4px 8px;font-size:11px;text-align:right;color:#64748b;">100%</td></tr>
      </table>
    </div>` : ''}
    <div style="margin-bottom:16px;">
      <div style="font-size:11px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;">Model Fee Breakdown</div>
      <table style="width:100%;border-collapse:collapse;">
        <tr style="border-bottom:1px solid #334155;"><th style="font-size:10px;color:#475569;text-align:left;padding:4px 8px;">Channel</th><th style="font-size:10px;color:#475569;text-align:right;padding:4px 8px;">Monthly</th><th style="font-size:10px;color:#475569;text-align:right;padding:4px 8px;">Annual</th></tr>
        ${breakdownRows}
      </table>
      <div style="font-size:12px;color:#cbd5e1;margin-top:6px;text-align:right;font-weight:600;">Total Model Fees: ${fmtMoney(p.baseFeeAnnual)}/yr</div>
    </div>
    <div style="margin-bottom:16px;">
      <div style="font-size:11px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;">Media Fee</div>
      <div style="font-size:12px;color:#cbd5e1;">Rate: ${(p.tierBreakdown[0]?.rate * 100 || 0.5).toFixed(2)}% of LTM Spend</div>
      <div style="font-size:12px;color:#cbd5e1;">Total: ${fmtMoney(p.variableFeeAnnual)}/yr (${fmtMoney(p.variableFeeMonthly)}/mo)</div>
    </div>
    <div style="font-size:11px;color:#64748b;margin-bottom:16px;">
      Term: ${p.termMonths}mo | Payment: ${p.paymentTerms} | Opt-out: ${p.optOutMonths}mo
    </div>
    <div style="display:flex;gap:8px;">
      <button onclick="pricingGenerateProposal()" style="flex:1;padding:8px;border-radius:6px;background:#1e40af;color:#93c5fd;font-size:12px;font-weight:600;">Generate Order Form</button>
      <button onclick="pricingCopySummary()" style="flex:1;padding:8px;border-radius:6px;background:transparent;border:1px solid #334155;color:#94a3b8;font-size:12px;font-weight:600;">Copy Summary</button>
    </div>
    <div id="pProposalResult" style="margin-top:12px;"></div>
  `;
  container._summary = data.summary;
}

async function pricingGenerateProposal() {
  if (!_lastPricingInput) { showToast('Run pricing calculation first'); return; }
  const resultDiv = document.getElementById('pProposalResult');
  resultDiv.innerHTML = '<div style="font-size:12px;color:#64748b;">Generating order form...</div>';
  try {
    const res = await apiFetch('/api/proposal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ company: _lastPricingInput.brandName, pricing: _lastPricingInput }),
    });
    const data = await res.json();
    if (data.success) {
      resultDiv.innerHTML = `
        <div style="background:#111827;border:1px solid #1e293b;border-radius:8px;padding:12px;margin-top:8px;">
          <div style="font-size:11px;color:#10b981;font-weight:600;margin-bottom:6px;">Order Form Generated${data.slack?.posted ? ' & Posted to Slack' : ''}</div>
          <pre style="font-size:11px;color:#94a3b8;white-space:pre-wrap;max-height:300px;overflow:auto;font-family:monospace;">${(data.orderForm || '').replace(/</g,'&lt;')}</pre>
        </div>`;
    } else {
      resultDiv.innerHTML = `<div style="color:#ef4444;font-size:12px;">${data.error || 'Failed'}</div>`;
    }
  } catch (err) {
    resultDiv.innerHTML = `<div style="color:#ef4444;font-size:12px;">Error: ${err.message}</div>`;
  }
}

function pricingCopySummary() {
  const container = document.getElementById('pricingResults');
  const summary = container?._summary;
  if (!summary) { showToast('No pricing to copy'); return; }
  copyToClipboard(summary);
}

showTab("today", true); // Initial render — no history push
history.replaceState({ tab: 'today', selectedId: null }, '', '#today');
</script>
</body>
</html>
