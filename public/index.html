async function loadIntelligence() {
  if (_intelligenceCache) return _intelligenceCache;
  try {
    const res = await apiFetch('/api/intelligence', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pipeline: PIPELINE, actions: ACTIONS, meetings: MEETINGS }),
    });
    const data = await res.json();
    if (data.success) {
      _intelligenceCache = data.intelligence;
      return _intelligenceCache;
    }
  } catch {}
  return null;
}

// ═══════════════════════════════════════
// QUICK MODE POST-CALL (Feature 4)
// ═══════════════════════════════════════
async function runQuickPostCall(item) {
  if (!item) return;
  const deal = PIPELINE.find(d => d.name.toLowerCase().includes(item.company.toLowerCase()));

  // Step 0: Fetch Granola
  addChat("agent", `<strong>${item.company}</strong> — Quick Post-Call<br><span style="color:#f59e0b;">Fetching Granola notes...</span>`);

  let granolaNotes = '', granolaUrl = '', contactName = '', contactEmail = '';

  try {
    const grRes = await apiFetch('/api/granola', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ company: item.company, analyze: true }),
    });
    const grData = await grRes.json();
    if (grData.success && grData.note) {
      const note = grData.note;
      granolaNotes = note.summaryMarkdown || note.summaryText || note.fullTranscriptText || '';
      granolaUrl = item.granola || '';
      const ext = (note.attendees || []).filter(a => a.email && !a.email.includes('prescient'));
      contactName = ext[0]?.name || '';
      contactEmail = ext[0]?.email || '';
      addChat("agent", `<span style="color:#10b981;">Found: ${note.title || item.company}</span>`);
    } else {
      addChat("agent", `<span style="color:#f59e0b;">No Granola notes found. Using existing context.</span>`);
      granolaNotes = item.task || '';
    }
  } catch {
    addChat("agent", `<span style="color:#f59e0b;">Granola unavailable. Using existing context.</span>`);
    granolaNotes = item.task || '';
  }

  // Step 1: Run full pipeline
  addChat("agent", `<span style="color:#60a5fa;">Running pipeline: Analyze → Proposal → Email → CRM...</span>`);

  try {
    const res = await apiFetch('/api/post-call', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        step: 'all',
        company: item.company,
        contactName,
        contactEmail,
        granolaNotes,
        granolaUrl,
        hubspotDealId: deal?.id,
      }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Pipeline failed');

    // Report results
    let results = [];
    if (data.analysis) results.push(`<span style="color:#10b981;">&#10003; Call analyzed</span> — ${(data.analysis.summary || '').substring(0, 80)}`);
    if (data.proposal?.slackPosted) results.push(`<span style="color:#10b981;">&#10003; Proposal posted to #dealdesk</span>`);
    else if (data.proposal?.orderForm) results.push(`<span style="color:#f59e0b;">&#10003; Proposal generated (Slack not configured)</span>`);
    if (data.email?.body) results.push(`<span style="color:#10b981;">&#10003; Email drafted</span> — <a href="https://mail.google.com/mail/u/0/#drafts" target="_blank">Open Gmail</a>`);
    if (data.crm?.noteCreated) results.push(`<span style="color:#10b981;">&#10003; HubSpot updated</span>${data.crm.suggestedStage ? ` (suggest → ${data.crm.suggestedStage})` : ''}`);

    // LinkedIn — add as clickable link (avoid popup blockers)
    let liHtml = '';
    if (contactName) {
      try {
        const liRes = await apiFetch('/api/linkedin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contactName, company: item.company, context: data.analysis?.summary || item.task }),
        });
        const liData = await liRes.json();
        if (liData.profileUrl) {
          liHtml = `<span style="color:#60a5fa;">&#10003; LinkedIn ready</span> — <a href="${liData.profileUrl}" target="_blank">Connect with ${contactName}</a>`;
          results.push(liHtml);
        }
      } catch {}
    }

    addChat("agent", `<div style="font-size:14px;font-weight:700;color:#10b981;margin-bottom:8px;">&#10003; Quick Post-Call Complete — ${item.company}</div>${results.map(r => `<div style="font-size:12px;margin-bottom:4px;">${r}</div>`).join('')}`);

    // Clear briefing cache since pipeline changed
    _briefingCache = null;
    _intelligenceCache = null;

    // Update local pipeline if CRM suggested a stage
    if (data.crm?.suggestedStage && deal) {
      deal.stage = data.crm.suggestedStage;
      renderCurrentTab();
    }

    showToast(`Quick Post-Call done — ${item.company}`);
  } catch (err) {
    addChat("agent", `<span style="color:#ef4444;">Quick Post-Call failed: ${err.message}</span>`);
  }
}

function getOpen() { return ACTIONS.filter(a => a.status === "open"); }
function getDone() { return ACTIONS.filter(a => a.status === "done"); }
function getArchived() { return ACTIONS.filter(a => a.status === "archived"); }
function getSelected() { return ACTIONS.find(a => a.id === selectedId); }

function daysStale(lastActivity) {
  if (!lastActivity) return 0;
  return Math.floor((new Date() - new Date(lastActivity)) / 86400000);
}

function staleBadge(days, action) {
  // Suppress urgency badges for items that are progressing normally
  const cs = action?._signalState?.canonicalState;
  if (cs === 'MEETING_BOOKED' || cs === 'ALREADY_SCHEDULED' || cs === 'CLOSED_WON' || cs === 'MEETING_COMPLETED') return '';
  if (days >= 5) return `<span class="badge-overdue">${days}d overdue</span>`;
  if (days >= 3) return `<span class="badge-stale">${days}d ago</span>`;
  return `<span class="badge-fresh">${days}d ago</span>`;
}

function fmtMoney(n) {
  if (!n) return "";
  return "$" + (n >= 1000000 ? (n/1000000).toFixed(1) + "M" : (n/1000).toFixed(0) + "K");
}

// ═══════════════════════════════════════
// SELECT / ADVANCE / ARCHIVE
// ═══════════════════════════════════════
function selectItem(id) {
  const a = ACTIONS.find(x => x.id === id);
  if (!a || a.status !== "open") return;

  // Push nav state before selecting
  if (!_navRestoringState) {
    _navHistory.push({ tab: currentTab, selectedId });
    history.pushState({ tab: currentTab, selectedId: id }, '', `#${currentTab}/${id}`);
  }

  selectedId = id;
  _lastMentionedCompany = a.company;
  const days = daysStale(a.lastActivity);
  const urgencyColor = days >= 5 ? '#ef4444' : days >= 3 ? '#f59e0b' : '#10b981';
  const urgencyLabel = days >= 5 ? 'OVERDUE' : days >= 3 ? 'STALE' : 'FRESH';
  const urgencyBadge = `<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:${urgencyColor}20;color:${urgencyColor};margin-left:6px;">${days}d — ${urgencyLabel}</span>`;

  let chatMsg = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><strong style="font-size:14px;">${a.company}</strong>${urgencyBadge}</div>`;
  if (a.isIntro) {
    chatMsg += `<div style="font-size:11px;padding:6px 10px;margin-bottom:8px;border-radius:6px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);">`;
    chatMsg += `<span style="color:#10b981;font-weight:700;">🤝 Warm Intro</span>`;
    if (a.introducer) chatMsg += ` <span style="color:#94a3b8;">from</span> <strong style="color:#fff;">${a.introducer}</strong>`;
    if (a.introducerCompany) chatMsg += ` <span style="color:#64748b;">(${a.introducerCompany})</span>`;
    if (a.prospects?.length) {
      chatMsg += `<div style="margin-top:4px;color:#94a3b8;font-size:10px;">Prospect: ${a.prospects.map(p => `<strong style="color:#fff;">${p.name}</strong>${p.email ? ` &lt;${p.email}&gt;` : ''}`).join(', ')}</div>`;
    }
    chatMsg += `</div>`;
  } else if (a._signalState?.recommendation?.overridden) {
    const ss = a._signalState;
    const sc = getStateColor(ss.canonicalState);
    chatMsg += `<div style="font-size:11px;color:${sc};margin-bottom:8px;">`;
    chatMsg += `<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:${sc}20;color:${sc};margin-right:6px;">${formatStateName(ss.canonicalState)}</span>`;
    chatMsg += ss.recommendation.text;
    chatMsg += `</div>`;
    // Show scheduling detail panel for scheduling states
    const sched = ss.recommendation?.scheduling || ss.signals?.scheduling;
    if (sched?.proposedTimes?.length > 0) {
      const primary = sched.primaryProposal || sched.proposedTimes[0];
      const isAvail = sched.status === 'available_to_book';
      const isConflict = sched.status === 'conflict';
      chatMsg += `<div style="font-size:11px;padding:8px 10px;margin-bottom:8px;border-radius:6px;background:${isAvail ? 'rgba(16,185,129,0.08)' : isConflict ? 'rgba(239,68,68,0.08)' : 'rgba(34,211,238,0.08)'};border:1px solid ${isAvail ? 'rgba(16,185,129,0.2)' : isConflict ? 'rgba(239,68,68,0.2)' : 'rgba(34,211,238,0.2)'};">`;
      chatMsg += `<div style="font-weight:700;margin-bottom:4px;">${isAvail ? '✅' : isConflict ? '⚠️' : '📅'} Proposed: ${primary.raw || primary.date}</div>`;
      if (isAvail) {
        chatMsg += `<div style="color:#10b981;">Calendar is <strong>OPEN</strong> at this time. Confirm + send invite.</div>`;
      } else if (isConflict) {
        const conflicts = sched.availability?.conflicts || [];
        chatMsg += `<div style="color:#ef4444;">Conflicts with: ${conflicts.map(c => '<strong>' + c.title + '</strong>').join(', ')}</div>`;
        if (sched.alternatives?.length > 0) {
          const dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
          chatMsg += `<div style="color:#94a3b8;margin-top:4px;">Alternatives: ${sched.alternatives.map(d => dn[d.getDay()] + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}).toLowerCase()).join(', ')}</div>`;
        }
      }
      if (a.latestReplyFrom) {
        chatMsg += `<div style="color:#64748b;margin-top:4px;font-size:10px;">Proposed by: ${a.latestReplyFrom}${a.latestReplyDate ? ' on ' + a.latestReplyDate : ''}</div>`;
      }
      chatMsg += `</div>`;
    }
    if (ss.recommendation.originalAiRec && ss.recommendation.originalAiRec !== ss.recommendation.text) {
      chatMsg += `<div style="font-size:10px;color:#475569;margin-bottom:4px;text-decoration:line-through;">AI: ${ss.recommendation.originalAiRec}</div>`;
    }
  } else if (a.aiRec) {
    chatMsg += `<div style="font-size:11px;color:#a855f7;margin-bottom:8px;">AI: ${a.aiRec}</div>`;
  }
  if (a.emailSummary) {
    // When signal engine overrides, strip contradictory status lines from emailSummary
    let displaySummary = a.emailSummary;
    const overriddenState = a._signalState?.canonicalState;
    if (overriddenState && ['MEETING_BOOKED','ALREADY_SCHEDULED','MEETING_COMPLETED','AVAILABLE_TO_BOOK'].includes(overriddenState)) {
      // Remove stale "Status:" lines that contradict the signal state
      displaySummary = displaySummary.replace(/<strong>Status:<\/strong>[^<]*(?:<[^>]*>[^<]*)*?(?=<br|$)/gi, '');
      displaySummary = displaySummary.replace(/Waiting for (?:him|her|them) to book[^<]*/gi, '');
      displaySummary = displaySummary.replace(/May need a nudge[^<]*/gi, '');
      displaySummary = displaySummary.replace(/No response[^<]*yet[^<]*/gi, '');
      // Add meeting context if available
      const cal = a._signalState?.signals?.calendar;
      if (cal?.matchedEvent && (overriddenState === 'MEETING_BOOKED' || overriddenState === 'ALREADY_SCHEDULED')) {
        const ev = cal.matchedEvent;
        const d = new Date(ev.start);
        const dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const timeStr = d.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'}).toLowerCase();
        displaySummary += `<br><br><strong style="color:#a855f7;">📅 Meeting:</strong> ${ev.title || a.company} — ${dn[d.getDay()]} ${d.getMonth()+1}/${d.getDate()} at ${timeStr}`;
        if (ev.meetLink) displaySummary += ` · <a href="${ev.meetLink}" target="_blank" style="color:#60a5fa;">Join</a>`;
      }
    }
    chatMsg += `<div style="background:#0a0e1a;border:1px solid #1e293b;border-radius:6px;padding:10px 12px;margin:4px 0;font-size:12px;line-height:1.6;">${displaySummary}</div>`;
    if (a.emailUrl) chatMsg += `<a href="${a.emailUrl}" target="_blank" style="font-size:11px;">Open in Superhuman &rarr;</a>`;
  } else {
    chatMsg += `<div style="color:#94a3b8;font-size:13px;">${a.task}</div>`;
  }

  // For intros: show "What to do next" workflow panel with HubSpot entity check
  if (a.isIntro) {
    chatMsg += `<div id="introWorkflow-${a.id}" style="margin-top:10px;border:1px solid rgba(16,185,129,0.2);border-radius:8px;padding:10px 12px;background:rgba(16,185,129,0.04);">`;
    chatMsg += `<div style="font-size:12px;font-weight:700;color:#10b981;margin-bottom:8px;">What to do next</div>`;
    chatMsg += `<div style="font-size:11px;color:#64748b;margin-bottom:8px;"><div class="spin" style="display:inline-block;width:12px;height:12px;vertical-align:middle;margin-right:6px;"></div>Checking HubSpot for ${a.company}...</div>`;
    chatMsg += `</div>`;
    chatMsg += renderActionChips(a);
    addChat("agent", chatMsg);
    // Async: resolve HubSpot entity and update the workflow panel
    resolveIntroWorkflow(a);
  } else {
    chatMsg += renderActionChips(a);
    addChat("agent", chatMsg);
  }

  renderContextBar();
  renderCurrentTab();
}

function advanceToNext() {
  const open = getOpen();
  if (open.length === 0) {
    selectedId = null;
    const done = getDone().length;
    addChat("agent", `<div style="text-align:center;padding:12px 0;">
      <div style="font-size:28px;margin-bottom:6px;">🎉</div>
      <div style="font-size:15px;font-weight:700;color:#10b981;margin-bottom:4px;">All clear!</div>
      <div style="font-size:12px;color:#64748b;">${done} items handled today. Nice work, Mike.</div>
    </div>`);
    renderContextBar(); renderCurrentTab(); return;
  }
  const allOpen = ACTIONS.filter(a => a.status === "open");
  const curIdx = allOpen.findIndex(a => a.id === selectedId);
  const next = allOpen[curIdx + 1] || allOpen[0];
  selectItem(next.id);
}

function markDone(id) {
  const a = ACTIONS.find(x => x.id === id);
  if (!a) return;
  a.status = "done"; a.color = "tg";
  _briefingCache = null; _endOfDayCache = null; _endOfWeekCache = null; _intelligenceCache = null;
  runSignalEngine();
  updateProgressBadge();
  addChat("agent", `<span style="color:#10b981;font-weight:600;">✓ ${a.company} — done.</span> ${getOpen().length} remaining.`);
  setTimeout(() => advanceToNext(), 300);
}

function updateProgressBadge() {
  const done = getDone().length;
  const total = done + getOpen().length;
  const badge = document.getElementById("chatBadge");
  if (badge && done > 0) {
    badge.textContent = `${done}/${total} done`;
    badge.style.background = 'rgba(16,185,129,0.15)';
    badge.style.color = '#10b981';
  }
}

function archiveItem(id) {
  const a = ACTIONS.find(x => x.id === id);
  if (!a) return;
  a.status = "archived";
  _briefingCache = null; _endOfDayCache = null; _endOfWeekCache = null; _intelligenceCache = null;
  runSignalEngine();
  updateProgressBadge();
  addChat("agent", `<span style="color:#64748b;">✕ ${a.company} — archived.</span> ${getOpen().length} remaining.`);
  setTimeout(() => advanceToNext(), 300);
}

    postcall:       `<button class="ctx-big-btn ctx-postcall" onclick="showPostCallFlow(ACTIONS.find(a=>a.id===${sel.id}))"><span class="icon">🎙️</span> Post-Call</button>`,
    draft:          `<button class="ctx-big-btn ctx-draft" onclick="runAction('draft',${sel.id})"><span class="icon">✏️</span> Draft Email</button>`,
    prep:           `<button class="ctx-big-btn ctx-prep" onclick="buildPrep(ACTIONS.find(a=>a.id===${sel.id}))"><span class="icon">🧠</span> Prep</button>`,
    crm:            `<button class="ctx-big-btn ctx-crm" onclick="runAction('hubspot',${sel.id})"><span class="icon">⚡</span> CRM</button>`,
    linkedin:       `<button class="ctx-big-btn ctx-li" onclick="runAction('linkedin',${sel.id})"><span class="icon">💼</span> LinkedIn</button>`,
    proposal:       `<button class="ctx-big-btn" style="background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.3);" onclick="runAction('proposal',${sel.id})"><span class="icon">📄</span> Proposal</button>`,
    slack:          `<button class="ctx-big-btn ctx-slack-btn" onclick="showSlackMenu(${sel.id})"><span class="icon">💬</span> Slack</button>`,
    confirm_invite: `<button class="ctx-big-btn" style="background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.3);" onclick="confirmAndInvite(ACTIONS.find(a=>a.id===${sel.id}))"><span class="icon">📅</span> Confirm + Invite</button>`,
    alt_times:      `<button class="ctx-big-btn" style="background:rgba(245,158,11,0.15);color:#f59e0b;border:1px solid rgba(245,158,11,0.3);" onclick="runAction('draft',${sel.id})"><span class="icon">🔄</span> Suggest Alternatives</button>`,
    bump:           `<button class="ctx-big-btn ctx-draft" onclick="runAction('draft',${sel.id})"><span class="icon">📩</span> Send Bump</button>`,
    intro_reply:    `<button class="ctx-big-btn" style="background:rgba(16,185,129,0.15);color:#10b981;border:1px solid rgba(16,185,129,0.3);" onclick="runAction('draft',${sel.id})"><span class="icon">🤝</span> Reply to Intro</button>`,
    create_lead:    `<button class="ctx-big-btn ctx-crm" onclick="runAction('hubspot',${sel.id})"><span class="icon">➕</span> Create Lead</button>`,
    draft_calendly: `<button class="ctx-big-btn ctx-draft" onclick="runAction('draft',${sel.id})"><span class="icon">📅</span> Send Calendly</button>`,
  };
  const ss = sel._signalState;
  if (ss?.recommendation?.chips) {
    const chips = ss.recommendation.chips;
    const suppress = ss.recommendation.suppress || [];
    // Show chips from signal engine, always add crm and slack
    let btns = chips.map(c => allButtons[c]).filter(Boolean);
    if (!chips.includes('crm') && !suppress.includes('crm')) btns.push(allButtons.crm);
    if (!chips.includes('slack') && !suppress.includes('slack')) btns.push(allButtons.slack);
    return btns.join('');
  }
  // Fallback: show all standard buttons
  return [allButtons.postcall, allButtons.draft, allButtons.prep, allButtons.crm, allButtons.linkedin, allButtons.proposal, allButtons.slack].join('');
}

function goBack() {
  if (_navHistory.length === 0) {
    // Fallback: deselect item and show current tab
    selectedId = null;
    renderContextBar();
    renderCurrentTab();
    return;
  }
  const prev = _navHistory.pop();
  _navRestoringState = true;
  if (prev.selectedId) {
    currentTab = prev.tab;
    selectedId = prev.selectedId;
    renderContextBar();
    showTab(prev.tab, true);
  } else {
    selectedId = null;
    renderContextBar();
    showTab(prev.tab, true);
  }
  _navRestoringState = false;
}

// Browser back button support
window.addEventListener('popstate', () => {
  if (_navHistory.length > 0) {
    const prev = _navHistory.pop();
    _navRestoringState = true;
    currentTab = prev.tab;
    selectedId = prev.selectedId || null;
    renderContextBar();
    showTab(prev.tab, true);
    _navRestoringState = false;
  }
});

function startWork() {
  const open = getOpen();
  if (open.length === 0) { addChat("agent", "No open items!"); return; }
  startMyDay();
}

function runAction(type, id) {
  const sel = id ? ACTIONS.find(a => a.id === id) : getSelected();
  if (!sel) { addChat("agent", "Select an item first."); return; }
  if (id) selectedId = id;

  if (type === "draft") {
    showDraftModal(sel);
  } else if (type === "hubspot") {
    showCrmEditor(sel, _lastActionContext.analysis);
  } else if (type === "both" || type === "post-call") {
    showPostCallFlow(sel);
  } else if (type === "order" || type === "proposal") {
    showProposalModal(sel);
  } else if (type === "linkedin") {
    showLinkedInModal(sel);
  }
}

// 1. DRAFT EMAIL — Generates with AI, creates Gmail draft
//    Includes Granola recording link when available
// ═══════════════════════════════════════
async function showDraftModal(item, opts = {}) {
  const { alsoCrm = false, granolaUrl = null, granolaBody = null, callAnalysis = null } = opts;
  let prompt = item.draftPrompt;

  // ── SCHEDULING-AWARE DRAFT OVERRIDE ──
  // Check THREE sources for proposed times: signal engine, action data, and raw text
  const ss = item._signalState;
  const sched = ss?.recommendation?.scheduling || ss?.signals?.scheduling;
  const replyEmails = (item.replyTo || []).join(', ') || '';
  const prospectEmails = (item.prospects || []).map(p => p.email).filter(Boolean).join(', ');
  const allTo = [replyEmails, prospectEmails].filter(Boolean).join(', ');

  // Source 1: Signal engine scheduling data
  let proposedTime = sched?.primaryProposal || sched?.proposedTimes?.[0];

  // Source 2: Explicit proposedTimes on the action (works even without signal engine)
  if (!proposedTime && item.proposedTimes?.length > 0) {
    const pt = item.proposedTimes[0];
    proposedTime = { raw: pt.raw, date: new Date(pt.date), timezone: pt.timezone, source: 'action_data' };
  }

  // Source 3: latestReply text — parse proposed time directly
  if (!proposedTime && item.latestReply) {
    const timeMatch = item.latestReply.match(/(?:can you do|how about|let's do)?\s*((?:jan|feb|mar|march|apr|april|may|jun|june|jul|july|aug|sept?|oct|nov|dec)\w*\s+\d{1,2}(?:st|nd|rd|th)?)\s+(?:at\s+)?(\d{1,2}(?::\d{2})?\s*(?:am|pm))\s*(\w{2,4})?/i);
    if (timeMatch) {
      proposedTime = { raw: timeMatch[0].trim(), source: 'latest_reply' };
    }
  }

  // If we have a proposed time from ANY source, override the draft prompt
  if (proposedTime) {
    const schedState = ss?.canonicalState;
    if (schedState === 'SCHEDULING_CONFLICT' && sched?.alternatives?.length > 0) {
      // Conflict path — suggest alternatives
      const alts = sched.alternatives;
      const dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const altStr = alts.map(d => dn[d.getDay()] + ' ' + (d.getMonth()+1) + '/' + d.getDate() + ' at ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})).join(', ');
      prompt = `Draft a reply to ${item.company}. The prospect proposed "${proposedTime.raw}" but you have a conflict. ` +
        `Suggest these alternative times: ${altStr || 'a few times next week'}. ` +
        `To: ${allTo || item.company}. CC: brian@prescientai.com. ` +
        `Be warm and apologetic about the conflict. Keep it brief.`;
      console.log('[draft] CONFLICT override for ' + item.company);
    } else {
      // Confirm path — accept the proposed time
      prompt = `IMPORTANT: You are writing AS Mike True, CEO of Prescient AI. First person. NOT third person.\n` +
        `This is a CONFIRMATION email, NOT a follow-up or bump.\n\n` +
        `The other person proposed a specific meeting time: "${proposedTime.raw}"\n` +
        `You (Mike) are ACCEPTING this time. Write in FIRST PERSON ("I", "me", "my").\n` +
        `Do NOT say "works great for Mike" — you ARE Mike. Say "that works perfectly" or "I'm in".\n` +
        `Do NOT ask for availability. Do NOT say you're flexible on timing.\n\n` +
        `Draft a brief, warm reply (2-3 sentences max) that:\n` +
        `1. Confirms "${proposedTime.raw}" works\n` +
        `2. Says you'll send a calendar invite shortly\n` +
        `3. Expresses excitement to connect\n\n` +
        `Sign off as Mike or Michael.\n` +
        `To: ${allTo || item.company}. CC: brian@prescientai.com.\n` +
        `Context: ${item.task || item.company}`;
      console.log('[draft] CONFIRMATION override for ' + item.company + ': proposed=' + proposedTime.raw);
    }
  }

  if (!prompt && !callAnalysis) { addChat("agent", `No draft context for ${item.company}.`); return; }

  // Extract email addresses — for intros, use replyTo array; otherwise parse from prompt
  let toAddr = '';
  let ccAddrs = 'brian@prescientai.com';

  if (item.replyTo?.length) {
    // Use replyTo for intros, scheduling confirmations, and any thread reply
    toAddr = item.replyTo.join(', ');
    ccAddrs = 'brian@prescientai.com';
    // Add prospect emails not in replyTo
    const prospectExtras = (item.prospects || []).map(p => p.email).filter(e => e && !item.replyTo.includes(e));
    if (prospectExtras.length) ccAddrs = prospectExtras.join(', ') + ', ' + ccAddrs;
    console.log(`[draft] Reply-all to: ${toAddr}, cc: ${ccAddrs}`);
  } else if (item.isIntro) {
    toAddr = (item.prospects || []).map(p => p.email).filter(Boolean).join(', ');
    ccAddrs = 'brian@prescientai.com';
  } else {
    const emailMatch = (prompt || '').match(/[\w.+-]+@[\w.-]+\.\w+/g) || [];
    toAddr = emailMatch[0] || '';
    ccAddrs = emailMatch.slice(1).join(', ') || 'brian@prescientai.com';
  }

  const grLink = granolaUrl || item.granola || '';

  const modalTitle = proposedTime
    ? `📅 Confirm Meeting — ${item.company}`
    : `✏️ Draft Email — ${item.company}${item.isIntro ? ' (Warm Intro Reply)' : ''}`;

  showModal(modalTitle,
    `<div class="modal-loading"><div class="spin"></div>Generating email with AI...</div>`, '');

  try {
    // Build enhanced prompt with Granola context if available
    let fullPrompt = prompt || `Draft a follow-up email to ${item.company} after our call.`;

    // For intro emails WITHOUT a proposed time, inject Calendly link
    // (skip Calendly injection if we're confirming a specific time)
    if (item.isIntro && !proposedTime) {
      fullPrompt += `\n\nCALENDLY LINK (MUST INCLUDE): ${CALENDLY_LINK}\nThis is for "MT Open 30 minutes" — a casual intro call.\nFormat: Include the Calendly link as a clickable HTML anchor. Suggest a few time slots or say "feel free to grab a time that works".`;
    }

    if (callAnalysis) {
      fullPrompt += `\n\nCall Analysis:\nSummary: ${callAnalysis.summary || ''}\nKey Points: ${(callAnalysis.keyPoints || []).join('; ')}\nNext Steps: ${(callAnalysis.nextSteps || []).join('; ')}\nTone: ${callAnalysis.emailTone || 'warm followup'}`;
    }
    if (granolaBody) {
      fullPrompt += `\n\nCall Notes:\n${granolaBody.substring(0, 2000)}`;
    }
    if (grLink) {
      fullPrompt += `\n\nIMPORTANT: Include this meeting recording link in the email: ${grLink}\nSay something like "I've attached the recording from our call for your reference."`;
    }
    fullPrompt += '\n\nWrite the email body only (no subject line prefix). Use HTML formatting with <p> tags.';

    const res = await apiFetch('/api/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: fullPrompt }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'AI failed');

    // Subject line: use Re: for thread replies, especially for scheduling confirmations
    let subjectGuess = item.company + ' — Follow Up';
    if (proposedTime) {
      // Scheduling confirmation — always Re: the original thread
      const origSubject = item.emailSummary?.match(/Subject:<\/strong>\s*(.*?)(?:<br|$)/)?.[1]?.replace(/^Re:\s*/i, '').trim();
      subjectGuess = origSubject ? 'Re: ' + origSubject : 'Re: ' + item.company + ' and Prescient AI';
    } else if (item.isIntro && item.meta) {
      const origSubject = item.meta.split(' | ').slice(1).join(' | ');
      if (origSubject) subjectGuess = (origSubject.startsWith('Re:') ? '' : 'Re: ') + origSubject;
    }
    const emailBody = data.text || '';

    document.getElementById("modalBody").innerHTML = `
      <div class="modal-field">
        <label class="modal-label">To</label>
        <input class="modal-input" id="draftTo" value="${toAddr}" placeholder="email@example.com">
      </div>
      <div class="modal-field">
        <label class="modal-label">CC</label>
        <input class="modal-input" id="draftCc" value="${ccAddrs}" placeholder="cc@example.com">
      </div>
      <div class="modal-field">
        <label class="modal-label">Subject</label>
        <input class="modal-input" id="draftSubject" value="${subjectGuess}">
      </div>
      ${grLink ? `<div class="modal-field">
        <label class="modal-label">Granola Recording</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <input class="modal-input" id="draftGranolaUrl" value="${grLink}" style="flex:1;">
          <a href="${grLink}" target="_blank" style="font-size:11px;white-space:nowrap;">Open ↗</a>
        </div>
      </div>` : `<div class="modal-field">
        <label class="modal-label">Granola Recording (optional)</label>
        <input class="modal-input" id="draftGranolaUrl" value="" placeholder="Paste Granola recording URL...">
      </div>`}
      <div class="modal-field">
        <label class="modal-label">Body</label>
        <textarea class="modal-textarea" id="draftBody" rows="12">${emailBody}</textarea>
      </div>
      <div id="draftStatus"></div>`;

    document.getElementById("modalContainer").querySelector(".modal").insertAdjacentHTML('beforeend',
      `<div class="modal-footer" id="modalFooter">
        <button class="modal-btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="modal-btn-primary" onclick="createGmailDraft(${item.id}, ${alsoCrm})">Create Gmail Draft</button>
      </div>`);
  } catch (err) {
    document.getElementById("modalBody").innerHTML = `
      <div class="modal-error">Failed to generate: ${err.message}</div>
      <div style="margin-top:12px;">
        <div class="modal-field">
          <label class="modal-label">Prompt (copy manually)</label>
          <textarea class="modal-textarea" rows="6" readonly>${prompt || ''}</textarea>
        </div>
      </div>`;
    document.getElementById("modalContainer").querySelector(".modal").insertAdjacentHTML('beforeend',
      `<div class="modal-footer"><button class="modal-btn-secondary" onclick="closeModal()">Close</button></div>`);
  }
}

// ── Scheduling Actions ──

async function confirmAndInvite(item) {
  if (!item) return;
  const ss = item._signalState;
  const sched = ss?.recommendation?.scheduling || ss?.signals?.scheduling;
  const primary = sched?.primaryProposal || sched?.proposedTimes?.[0];

  if (!primary?.date) {
    addChat("agent", `No proposed time found for ${item.company}. Use Draft Email instead.`);
    return;
  }

  const d = new Date(primary.date);
  const dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }).toLowerCase();
  const dateStr = dn[d.getDay()] + ' ' + (d.getMonth()+1) + '/' + d.getDate() + ' at ' + timeStr;

  // Collect attendee emails
  const attendeeEmails = [];
  if (item.replyTo?.length) item.replyTo.forEach(e => attendeeEmails.push(e));
  if (item.prospects?.length) item.prospects.forEach(p => { if (p.email) attendeeEmails.push(p.email); });
  const uniqueEmails = [...new Set(attendeeEmails)].filter(e => !e.includes('prescientai.com') && !e.includes('prescient.ai'));
  // Always include Brian
  uniqueEmails.push('brian@prescientai.com');

  const attendeeList = uniqueEmails.map(e => `<div style="color:#94a3b8;">• ${e}</div>`).join('');

  addChat("agent", `<div style="font-size:11px;">
    <div style="font-weight:700;color:#10b981;margin-bottom:6px;">✅ Confirm + Invite: ${dateStr}${primary.timezone ? ' ' + primary.timezone : ''}</div>
    <div style="color:#94a3b8;margin-bottom:4px;">Attendees:</div>
    ${attendeeList}
    <div style="margin-top:8px;"><div class="spin" style="display:inline-block;width:14px;height:14px;vertical-align:middle;margin-right:6px;"></div><span style="color:#f59e0b;">Creating calendar event with Zoom...</span></div>
    <div id="calCreateStatus-${item.id}"></div>
  </div>`);

  try {
    // Create calendar event with Zoom
    const calRes = await apiFetch('/api/calendar-create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title: `${item.company} — Prescient AI Intro`,
        start: primary.date.toISOString ? primary.date.toISOString() : primary.date,
        attendees: uniqueEmails.map(e => ({ email: e, name: (item.prospects?.find(p => p.email === e)?.name) || undefined })),
        description: `Meeting with ${item.company}.\n\nContext: ${item.task || ''}\n\nScheduled via COS Agent.`,
        timezone: primary.timezone === 'EST' ? 'America/New_York' : primary.timezone === 'CST' ? 'America/Chicago' : primary.timezone === 'PST' ? 'America/Los_Angeles' : 'America/New_York',
        useZoom: true,
      }),
    });
    const calData = await calRes.json();

    const statusEl = document.getElementById(`calCreateStatus-${item.id}`);
    if (calData.success) {
      const confType = calData.conferenceType === 'zoom' ? 'Zoom' : 'Google Meet';
      if (statusEl) statusEl.innerHTML = `
        <div style="margin-top:8px;padding:8px 10px;border-radius:6px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);">
          <div style="font-weight:700;color:#10b981;margin-bottom:4px;">✅ Calendar invite sent!</div>

async function showAltTimesModal(item) {
  if (!item) return;
  const ss = item._signalState;
  const sched = ss?.recommendation?.scheduling || ss?.signals?.scheduling;
  const alts = sched?.alternatives || [];
  const primary = sched?.primaryProposal || sched?.proposedTimes?.[0];

  if (!primary?.date) {
    addChat("agent", `No proposed time found for ${item.company}. Use Draft Email instead.`);
    return;
  }

  const dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  if (alts.length === 0) {
    // No alternatives computed — just open draft with conflict context
    showDraftModal(item);
    return;
  }

  const altList = alts.map((d, i) => {
    const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }).toLowerCase();
    return `<div style="padding:4px 0;"><strong>${dn[d.getDay()]} ${d.getMonth()+1}/${d.getDate()}</strong> at ${timeStr}</div>`;
  }).join('');

  const conflicts = sched?.availability?.conflicts || [];
  const conflictName = conflicts[0]?.title || 'another meeting';
  const conflictTime = conflicts[0]?.start ? new Date(conflicts[0].start).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }).toLowerCase() : '';

  addChat("agent", `<div style="font-size:11px;">
    <div style="font-weight:700;color:#ef4444;margin-bottom:6px;">⚠️ ${primary.raw || 'Proposed time'} conflicts with "${conflictName}"${conflictTime ? ' at ' + conflictTime : ''}</div>
    <div style="color:#94a3b8;margin-bottom:6px;">Available alternatives:</div>
    <div style="margin-bottom:8px;padding:6px 10px;background:rgba(34,211,238,0.06);border:1px solid rgba(34,211,238,0.15);border-radius:6px;">${altList}</div>
    <div style="display:flex;gap:6px;">
      <button class="action-chip chip-draft" onclick="showDraftModal(ACTIONS.find(a=>a.id===${item.id}))">✏️ Draft with Alternatives</button>
    </div>
  </div>`);
}

async function createGmailDraft(itemId, alsoCrm) {
  const to = document.getElementById("draftTo").value.trim();
  const cc = document.getElementById("draftCc").value.trim();
  const subject = document.getElementById("draftSubject").value.trim();
  const body = document.getElementById("draftBody").value.trim();

  if (!to || !body) { document.getElementById("draftStatus").innerHTML = '<div class="modal-error">To and Body are required.</div>'; return; }

  document.getElementById("draftStatus").innerHTML = '<div class="modal-loading"><div class="spin"></div>Creating Gmail draft...</div>';

  try {
    const res = await apiFetch('/api/draft-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to, cc: cc || undefined, subject, body, threadId: ACTIONS.find(a => a.id === itemId)?.threadId || undefined }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to create draft');

    const item = ACTIONS.find(a => a.id === itemId);

    // Check if this action has a proposed time — auto-create calendar invite
    const ss = item?._signalState;
    const sched = ss?.recommendation?.scheduling || ss?.signals?.scheduling;
    let proposedTimeForInvite = sched?.primaryProposal || sched?.proposedTimes?.[0];
    if (!proposedTimeForInvite && item?.proposedTimes?.length) {
      proposedTimeForInvite = { raw: item.proposedTimes[0].raw, date: new Date(item.proposedTimes[0].date), timezone: item.proposedTimes[0].timezone };
    }

    if (proposedTimeForInvite?.date) {
      // Auto-create calendar invite after draft
      document.getElementById("draftStatus").innerHTML = `<div class="modal-success">&#10003; Draft created in Gmail</div><div class="modal-loading" style="margin-top:8px;"><div class="spin"></div>Creating calendar invite with Zoom...</div>`;

      addChat("agent", `<strong>&#10003; Gmail draft created</strong> — ${subject}<br><span style="color:#64748b;">To: ${to}</span><br><span style="color:#f59e0b;">Creating calendar invite...</span>`);

      // Collect attendees
      const attendeeEmails = [...new Set([...to.split(/[,;]\s*/), ...cc.split(/[,;]\s*/)])].filter(e => e.includes('@'));

      try {
        const calRes = await apiFetch('/api/calendar-create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: `${item.company} — Prescient AI Intro`,
            start: proposedTimeForInvite.date.toISOString ? proposedTimeForInvite.date.toISOString() : proposedTimeForInvite.date,
            attendees: attendeeEmails.map(e => ({ email: e.trim() })),
            description: `Meeting with ${item.company}.\n\nContext: ${item.task || ''}\n\nScheduled via COS Agent.`,
            timezone: proposedTimeForInvite.timezone === 'EST' ? 'America/New_York' : proposedTimeForInvite.timezone === 'CST' ? 'America/Chicago' : proposedTimeForInvite.timezone === 'PST' ? 'America/Los_Angeles' : 'America/New_York',
            useZoom: true,
          }),
        });
        const calData = await calRes.json();

        if (calData.success) {
          const confType = calData.conferenceType === 'zoom' ? 'Zoom' : 'Google Meet';
          document.getElementById("draftStatus").innerHTML = `
            <div class="modal-success">&#10003; Draft created in Gmail</div>
            <div class="modal-success" style="margin-top:4px;">&#10003; Calendar invite sent — ${confType}</div>
            <div style="font-size:11px;color:#94a3b8;margin-top:4px;">
              ${calData.meetLink ? `<a href="${calData.meetLink}" target="_blank" style="color:#60a5fa;">${confType} link</a> · ` : ''}
              <a href="${calData.htmlLink}" target="_blank" style="color:#60a5fa;">View in Calendar</a>
              · Invites sent to ${calData.attendees?.length || attendeeEmails.length} people
            </div>`;
          document.getElementById("modalFooter").innerHTML = `
            ${data.url ? `<a href="${data.url}" target="_blank" class="modal-btn-primary" style="text-decoration:none;display:inline-block;">Open Draft in Gmail</a>` : ''}
            <button class="modal-btn-green" onclick="closeModal();markDone(${itemId})">Done</button>`;
          addFeedItem('meeting', `<strong style="color:#10b981;">${item.company}</strong> — draft + calendar invite SENT for ${proposedTimeForInvite.raw}`, itemId);
          loadCalendar(); // Refresh
        } else {
          document.getElementById("draftStatus").innerHTML = `
            <div class="modal-success">&#10003; Draft created in Gmail</div>
            <div class="modal-error" style="margin-top:4px;">Calendar invite failed: ${calData.error || 'unknown'}</div>
            ${calData.hint ? `<div style="font-size:10px;color:#f59e0b;margin-top:4px;">${calData.hint}</div>` : ''}`;
          document.getElementById("modalFooter").innerHTML = `
            ${data.url ? `<a href="${data.url}" target="_blank" class="modal-btn-primary" style="text-decoration:none;display:inline-block;">Open Draft in Gmail</a>` : ''}
            <button class="modal-btn-green" onclick="closeModal()">Done</button>`;
        }
      } catch (calErr) {
        console.error('[createGmailDraft] Calendar invite failed:', calErr);
        document.getElementById("draftStatus").innerHTML = `
          <div class="modal-success">&#10003; Draft created in Gmail</div>
          <div class="modal-error" style="margin-top:4px;">Calendar invite failed: ${calErr.message}</div>`;
        document.getElementById("modalFooter").innerHTML = `
          ${data.url ? `<a href="${data.url}" target="_blank" class="modal-btn-primary" style="text-decoration:none;display:inline-block;">Open Draft in Gmail</a>` : ''}
          <button class="modal-btn-green" onclick="closeModal()">Done</button>`;
      }
    } else {
      // No proposed time — normal draft flow
      document.getElementById("draftStatus").innerHTML = `<div class="modal-success">&#10003; Draft created in Gmail</div>`;
      document.getElementById("modalFooter").innerHTML = `
        ${data.url ? `<a href="${data.url}" target="_blank" class="modal-btn-primary" style="text-decoration:none;display:inline-block;">Open in Gmail</a>` : ''}
        <button class="modal-btn-green" onclick="closeModal()">Done</button>`;
      addChat("agent", `<strong>&#10003; Gmail draft created</strong> — ${subject}<br><span style="color:#64748b;">To: ${to}</span>`);
    }

    if (alsoCrm && item) {
      setTimeout(() => { closeModal(); showCrmWizard(item); }, 500);
    }
  } catch (err) {
    document.getElementById("draftStatus").innerHTML = `<div class="modal-error">${err.message}</div>`;
  }
}

      <div class="modal-field">
        <label class="modal-label">Call Notes <span style="color:#475569;font-weight:400;">(pulled from Granola — edit if needed)</span></label>
        <textarea class="modal-textarea" id="pcGranolaNotes" rows="10" placeholder="Loading from Granola..."></textarea>
      </div>
    </div>
    <div id="pcPipelineStatus"></div>`,
    `<button class="modal-btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="modal-btn-primary" onclick="runPostCallAnalysis(${item.id})" id="pcAnalyzeBtn" disabled>Analyze Call →</button>`);

  // Auto-fetch from Granola API
  try {
    const res = await apiFetch('/api/granola', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        granolaUrl: item.granola || '',
        company: item.company,
        analyze: true,
      }),
    });
    const data = await res.json();

    const loadEl = document.getElementById("pcGranolaLoad");
    const formEl = document.getElementById("pcFormArea");
    const btn = document.getElementById("pcAnalyzeBtn");

    if (data.success && data.note) {
      const note = data.note;
      // Populate form with Granola data
      if (loadEl) loadEl.innerHTML = `<div class="modal-success" style="margin-bottom:12px;">&#10003; Found: <strong>${note.title || item.company}</strong> — ${new Date(note.createdAt).toLocaleDateString()}</div>`;
      if (formEl) formEl.style.display = 'block';

      const notesField = document.getElementById("pcGranolaNotes");
      const urlField = document.getElementById("pcGranolaUrl");
      const nameField = document.getElementById("pcContactName");
      const emailField = document.getElementById("pcContactEmail");

      // Fill in call notes (prefer summary, fall back to transcript)
      if (notesField) notesField.value = note.summaryMarkdown || note.summaryText || note.fullTranscriptText || '';

      // Fill in attendees
      const externalAttendees = (note.attendees || []).filter(a => a.email && !a.email.includes('prescient'));
      if (nameField && externalAttendees.length > 0 && !nameField.value) {
        nameField.value = externalAttendees[0].name || '';
      }
      if (emailField && externalAttendees.length > 0 && !emailField.value) {
        emailField.value = externalAttendees[0].email || '';
      }

      // If we already have analysis, skip straight to actions
      if (note.analysis && note.analysis.summary) {
        _postCallState = {
          item, deal,
          granolaUrl: urlField?.value || item.granola || '',
          contactName: nameField?.value || '',
          contactEmail: emailField?.value || '',
          granolaNotes: notesField?.value || '',
          itemId: item.id,
          analysis: note.analysis,
        };
        if (btn) { btn.disabled = false; btn.textContent = "Analyze Call →"; }
        // Show analysis immediately
        showPostCallAnalysisResult(item.id, note.analysis);
        return;
      }

      if (btn) { btn.disabled = false; btn.textContent = "Analyze Call →"; }
    } else {
      // Granola not available — show manual entry
      if (loadEl) loadEl.innerHTML = `<div style="color:#f59e0b;font-size:12px;margin-bottom:12px;">Could not pull from Granola (${data.error || 'API key not set'}). Paste notes manually below.</div>`;
      if (formEl) formEl.style.display = 'block';
      if (btn) { btn.disabled = false; }
    }
  } catch (err) {
    const loadEl = document.getElementById("pcGranolaLoad");
    const formEl = document.getElementById("pcFormArea");
    const btn = document.getElementById("pcAnalyzeBtn");
    if (loadEl) loadEl.innerHTML = `<div style="color:#f59e0b;font-size:12px;margin-bottom:12px;">Granola unavailable. Paste notes manually.</div>`;
    if (formEl) formEl.style.display = 'block';
    if (btn) { btn.disabled = false; }
  }
}

      'draft': `<button class="action-chip chip-draft" onclick="showDraftModal(ACTIONS.find(a=>a.id===${item.id}), {callAnalysis: _lastActionContext.analysis, granolaBody: _lastActionContext.granolaNote?.summaryText||''})">✏️ Draft Email</button>`,
      'postcall': `<button class="action-chip chip-postcall" onclick="showPostCallFlow(ACTIONS.find(a=>a.id===${item.id}))">🎙️ Post-Call</button>`,
      'draft_calendly': `<button class="action-chip chip-draft" style="background:rgba(16,185,129,0.15);color:#10b981;border-color:rgba(16,185,129,0.3);" onclick="showDraftModal(ACTIONS.find(a=>a.id===${item.id}))">📅 Draft + Calendly</button>`,
      'bump': `<button class="action-chip chip-draft" onclick="showDraftModal(ACTIONS.find(a=>a.id===${item.id}))">📩 Bump</button>`,
      'create_lead': `<button class="action-chip chip-hubspot" style="background:rgba(245,158,11,0.15);color:#f59e0b;border-color:rgba(245,158,11,0.3);" onclick="showCrmEditor(ACTIONS.find(a=>a.id===${item.id}))">➕ Create Lead</button>`,
      'proposal': `<button class="action-chip chip-proposal" onclick="showProposalModal(ACTIONS.find(a=>a.id===${item.id}))">📄 Order Form</button>`,
      'confirm_invite': `<button class="action-chip" style="background:#10b981;color:#fff;border-color:#10b981;font-weight:700;" onclick="confirmAndInvite(ACTIONS.find(a=>a.id===${item.id}))">✅ Confirm + Send Invite</button>`,
      'alt_times': `<button class="action-chip chip-draft" style="background:rgba(34,211,238,0.15);color:#22d3ee;border-color:rgba(34,211,238,0.3);" onclick="showAltTimesModal(ACTIONS.find(a=>a.id===${item.id}))">🕐 Suggest Other Times</button>`,
    };
    const suppress = ss.recommendation.suppress || [];
    ss.recommendation.chips.forEach(key => {
      if (chipTemplates[key] && !suppress.includes(key)) chips.push(chipTemplates[key]);
    });
    // Always add overflow chips that aren't suppressed
    if (!suppress.includes('linkedin')) chips.push(`<button class="action-chip chip-linkedin" onclick="showLinkedInModal(ACTIONS.find(a=>a.id===${item.id}))">💼 LinkedIn</button>`);
    chips.push(`<button class="action-chip chip-slack" onclick="showSlackMenu(${item.id})">💬 Slack</button>`);
    return `<div class="action-chips">${chips.join('')}</div>`;
  }

  // Fallback: existing chip logic (no signal state available)
  if (item.isIntro) {
    chips.push(`<button class="action-chip" style="background:#10b981;color:#fff;border-color:#10b981;font-weight:700;" onclick="showDraftModal(ACTIONS.find(a=>a.id===${item.id}))">🤝 Reply with Calendly</button>`);
  }

  chips.push(`<button class="action-chip chip-proposal" onclick="showProposalModal(ACTIONS.find(a=>a.id===${item.id}))">📄 Order Form</button>`);
  chips.push(`<button class="action-chip chip-hubspot" onclick="showCrmEditor(ACTIONS.find(a=>a.id===${item.id}), _lastActionContext.analysis)">⚡ HubSpot</button>`);
  chips.push(`<button class="action-chip chip-draft" onclick="showDraftModal(ACTIONS.find(a=>a.id===${item.id}), {callAnalysis: _lastActionContext.analysis, granolaBody: _lastActionContext.granolaNote?.summaryText||''})">✏️ Draft Email</button>`);
  chips.push(`<button class="action-chip chip-prep" onclick="buildPrep(ACTIONS.find(a=>a.id===${item.id}))">🧠 Prep</button>`);
  chips.push(`<button class="action-chip chip-linkedin" onclick="showLinkedInModal(ACTIONS.find(a=>a.id===${item.id}))">💼 LinkedIn</button>`);
  chips.push(`<button class="action-chip chip-slack" onclick="showSlackMenu(${item.id})">💬 Slack</button>`);
  if (item.granola || extraContext.granolaNote) {
    chips.unshift(`<button class="action-chip chip-postcall" onclick="showPostCallFlow(ACTIONS.find(a=>a.id===${item.id}))">🎙️ Post-Call</button>`);
  }
  return `<div class="action-chips">${chips.join('')}</div>`;
}

async function resolveIntroWorkflow(item) {
  const panel = document.getElementById(`introWorkflow-${item.id}`);
  if (!panel) return;

  console.log(`[intro:workflow] Resolving HubSpot entity for: ${item.company}`);

  // 1. Check local PIPELINE first
  const localDeal = PIPELINE.find(d => d.name.toLowerCase().includes(item.company.toLowerCase()));

  // 2. Search HubSpot for company/deal/contact
  let hubspotMatch = { deals: [], companies: [], contacts: [], hasMatch: false };
  try {
    const res = await apiFetch('/api/crm-update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'search_company', query: item.company }),
    });
    const data = await res.json();
    if (data.success) hubspotMatch = data.result;
  } catch (e) {
    console.error('[intro:workflow] HubSpot search failed:', e);
  }

  console.log(`[intro:workflow] HubSpot match: hasMatch=${hubspotMatch.hasMatch}, deals=${hubspotMatch.deals.length}, companies=${hubspotMatch.companies.length}, contacts=${hubspotMatch.contacts.length}`);

  // 3. Build structured recommendations
  const recs = [];
  const hasExistingDeal = localDeal || hubspotMatch.deals.length > 0;
  const hasExistingCompany = hubspotMatch.companies.length > 0;
  const existingDeal = localDeal || (hubspotMatch.deals[0] ? { id: hubspotMatch.deals[0].id, name: hubspotMatch.deals[0].name, stage: hubspotMatch.deals[0].stage } : null);
  const prospectEmail = item.prospects?.[0]?.email || (item.replyTo || []).find(e => !e.includes('prescient')) || '';
  const prospectName = item.prospects?.[0]?.name || '';

  // Store for use by createLeadFromIntro
  item._hubspotMatch = hubspotMatch;

  // Rec 1: Reply with Calendly (always first for intros)
  recs.push({
    title: 'Reply with Calendly link',
    reason: `Thank ${item.introducer || 'introducer'}, connect with prospect, suggest a call`,
    priority: 'high',
    targetCompany: item.company,
    actionable: true,
    actionType: 'draft_intro_reply',
    icon: '🤝',
    btnStyle: 'background:#10b981;color:#fff;border-color:#10b981;',
  });

  // Rec 2: CRM — create or update
  if (!hasExistingDeal && !hasExistingCompany) {
    recs.push({
      title: 'Create new lead in HubSpot',
      reason: `No existing record found for ${item.company}. Create deal + company + contact.`,
      priority: 'high',
      targetCompany: item.company,
      actionable: true,
      actionType: 'create_lead',
      icon: '➕',
      btnStyle: 'background:rgba(245,158,11,0.15);color:#f59e0b;border-color:rgba(245,158,11,0.3);',
    });
  } else if (hasExistingDeal) {
    recs.push({
      title: `Update existing deal — ${existingDeal.name || item.company}`,
      reason: `Deal exists${existingDeal.stage ? ' at ' + existingDeal.stage : ''}. Attach intro context and update notes.`,
      priority: 'medium',
      targetCompany: item.company,
      actionable: true,
      actionType: 'update_existing_deal',
      icon: '⚡',
      btnStyle: 'background:rgba(96,165,250,0.12);color:#60a5fa;border-color:rgba(96,165,250,0.3);',
    });
  } else {
    recs.push({
      title: `Company exists — create deal for ${item.company}`,
      reason: `Company found in HubSpot but no active deal. Create opportunity.`,
      priority: 'high',
      targetCompany: item.company,
      actionable: true,
      actionType: 'create_deal_existing_company',
      icon: '➕',
      btnStyle: 'background:rgba(245,158,11,0.15);color:#f59e0b;border-color:rgba(245,158,11,0.3);',
    });
  }

  // Rec 3: Prep
  recs.push({
    title: 'Prep intro response',
    reason: `Research ${item.company} before replying`,
    priority: 'medium',
    targetCompany: item.company,
    actionable: true,
    actionType: 'prep',
    icon: '🧠',
    btnStyle: 'background:rgba(168,85,247,0.12);color:#a855f7;border-color:rgba(168,85,247,0.3);',
  });

  // Rec 4: LinkedIn
  if (prospectName) {
    recs.push({
      title: `Connect with ${prospectName} on LinkedIn`,
      reason: 'Send connection request to warm up before the call',
      priority: 'low',
      targetCompany: item.company,
      actionable: true,
      actionType: 'linkedin',
      icon: '💼',
      btnStyle: 'background:rgba(59,130,246,0.12);color:#3b82f6;border-color:rgba(59,130,246,0.3);',
    });
  }

  console.log(`[intro:workflow] Generated ${recs.length} recommendations, crmMatch=${hasExistingDeal ? 'deal' : hasExistingCompany ? 'company' : 'none'}`);

  // 4. Render the workflow panel
  let html = `<div style="font-size:12px;font-weight:700;color:#10b981;margin-bottom:10px;">What to do next</div>`;

  // CRM status banner
  if (!hasExistingDeal && !hasExistingCompany) {
    html += `<div style="font-size:11px;padding:6px 10px;margin-bottom:10px;border-radius:5px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);color:#f59e0b;font-weight:600;">⚠ No HubSpot record found for ${item.company}</div>`;
  } else if (hasExistingDeal) {
    html += `<div style="font-size:11px;padding:6px 10px;margin-bottom:10px;border-radius:5px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#10b981;">✓ Deal exists: <strong>${existingDeal.name}</strong>${existingDeal.stage ? ' — ' + existingDeal.stage : ''}</div>`;
  } else {
    html += `<div style="font-size:11px;padding:6px 10px;margin-bottom:10px;border-radius:5px;background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.2);color:#60a5fa;">Company found in HubSpot — no active deal</div>`;

  recs.forEach((r, i) => {
    const onclick = introWorkflowAction(item, r);

      <button onclick="${onclick}" style="font-size:11px;padding:5px 10px;border-radius:5px;${r.btnStyle}cursor:pointer;font-weight:600;border:1px solid;white-space:nowrap;flex-shrink:0;">${r.icon} ${r.title}</button>
      <span style="font-size:10px;color:#64748b;line-height:1.5;padding-top:3px;">${r.reason}</span>
    </div>`;
  });

  panel.innerHTML = html;
}

function introWorkflowAction(item, rec) {
  const esc = (s) => (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
  switch (rec.actionType) {
    case 'draft_intro_reply':
      return `showDraftModal(ACTIONS.find(a=>a.id===${item.id}))`;
    case 'create_lead':
      return `createLeadFromIntro(${item.id})`;
    case 'create_deal_existing_company':
      return `createLeadFromIntro(${item.id})`;
    case 'update_existing_deal':
      return `showCrmEditor(ACTIONS.find(a=>a.id===${item.id}))`;
    case 'prep':
      return `buildPrep(ACTIONS.find(a=>a.id===${item.id}))`;
    case 'linkedin':
      return `showLinkedInModal(ACTIONS.find(a=>a.id===${item.id}))`;
    default:
      return `selectItem(${item.id})`;
  }
}

async function createLeadFromIntro(itemId) {
  const item = ACTIONS.find(a => a.id === itemId);
  if (!item) return;

  const prospectEmail = item.prospects?.[0]?.email || (item.replyTo || []).find(e => !e.includes('prescient')) || '';
  const prospectName = item.prospects?.[0]?.name || '';
  const introContext = [
    `Warm intro from ${item.introducer || 'unknown'}${item.introducerCompany ? ' (' + item.introducerCompany + ')' : ''}`,
    `Prospect: ${prospectName}${prospectEmail ? ' <' + prospectEmail + '>' : ''}`,
    `Source: Email intro — ${item.meta || ''}`,
    `Task: ${item.task || ''}`,
    `Date: ${item.lastActivity || new Date().toISOString().split('T')[0]}`,
  ].join('\n');

  console.log(`[intro:create_lead] Creating lead for: ${item.company}, contact: ${prospectName} <${prospectEmail}>`);

  // Show inline loading
  const panel = document.getElementById(`introWorkflow-${item.id}`);
  if (panel) {

    if (dealId) {

        id: dealId,

        owner: 'Mike',
        _syncSource: 'hubspot',

    // Success feedback
    let successHtml = `<div style="font-size:11px;padding:8px 10px;border-radius:5px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);margin-bottom:8px;">`;

    // Re-render remaining actions (reply + prep)
    successHtml += `<div style="font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:6px;">Next steps:</div>`;
    successHtml += `<div style="display:flex;gap:6px;flex-wrap:wrap;">`;

  const currentStage = opts.presetStage || (deal ? (STAGE_MAP[deal.dealstage] || deal.stage || '') : (analysis?.suggestedDealStage || ''));
  const dealValue = analysis?.dealValueEstimate || (deal ? deal.amount || '' : item.dealValue || '');
  const closeDate = deal?.close || new Date(Date.now() + 90*86400000).toISOString().split('T')[0];

async function pullEmailThread(company) {
  const statusEl = document.getElementById('crmEmailThreadStatus');
  const noteEl = document.getElementById('crmEditorNote');
  if (!statusEl || !noteEl) return;

  statusEl.innerHTML = '<div style="font-size:11px;color:#64748b;display:flex;align-items:center;gap:6px;"><div class="spin" style="width:14px;height:14px;"></div>Searching Gmail for ' + company + '...</div>';

  try {
    const res = await apiFetch('/api/crm-update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'search_emails', query: company, maxResults: 15 }),
    });
    const data = await res.json();
    if (!data.success || !data.result?.length) {
      statusEl.innerHTML = '<div style="font-size:11px;color:#f59e0b;">No emails found for "' + company + '"</div>';
      return;
    }

    const emails = data.result;
    // Group by thread
    const threads = {};
    for (const e of emails) {
      if (!threads[e.threadId]) threads[e.threadId] = [];
      threads[e.threadId].push(e);
    }

    // Build formatted thread summary
    let threadText = `\n\n--- Email Thread: ${company} (${emails.length} messages) ---\n`;
    for (const [threadId, msgs] of Object.entries(threads)) {
      const subject = msgs[0].subject || '(no subject)';
      threadText += `\nSubject: ${subject}\n`;
      for (const m of msgs) {
        const dateStr = m.date ? new Date(m.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
        const fromName = m.from.replace(/<.*>/, '').trim();
        threadText += `  ${dateStr} — ${fromName}: ${m.snippet}\n`;
      }
    }

    // Append to notes
    noteEl.value = (noteEl.value ? noteEl.value + '\n' : '') + threadText;
    statusEl.innerHTML = `<div style="font-size:11px;color:#10b981;">Pulled ${emails.length} emails across ${Object.keys(threads).length} thread(s)</div>`;
  } catch (err) {
    statusEl.innerHTML = `<div style="font-size:11px;color:#ef4444;">Error: ${err.message}</div>`;
  }
}

async function submitCrmEditor(itemId) {
  const item = ACTIONS.find(a => a.id === itemId) || window._crmEditorItem || { id: itemId, company: 'Unknown' };
  const deal = PIPELINE.find(d => d.name.toLowerCase().includes(item.company.toLowerCase()));
  const stage = document.getElementById("crmEditorStage").value;
  const value = document.getElementById("crmEditorValue").value.trim();
  const closeDate = document.getElementById("crmEditorCloseDate").value;
  const note = document.getElementById("crmEditorNote").value.trim();
  const contactName = document.getElementById("crmEditorContactName").value.trim();
  const contactEmail = document.getElementById("crmEditorContactEmail").value.trim();
  const statusEl = document.getElementById("crmEditorStatus");

  statusEl.innerHTML = '<div class="modal-loading"><div class="spin"></div>Updating HubSpot...</div>';
  const results = [];

  try {
    // Update stage if changed
    const currentStage = deal ? (STAGE_MAP[deal.dealstage] || deal.stage || '') : '';
    if (deal && stage !== currentStage) {
      const stageId = STAGE_IDS[stage] || stage;
      await crmDoUpdateStage(deal.id, stageId, item.company, stage);
      results.push('Stage updated');
    }

    // Update deal properties (value, close date, closed lost fields)
    if (deal) {
      const props = {};
      if (value) props.amount = value;
      if (closeDate) props.closedate = closeDate;
      // Closed Lost specific fields
      if (stage === 'Closed Lost') {
        const lostReason = document.getElementById('crmEditorLostReason')?.value;
        const competitor = document.getElementById('crmEditorCompetitor')?.value?.trim();
        if (lostReason) props.closed_lost_reason = lostReason;
        if (competitor) props.hs_lost_to_competitor = competitor;
      }
      if (Object.keys(props).length > 0) {
        await apiFetch('/api/crm-update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'update_deal', dealId: deal.id, properties: props }),
        });
        if (value) results.push('Value updated');
        if (closeDate) results.push('Close date updated');
        if (props.closed_lost_reason) results.push('Lost reason: ' + props.closed_lost_reason);
      }
    }

    // Add note
    if (note) {
      await apiFetch('/api/crm-update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'add_note', dealId: deal?.id || undefined, note, companyName: item.company }),
      });
      results.push('Note saved');
    }

    // Create contact if new email provided
    if (contactEmail && contactName) {
      try {
        await apiFetch('/api/crm-update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'create_contact', email: contactEmail, name: contactName, company: item.company }),
        });
        results.push('Contact created/updated');
      } catch (e) { /* contact creation is best-effort */ }
    }

    statusEl.innerHTML = `<div class="modal-success" style="margin-top:12px;">&#10003; ${results.join(' · ') || 'Updated'} — ${item.company}</div>`;
    document.getElementById("modalFooter").innerHTML = `<button class="modal-btn-green" onclick="closeModal()">Done</button>`;
    addChat("agent", `<strong>&#10003; HubSpot updated</strong> — ${item.company}: ${results.join(', ')}`);
    _intelligenceCache = null;
  } catch (err) {
    statusEl.innerHTML = `<div class="modal-error">${err.message}</div>`;
  }
}

async function runPostCallAnalysis(itemId) {
  const item = ACTIONS.find(a => a.id === itemId) || { id: itemId, company: 'Unknown' };

  const contactEmail = document.getElementById("pcContactEmail")?.value.trim() || '';

  if (!granolaNotes) {
    document.getElementById("pcPipelineStatus").innerHTML = '<div class="modal-error">No call notes found. Paste notes or check Granola API key.</div>';
    return;
  }

  _postCallState = { item, deal, granolaUrl, contactName, contactEmail, granolaNotes, itemId };

  if (_postCallState.analysis) {

  document.getElementById("pcPipelineStatus").innerHTML = `<div class="modal-loading"><div class="spin"></div>Analyzing call with AI...</div>`;

  if (btn) { btn.disabled = true; btn.textContent = "Analyzing..."; }

  try {
    const res = await apiFetch('/api/post-call', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        step: 'analyze',
        company: item.company,
        contactName,
        contactEmail,
        granolaNotes,
        granolaUrl,
        hubspotDealId: deal?.id,
      }),
    });

    _postCallState.analysis = data.analysis;
    showPostCallAnalysisResult(itemId, data.analysis);

    document.getElementById("pcPipelineStatus").innerHTML = `<div class="modal-error">${err.message}</div>`;

function filterSlackPicker(query) {
  const q = query.toLowerCase().replace(/^[#@]/, '');
  const isChannelSearch = query.startsWith('#');
  const isUserSearch = query.startsWith('@');

  document.querySelectorAll('#slackPickerChannels .slack-opt').forEach(el => {
    el.style.display = (!isUserSearch && el.textContent.toLowerCase().includes(q)) ? '' : 'none';
  });
  document.querySelectorAll('#slackPickerUsers .slack-opt').forEach(el => {
    el.style.display = (!isChannelSearch && el.textContent.toLowerCase().includes(q)) ? '' : 'none';
  });
}

function toggleSlackPicker() {
  const picker = document.getElementById("slackPicker");
  if (picker) picker.style.display = picker.style.display === "none" ? "block" : "none";
}

function pickSlackTarget(id, label) {
  document.getElementById("slackTo").value = id;
  document.getElementById("slackToLabel").textContent = label;
  document.getElementById("slackPicker").style.display = "none";
}

function generateSlackMsg(a) {
  const lines = [`*${a.company}* — update`, a.task];
  if (a.meta) lines.push(`_${a.meta.replace(/<[^>]*>/g,"")}_`);
  const days = daysStale(a.lastActivity);
  if (days >= 5) lines.push(`⚠️ ${days}d since last activity`);
  return lines.join("\n");
}

async function sendSlack(id) {
  const a = ACTIONS.find(x => x.id === id);
  if (!a) return;
  const target = document.getElementById("slackTo").value.trim();
  const label = document.getElementById("slackToLabel").textContent.trim();
  const msg = document.getElementById("slackMsg").value.trim();
  if (!target || !msg) return;

  const btn = document.getElementById("slackSendBtn");
  const status = document.getElementById("slackStatus");
  if (btn) { btn.disabled = true; btn.textContent = "Sending..."; }

  try {
    const payload = { text: msg };
    // If target looks like a Slack ID (starts with C or U), use it directly
    if (target.startsWith('C') || target.startsWith('U')) {
      payload.channel = target;
    } else if (target.startsWith('#')) {
      payload.channel = target.substring(1); // Slack accepts channel name without #
    } else {
      payload.channel = target;
    }

    const res = await apiFetch('/api/slack', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Send failed');

    const sentAs = data.sentAs === 'user' ? '' : ' <span style="color:#f59e0b;font-size:10px;">(via COS bot)</span>';
    if (status) status.innerHTML = `<div class="modal-success" style="font-size:12px;">&#10003; Sent to ${label}${sentAs}</div>`;
    if (btn) { btn.textContent = "Sent ✓"; btn.style.background = "rgba(16,185,129,0.2)"; btn.style.color = "#10b981"; }
    addChat("agent", `<strong>&#10003; Slack sent</strong> → ${label}${sentAs}<br><span style="color:#64748b;font-size:11px;">${msg.substring(0, 100)}${msg.length > 100 ? '...' : ''}</span>`);
    runSignalEngine();
    setTimeout(() => renderContextBar(), 1500);
  } catch (err) {
    if (status) status.innerHTML = `<div class="modal-error">${err.message}</div>`;
    if (btn) { btn.disabled = false; btn.textContent = "Send to Slack"; }
  }
}
