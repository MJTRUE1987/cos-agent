<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prescient AI — Chief of Staff</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e1a; color: #e2e8f0; min-height: 100vh; }
  a { color: #60a5fa; text-decoration: none; }
  a:hover { text-decoration: underline; }
  button { cursor: pointer; border: none; font-family: inherit; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 5px; transition: all 0.15s; }
  button:active { transform: scale(0.96); }
  .layout { display: flex; height: 100vh; }

  /* SIDEBAR */
  .sidebar { width: 200px; background: #0f1525; border-right: 1px solid #1e293b; padding: 20px 14px; flex-shrink: 0; display: flex; flex-direction: column; }
  .sidebar h2 { font-size: 14px; color: #fff; font-weight: 700; margin-bottom: 4px; }
  .sidebar .sub { font-size: 11px; color: #10b981; margin-bottom: 20px; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; color: #94a3b8; font-size: 13px; cursor: pointer; margin-bottom: 2px; }
  .nav-item:hover, .nav-item.active { background: #1e293b; color: #fff; }
  .nav-item .dot { width: 6px; height: 6px; border-radius: 50%; }
  .nav-item .count { margin-left: auto; font-size: 10px; background: #1e293b; color: #64748b; padding: 1px 6px; border-radius: 8px; }
  .sidebar .spacer { flex: 1; }
  .sidebar .user { font-size: 12px; color: #64748b; border-top: 1px solid #1e293b; padding-top: 12px; }
  .sidebar .user strong { color: #cbd5e1; display: block; }

  /* CENTER */
  .center { flex: 1; overflow-y: auto; padding: 24px 28px; }
  .center h1 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .center .subtitle { font-size: 13px; color: #64748b; margin-bottom: 20px; }

  /* SECTION HEADERS */
  .section { margin-bottom: 28px; }
  .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .section-icon { font-size: 16px; }
  .section-title { font-size: 13px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
  .section-count { font-size: 10px; color: #475569; background: #1e293b; padding: 1px 6px; border-radius: 8px; }
  .section-empty { font-size: 13px; color: #334155; padding: 12px 16px; font-style: italic; }

  /* MEETING CARD (Today → Up Next) */
  .mtg-card { background: #111827; border: 2px solid #1e293b; border-radius: 8px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
  .mtg-card:hover { border-color: #334155; }
  .mtg-card.selected { border-color: #3b82f6; background: rgba(59,130,246,0.06); }
  .mtg-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .mtg-date { font-size: 11px; color: #10b981; font-weight: 700; background: rgba(16,185,129,0.12); padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
  .mtg-title { font-size: 14px; font-weight: 600; color: #fff; flex: 1; }
  .mtg-people { font-size: 11px; color: #64748b; }
  .mtg-summary { font-size: 12px; color: #94a3b8; line-height: 1.5; margin-bottom: 6px; }
  .mtg-action { font-size: 12px; color: #f59e0b; font-weight: 500; }
  .mtg-btns { display: flex; gap: 6px; margin-top: 8px; }

  /* ITEMS (Reply Now, CRM Gaps, Leads) */
  .item { background: #111827; border: 2px solid #1e293b; border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; transition: all 0.2s; position: relative; }
  .item:hover { border-color: #334155; background: #131b2e; transform: translateY(-1px); }
  .item.selected { border-color: #3b82f6; background: rgba(59,130,246,0.08); box-shadow: 0 0 0 1px rgba(59,130,246,0.1); }
  .item .company { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
  .item .body { flex: 1; min-width: 0; }
  .item .body .task { font-size: 13px; color: #cbd5e1; line-height: 1.4; }
  .item .body .meta { font-size: 11px; color: #64748b; margin-top: 3px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .item .actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; flex-wrap: wrap; }
  .badge-overdue { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; background: rgba(239,68,68,0.15); color: #ef4444; }
  .badge-stale { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; background: rgba(245,158,11,0.15); color: #f59e0b; }
  .badge-fresh { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; background: rgba(16,185,129,0.15); color: #10b981; }
  .deal-val { font-size: 10px; color: #10b981; font-weight: 600; }
  .owner-tag { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
  .owner-mike { background: rgba(96,165,250,0.15); color: #60a5fa; }
  .owner-brian { background: rgba(168,85,247,0.15); color: #a855f7; }
  .owner-will { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .owner-other { background: rgba(100,116,139,0.15); color: #94a3b8; }
  .btn-link { background: transparent; color: #64748b; border: 1px solid #334155; }
  .btn-link:hover { color: #cbd5e1; border-color: #475569; }
  .btn-sm { font-size: 10px; padding: 3px 8px; border-radius: 4px; background: transparent; border: 1px solid #334155; color: #94a3b8; }
  .btn-sm:hover { border-color: #60a5fa; color: #60a5fa; }
  .btn-action { font-size: 10px; padding: 4px 10px; border-radius: 4px; background: #1e40af; color: #93c5fd; }
  .btn-action:hover { background: #1d4ed8; }

  .tag { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 3px; }
  .tg { background: rgba(16,185,129,0.15); color: #10b981; }
  .tb { background: rgba(96,165,250,0.15); color: #60a5fa; }
  .ta { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .tr { background: rgba(239,68,68,0.15); color: #ef4444; }
  .tp { background: rgba(168,85,247,0.15); color: #a855f7; }
  .done-item { opacity: 0.4; cursor: default; }
  .done-item .task { text-decoration: line-through; }
  .archived-item { display: none; }

  /* SEARCH BAR (Leads) */
  .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .search-input { flex: 1; background: #111827; border: 1px solid #1e293b; border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: 13px; font-family: inherit; outline: none; }
  .search-input::placeholder { color: #475569; }
  .search-input:focus { border-color: #3b82f6; }
  .filter-btn { padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; background: #111827; border: 1px solid #1e293b; color: #94a3b8; cursor: pointer; }
  .filter-btn:hover, .filter-btn.active { border-color: #3b82f6; color: #60a5fa; background: rgba(59,130,246,0.08); }
  .ai-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; background: rgba(168,85,247,0.15); color: #a855f7; }

  /* PIPELINE TABLE */
  .pipe-table { width: 100%; border-collapse: collapse; }
  .pipe-table th { font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 0.8px; text-align: left; padding: 8px 12px; border-bottom: 1px solid #1e293b; }
  .pipe-table td { font-size: 13px; padding: 10px 12px; border-bottom: 1px solid rgba(30,41,59,0.4); }
  .pipe-table tr:hover { background: rgba(30,41,59,0.3); }
  .pipe-table .deal-name { color: #cbd5e1; font-weight: 500; }
  .pipe-table .deal-amount { color: #10b981; font-weight: 600; }
  .stage-pill { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; white-space: nowrap; }

  /* CHAT PANEL */
  .chat-panel { width: 370px; background: #0f1525; border-left: 1px solid #1e293b; display: flex; flex-direction: column; flex-shrink: 0; }
  .chat-header { padding: 14px 18px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 10px; }
  .chat-header .pulse { width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  .chat-header h3 { font-size: 14px; font-weight: 600; color: #fff; }
  .chat-header .badge { font-size: 10px; background: rgba(16,185,129,0.15); color: #10b981; padding: 2px 8px; border-radius: 10px; margin-left: auto; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .chat-msg { max-width: 92%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; word-wrap: break-word; }
  .chat-msg.agent { background: #1e293b; color: #cbd5e1; align-self: flex-start; border-bottom-left-radius: 4px; }
  .chat-msg.user { background: #1e40af; color: #dbeafe; align-self: flex-end; border-bottom-right-radius: 4px; }
  .chat-msg .ts { font-size: 10px; color: #475569; margin-top: 4px; }
  .chat-msg.user .ts { color: rgba(219,234,254,0.5); }

  /* CONTEXT BAR */
  .context-bar { padding: 10px 16px; border-top: 1px solid #1e293b; background: #111827; }
  .ctx-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .ctx-company { font-size: 13px; font-weight: 700; color: #fff; flex: 1; }
  .ctx-status-btns { display: flex; gap: 4px; }
  .ctx-status-btns button { font-size: 10px; padding: 3px 8px; border-radius: 4px; }
  .ctx-actions { display: flex; gap: 6px; }
  .ctx-btn { padding: 8px 0; border-radius: 6px; font-size: 12px; font-weight: 600; flex: 1; text-align: center; }
  .ctx-primary { background: #1e40af; color: #93c5fd; }
  .ctx-primary:hover { background: #1d4ed8; }
  .ctx-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
  .ctx-secondary:hover { color: #cbd5e1; border-color: #475569; }
  .ctx-slack { background: #4A154B; color: #E8D5E8; }
  .ctx-slack:hover { background: #5b1f5e; }
  .ctx-done-btn { background: transparent; color: #10b981; border: 1px solid #1e293b; }
  .ctx-done-btn:hover { border-color: #10b981; }
  .ctx-skip-btn { background: transparent; color: #64748b; border: 1px solid transparent; }
  .ctx-skip-btn:hover { color: #94a3b8; }
  .ctx-archive-btn { background: transparent; color: #475569; border: 1px solid transparent; }
  .ctx-archive-btn:hover { color: #ef4444; }

  /* QUICK CHIPS */
  .quick-chip { font-size: 11px; padding: 5px 10px; border-radius: 14px; background: #111827; border: 1px solid #1e293b; color: #94a3b8; cursor: pointer; transition: all 0.15s; display: inline-block; }
  .quick-chip:hover { border-color: #3b82f6; color: #60a5fa; background: rgba(59,130,246,0.08); }

  /* INPUT */
  .chat-input-area { padding: 12px 16px; border-top: 1px solid #1e293b; display: flex; gap: 8px; align-items: flex-end; }
  .chat-input { flex: 1; background: #111827; border: 1px solid #1e293b; border-radius: 10px; padding: 10px 14px; color: #e2e8f0; font-size: 13px; font-family: inherit; resize: none; outline: none; min-height: 40px; max-height: 120px; line-height: 1.4; }
  .chat-input::placeholder { color: #475569; }
  .chat-input:focus { border-color: #3b82f6; }
  .chat-send { width: 36px; height: 36px; border-radius: 50%; background: #1e40af; color: #93c5fd; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; padding: 0; }
  .chat-send:hover { background: #1d4ed8; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #10b981; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }

  /* DROPDOWN ACTION MENU */
  .action-group { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
  .action-primary { font-size: 11px; padding: 6px 14px; border-radius: 6px 0 0 6px; background: #1e40af; color: #93c5fd; font-weight: 600; white-space: nowrap; }
  .action-primary:hover { background: #1d4ed8; }
  .action-primary.green { background: rgba(16,185,129,0.2); color: #10b981; }
  .action-primary.green:hover { background: rgba(16,185,129,0.3); }
  .action-primary.purple { background: rgba(168,85,247,0.2); color: #a855f7; }
  .action-primary.purple:hover { background: rgba(168,85,247,0.3); }
  .action-chevron { font-size: 11px; padding: 6px 8px; border-radius: 0 6px 6px 0; background: #1e40af; color: #93c5fd; border-left: 1px solid rgba(147,197,253,0.2); position: relative; }
  .action-chevron:hover { background: #1d4ed8; }
  .action-chevron.green { background: rgba(16,185,129,0.2); color: #10b981; border-left-color: rgba(16,185,129,0.3); }
  .action-chevron.green:hover { background: rgba(16,185,129,0.3); }
  .action-chevron.purple { background: rgba(168,85,247,0.2); color: #a855f7; border-left-color: rgba(168,85,247,0.3); }
  .action-chevron.purple:hover { background: rgba(168,85,247,0.3); }
  .action-dropdown { display: none; position: absolute; right: 0; top: 100%; margin-top: 4px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 4px 0; min-width: 180px; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .action-dropdown.open { display: block; }
  .action-dropdown-item { display: flex; align-items: center; gap: 8px; padding: 8px 14px; font-size: 12px; color: #cbd5e1; cursor: pointer; white-space: nowrap; background: transparent; width: 100%; text-align: left; border-radius: 0; }
  .action-dropdown-item:hover { background: #334155; color: #fff; }
  .action-dropdown-item .dd-icon { width: 16px; text-align: center; font-size: 13px; flex-shrink: 0; }
  .action-dropdown-item.danger { color: #ef4444; }
  .action-dropdown-item.danger:hover { background: rgba(239,68,68,0.1); }
  .slack-opt { display: block; width: 100%; text-align: left; padding: 7px 14px; font-size: 13px; color: #cbd5e1; background: transparent; border: none; cursor: pointer; font-family: inherit; }
  .slack-opt:hover { background: #334155; color: #fff; }
  .dd-sep { height: 1px; background: #334155; margin: 4px 0; }

  /* MODAL OVERLAY */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .modal { background: #111827; border: 1px solid #1e293b; border-radius: 12px; width: 560px; max-width: 92vw; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #1e293b; }
  .modal-title { font-size: 15px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
  .modal-close { background: transparent; color: #64748b; font-size: 18px; padding: 4px 8px; border-radius: 4px; }
  .modal-close:hover { color: #fff; background: #1e293b; }
  .modal-body { padding: 20px; }
  .modal-footer { padding: 14px 20px; border-top: 1px solid #1e293b; display: flex; gap: 8px; justify-content: flex-end; }
  .modal-footer button { padding: 8px 20px; border-radius: 6px; font-size: 13px; font-weight: 600; }
  .modal-btn-primary { background: #1e40af; color: #93c5fd; }
  .modal-btn-primary:hover { background: #1d4ed8; }
  .modal-btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
  .modal-btn-secondary:hover { color: #fff; }
  .modal-btn-green { background: rgba(16,185,129,0.2); color: #10b981; }
  .modal-btn-green:hover { background: rgba(16,185,129,0.3); }
  .modal-btn-purple { background: rgba(168,85,247,0.2); color: #a855f7; }
  .modal-btn-purple:hover { background: rgba(168,85,247,0.3); }
  .modal-btn-linkedin { background: #0a66c2; color: #fff; }
  .modal-btn-linkedin:hover { background: #004182; }
  .modal-field { margin-bottom: 14px; }
  .modal-label { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; display: block; }
  .modal-input { width: 100%; background: #0a0e1a; border: 1px solid #334155; border-radius: 6px; padding: 10px 12px; color: #e2e8f0; font-size: 13px; font-family: inherit; outline: none; box-sizing: border-box; }
  .modal-input:focus { border-color: #3b82f6; }
  .modal-textarea { width: 100%; background: #0a0e1a; border: 1px solid #334155; border-radius: 6px; padding: 10px 12px; color: #e2e8f0; font-size: 13px; font-family: inherit; outline: none; resize: vertical; line-height: 1.6; box-sizing: border-box; }
  .modal-textarea:focus { border-color: #3b82f6; }
  .modal-info { background: #0a0e1a; border: 1px solid #1e293b; border-radius: 8px; padding: 14px; font-size: 12px; line-height: 1.7; color: #94a3b8; white-space: pre-wrap; }
  .modal-loading { display: flex; align-items: center; gap: 10px; padding: 20px; color: #64748b; font-size: 13px; }
  .modal-loading .spin { width: 16px; height: 16px; border: 2px solid #334155; border-top-color: #60a5fa; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .modal-success { color: #10b981; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .modal-error { color: #ef4444; font-size: 12px; margin-top: 8px; }
  .crm-option { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #0a0e1a; border: 1px solid #1e293b; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
  .crm-option:hover { border-color: #3b82f6; background: rgba(59,130,246,0.04); }
  .crm-option.selected { border-color: #3b82f6; background: rgba(59,130,246,0.08); }
  .crm-option-icon { font-size: 20px; width: 32px; text-align: center; }
  .crm-option-text { flex: 1; }
  .crm-option-title { font-size: 13px; font-weight: 600; color: #fff; }
  .crm-option-desc { font-size: 11px; color: #64748b; margin-top: 2px; }
  .prep-section { margin-bottom: 16px; }
  .prep-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #1e293b; }

  /* HERO START MY DAY */
  .hero { background: linear-gradient(135deg, #0f1525 0%, #1a1f3a 100%); border: 1px solid #1e293b; border-radius: 12px; padding: 24px 28px; margin-bottom: 24px; }
  .hero-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .hero-greeting { font-size: 22px; font-weight: 700; color: #fff; }
  .hero-date { font-size: 13px; color: #64748b; }
  .hero-stats { display: flex; gap: 20px; margin-bottom: 18px; }
  .hero-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .hero-stat-num { font-size: 26px; font-weight: 800; }
  .hero-stat-num.green { color: #10b981; }
  .hero-stat-num.red { color: #ef4444; }
  .hero-stat-num.blue { color: #60a5fa; }
  .hero-stat-num.yellow { color: #f59e0b; }
  .hero-stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
  .hero-start-btn { width: 100%; padding: 14px 24px; border-radius: 10px; font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #1e40af 0%, #7c3aed 100%); color: #fff; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; box-shadow: 0 4px 16px rgba(30,64,175,0.3); }
  .hero-start-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(30,64,175,0.4); }
  .hero-start-btn .arrow { font-size: 18px; transition: transform 0.2s; }
  .hero-start-btn:hover .arrow { transform: translateX(3px); }
  .hero-next-mtg { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .hero-next-mtg .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; animation: pulse 2s infinite; flex-shrink: 0; }
  .hero-next-mtg strong { color: #fff; }
  .hero-next-mtg span { color: #94a3b8; }

  /* PROGRESS BAR */
  .progress-wrap { margin-bottom: 20px; }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .progress-label { font-size: 12px; color: #64748b; }
  .progress-count { font-size: 12px; color: #10b981; font-weight: 700; }
  .progress-track { height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #10b981, #3b82f6); border-radius: 3px; transition: width 0.5s ease; }

  /* IMPROVED CONTEXT BAR */
  .context-bar { padding: 14px 16px; border-top: 1px solid #1e293b; background: #111827; }

<script>
// ═══════════════════════════════════════
// DATA — Live from HubSpot + Gmail + Granola
// Last refreshed: March 10, 2026 at 12:00 AM ET
// ═══════════════════════════════════════

const OWNERS = { "151853665": "Mike", "82490290": "Brian", "743878021": "Will", "1003618676": "Jason", "84289936": "Michael O", "82544484": "Jason N" };
const OWNER_CLASS = { "Mike": "owner-mike", "Brian": "owner-brian", "Will": "owner-will" };
const TODAY = new Date("2026-03-10");

const STAGE_MAP = {
  "93124525": "Disco Booked", "998751160": "Disco Complete", "appointmentscheduled": "Demo Scheduled",
  "123162712": "Demo Completed", "decisionmakerboughtin": "Negotiating", "227588384": "Committed",
  "closedwon": "Closed Won", "closedlost": "Closed Lost", "60237411": "Nurture", "53401375": "Booking"
};
const STAGE_COLORS = {
  "Committed": "background:rgba(16,185,129,0.2);color:#10b981;",
  "Negotiating": "background:rgba(96,165,250,0.2);color:#60a5fa;",
  "Demo Completed": "background:rgba(168,85,247,0.2);color:#a855f7;",
  "Demo Scheduled": "background:rgba(245,158,11,0.2);color:#f59e0b;",
  "Disco Complete": "background:rgba(245,158,11,0.2);color:#f59e0b;",
  "Disco Booked": "background:rgba(100,116,139,0.2);color:#94a3b8;",
  "Nurture": "background:rgba(100,116,139,0.15);color:#64748b;",
  "Booking": "background:rgba(100,116,139,0.15);color:#64748b;"
};

let PIPELINE = [];

// ═══ ALL ACTION ITEMS ═══
let ACTIONS = [];

let MEETINGS = [];

// Live calendar events from Google Calendar
let CALENDAR_EVENTS = [];

const CAT_CONFIG = {
  inbound: { icon: "&#9679;", label: "Inbound — Act Fast", color: "#10b981" },
  sales: { icon: "&#9679;", label: "Sales Follow-ups", color: "#f59e0b" },
  partnerships: { icon: "&#9679;", label: "Partnerships", color: "#a855f7" },
  strategic: { icon: "&#9679;", label: "Investor / Strategic", color: "#60a5fa" },
  internal: { icon: "&#9679;", label: "Internal Ops", color: "#ef4444" },
};

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
async function loadData() {
  try {
    const res = await fetch("/api/data");
    if (!res.ok) throw new Error("API error: " + res.status);
    const data = await res.json();
    if (data.actions) ACTIONS = data.actions;
    if (data.meetings) MEETINGS = data.meetings;
    if (data.pipeline) PIPELINE = data.pipeline;
  } catch (err) {
    console.error("Failed to load data:", err);
    const chat = document.getElementById("chatMessages");
    if (chat) {
      chat.innerHTML = '<div class="chat-msg agent"><strong>Error loading data.</strong> Check API connection.<br><span style="color:#ef4444;font-size:11px;">' + err.message + '</span></div>';
    }
  }
  // Load live calendar in background (non-blocking)
  loadCalendar();
}

async function loadCalendar() {
  try {
    const res = await fetch("/api/calendar");
    if (!res.ok) return;
    const data = await res.json();
    if (data.meetings) {
      CALENDAR_EVENTS = data.meetings;
      // Merge calendar events into MEETINGS if they're external and not already tracked
      const existingTitles = new Set(MEETINGS.map(m => m.title.toLowerCase()));
      data.meetings.filter(m => m.external).forEach(ev => {
        if (!existingTitles.has(ev.title.toLowerCase())) {
          const startDate = new Date(ev.start);
          const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
          const timeStr = startDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }).toLowerCase();
          const dateStr = `${dayNames[startDate.getDay()]} ${startDate.getMonth()+1}/${startDate.getDate()} · ${timeStr}`;
          MEETINGS.push({
            date: dateStr,
            title: ev.title,
            people: ev.externalAttendees.map(a => a.name).join(', '),
            upcoming: startDate > new Date(),
            external: true,
            summary: `External meeting with ${ev.externalAttendees.map(a => `${a.name} (${a.company})`).join(', ')}`,
            action: startDate > new Date() ? 'Prep needed' : 'Post-call follow-up needed',
            status: 'open',
            calendarEvent: ev, // Store full event for post-call flow
          });
        }
      });
      renderCurrentTab();
    }
  } catch (e) {
    // Calendar not configured — silent fail
  }
}

const chatHistory = [];
let selectedId = null;
let leadsSearch = "";
let leadsFilter = "all"; // all | open | done | inbound | sales
let leadsSearchCursor = 0;

function getOpen() { return ACTIONS.filter(a => a.status === "open"); }
function getDone() { return ACTIONS.filter(a => a.status === "done"); }
function getArchived() { return ACTIONS.filter(a => a.status === "archived"); }
function getSelected() { return ACTIONS.find(a => a.id === selectedId); }

function daysStale(lastActivity) {
  if (!lastActivity) return 0;
  return Math.floor((TODAY - new Date(lastActivity)) / 86400000);
}

function staleBadge(days) {
  if (days >= 5) return `<span class="badge-overdue">${days}d overdue</span>`;
  if (days >= 3) return `<span class="badge-stale">${days}d ago</span>`;
  return `<span class="badge-fresh">${days}d ago</span>`;
}

function fmtMoney(n) {
  if (!n) return "";
  return "$" + (n >= 1000000 ? (n/1000000).toFixed(1) + "M" : (n/1000).toFixed(0) + "K");
}

// ═══════════════════════════════════════
// SELECT / ADVANCE / ARCHIVE
// ═══════════════════════════════════════
function selectItem(id) {
  const a = ACTIONS.find(x => x.id === id);
  if (!a || a.status !== "open") return;
  selectedId = id;
  const days = daysStale(a.lastActivity);
  const urgencyColor = days >= 5 ? '#ef4444' : days >= 3 ? '#f59e0b' : '#10b981';
  const urgencyLabel = days >= 5 ? 'OVERDUE' : days >= 3 ? 'STALE' : 'FRESH';
  const urgencyBadge = `<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:${urgencyColor}20;color:${urgencyColor};margin-left:6px;">${days}d — ${urgencyLabel}</span>`;

  let chatMsg = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><strong style="font-size:14px;">${a.company}</strong>${urgencyBadge}</div>`;
  if (a.aiRec) chatMsg += `<div style="font-size:11px;color:#a855f7;margin-bottom:8px;">AI: ${a.aiRec}</div>`;
  if (a.emailSummary) {
    chatMsg += `<div style="background:#0a0e1a;border:1px solid #1e293b;border-radius:6px;padding:10px 12px;margin:4px 0;font-size:12px;line-height:1.6;">${a.emailSummary}</div>`;
    if (a.emailUrl) chatMsg += `<a href="${a.emailUrl}" target="_blank" style="font-size:11px;">Open in Superhuman &rarr;</a>`;
  } else {
    chatMsg += `<div style="color:#94a3b8;font-size:13px;">${a.task}</div>`;
  }
  chatMsg += `<div style="font-size:11px;color:#475569;margin-top:8px;">Use the actions below or type a command.</div>`;
  addChat("agent", chatMsg);

  renderContextBar();
  renderCurrentTab();
}

function advanceToNext() {
  const open = getOpen();
  if (open.length === 0) {
    selectedId = null;
    const done = getDone().length;
    addChat("agent", `<div style="text-align:center;padding:12px 0;">
      <div style="font-size:28px;margin-bottom:6px;">🎉</div>
      <div style="font-size:15px;font-weight:700;color:#10b981;margin-bottom:4px;">All clear!</div>
      <div style="font-size:12px;color:#64748b;">${done} items handled today. Nice work, Mike.</div>
    </div>`);
    renderContextBar(); renderCurrentTab(); return;
  }
  const allOpen = ACTIONS.filter(a => a.status === "open");
  const curIdx = allOpen.findIndex(a => a.id === selectedId);
  const next = allOpen[curIdx + 1] || allOpen[0];
  selectItem(next.id);
}

function markDone(id) {
  const a = ACTIONS.find(x => x.id === id);
  if (!a) return;
  a.status = "done"; a.color = "tg";
  updateProgressBadge();
  addChat("agent", `<span style="color:#10b981;font-weight:600;">✓ ${a.company} — done.</span> ${getOpen().length} remaining.`);
  setTimeout(() => advanceToNext(), 300);
}

function updateProgressBadge() {
  const done = getDone().length;
  const total = done + getOpen().length;
  const badge = document.getElementById("chatBadge");
  if (badge && done > 0) {
    badge.textContent = `${done}/${total} done`;
    badge.style.background = 'rgba(16,185,129,0.15)';
    badge.style.color = '#10b981';
  }
}

function archiveItem(id) {
  const a = ACTIONS.find(x => x.id === id);
  if (!a) return;
  a.status = "archived";
  updateProgressBadge();
  addChat("agent", `<span style="color:#64748b;">✕ ${a.company} — archived.</span> ${getOpen().length} remaining.`);
  setTimeout(() => advanceToNext(), 300);
}

// ═══════════════════════════════════════
// CONTEXT BAR
// ═══════════════════════════════════════
function renderContextBar() {
  const area = document.getElementById("contextArea");
  const sel = getSelected();
  if (sel && sel.status === "open") {
    const dv = sel.dealValue ? ` <span class="deal-val">${fmtMoney(sel.dealValue)}</span>` : "";
    area.innerHTML = `<div class="context-bar">
      <div class="ctx-selected-label">Selected</div>
      <div class="ctx-company-row">
        <div class="ctx-company-name">${sel.company}${dv}</div>
      </div>
      <div class="ctx-quick-actions">
        <button class="ctx-big-btn ctx-postcall" onclick="showPostCallFlow(ACTIONS.find(a=>a.id===${sel.id}))"><span class="icon">🎙️</span> Post-Call Pipeline</button>
        <button class="ctx-big-btn ctx-draft" onclick="runAction('draft',${sel.id})"><span class="icon">✏️</span> Draft Email</button>
        <button class="ctx-big-btn ctx-prep" onclick="buildPrep(ACTIONS.find(a=>a.id===${sel.id}))"><span class="icon">🧠</span> Prep</button>
        <button class="ctx-big-btn ctx-crm" onclick="runAction('hubspot',${sel.id})"><span class="icon">⚡</span> CRM</button>
        <button class="ctx-big-btn ctx-li" onclick="runAction('linkedin',${sel.id})"><span class="icon">💼</span> LinkedIn</button>
        <button class="ctx-big-btn ctx-slack-btn" onclick="showSlackMenu(${sel.id})"><span class="icon">💬</span> Slack</button>
      </div>
      <div class="ctx-bottom-row">
        <button class="ctx-status-btn ctx-done" onclick="markDone(${sel.id})">✓ Done</button>
        <button class="ctx-status-btn ctx-skip" onclick="advanceToNext()">Skip &rarr;</button>
        <button class="ctx-status-btn ctx-arch" onclick="archiveItem(${sel.id})">✕ Archive</button>
      </div>
    </div>`;
  } else {
    area.innerHTML = `<div class="idle-prompt">
      <button class="idle-start-btn" onclick="startWork()">Start My Day &rarr;</button>
      <button class="idle-refresh" onclick="quickCmd('Pull fresh data from Gmail, HubSpot, and Granola and update my CoS dashboard.')">Refresh data</button>
    </div>`;
  }
}

function startWork() {
  const open = getOpen();
  if (open.length === 0) { addChat("agent", "No open items!"); return; }
  selectItem(open[0].id);
}

// ═══════════════════════════════════════
// ACTIONS — Real API integrations
// ═══════════════════════════════════════
function runAction(type, id) {
  const sel = id ? ACTIONS.find(a => a.id === id) : getSelected();
  if (!sel) { addChat("agent", "Select an item first."); return; }
  if (id) selectedId = id;

  if (type === "draft") {
    showDraftModal(sel);
  } else if (type === "hubspot") {
    showCrmWizard(sel);
  } else if (type === "both" || type === "post-call") {
    showPostCallFlow(sel);
  } else if (type === "order" || type === "proposal") {
    showProposalModal(sel);
  } else if (type === "linkedin") {
    showLinkedInModal(sel);
  }
}

// ── MODAL HELPERS ──
function closeModal() { document.getElementById("modalContainer").innerHTML = ""; }

function showModal(title, bodyHtml, footerHtml) {
  document.getElementById("modalContainer").innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${title}</div>
          <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body" id="modalBody">${bodyHtml}</div>
        ${footerHtml ? `<div class="modal-footer" id="modalFooter">${footerHtml}</div>` : ''}
      </div>
    </div>`;
}

// ═══════════════════════════════════════
// 1. DRAFT EMAIL — Generates with AI, creates Gmail draft
//    Includes Granola recording link when available
// ═══════════════════════════════════════
async function showDraftModal(item, opts = {}) {
  const { alsoCrm = false, granolaUrl = null, granolaBody = null, callAnalysis = null } = opts;
  const prompt = item.draftPrompt;
  if (!prompt && !callAnalysis) { addChat("agent", `No draft context for ${item.company}.`); return; }

  // Extract email addresses from draftPrompt
  const emailMatch = (prompt || '').match(/[\w.+-]+@[\w.-]+\.\w+/g) || [];
  const toAddr = emailMatch[0] || '';
  const ccAddrs = emailMatch.slice(1).join(', ') || 'brian@prescientai.com';
  const grLink = granolaUrl || item.granola || '';

  showModal(`✏️ Draft Email — ${item.company}`,
    `<div class="modal-loading"><div class="spin"></div>Generating email with AI...</div>`, '');

  try {
    // Build enhanced prompt with Granola context if available
    let fullPrompt = prompt || `Draft a follow-up email to ${item.company} after our call.`;
    if (callAnalysis) {
      fullPrompt += `\n\nCall Analysis:\nSummary: ${callAnalysis.summary || ''}\nKey Points: ${(callAnalysis.keyPoints || []).join('; ')}\nNext Steps: ${(callAnalysis.nextSteps || []).join('; ')}\nTone: ${callAnalysis.emailTone || 'warm followup'}`;
    }
    if (granolaBody) {
      fullPrompt += `\n\nCall Notes:\n${granolaBody.substring(0, 2000)}`;
    }
    if (grLink) {
      fullPrompt += `\n\nIMPORTANT: Include this meeting recording link in the email: ${grLink}\nSay something like "I've attached the recording from our call for your reference."`;
    }
    fullPrompt += '\n\nWrite the email body only (no subject line prefix). Use HTML formatting with <p> tags.';

    const res = await fetch('/api/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: fullPrompt }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'AI failed');

    const subjectGuess = item.company + ' — Follow Up';
    const emailBody = data.text || '';

    document.getElementById("modalBody").innerHTML = `
      <div class="modal-field">
        <label class="modal-label">To</label>
        <input class="modal-input" id="draftTo" value="${toAddr}" placeholder="email@example.com">
      </div>
      <div class="modal-field">
        <label class="modal-label">CC</label>
        <input class="modal-input" id="draftCc" value="${ccAddrs}" placeholder="cc@example.com">
      </div>
      <div class="modal-field">
        <label class="modal-label">Subject</label>
        <input class="modal-input" id="draftSubject" value="${subjectGuess}">
      </div>
      ${grLink ? `<div class="modal-field">
        <label class="modal-label">Granola Recording</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <input class="modal-input" id="draftGranolaUrl" value="${grLink}" style="flex:1;">
          <a href="${grLink}" target="_blank" style="font-size:11px;white-space:nowrap;">Open ↗</a>
        </div>
      </div>` : `<div class="modal-field">
        <label class="modal-label">Granola Recording (optional)</label>
        <input class="modal-input" id="draftGranolaUrl" value="" placeholder="Paste Granola recording URL...">
      </div>`}
      <div class="modal-field">
        <label class="modal-label">Body</label>
        <textarea class="modal-textarea" id="draftBody" rows="12">${emailBody}</textarea>
      </div>
      <div id="draftStatus"></div>`;

    document.getElementById("modalContainer").querySelector(".modal").insertAdjacentHTML('beforeend',
      `<div class="modal-footer" id="modalFooter">
        <button class="modal-btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="modal-btn-primary" onclick="createGmailDraft(${item.id}, ${alsoCrm})">Create Gmail Draft</button>
      </div>`);
  } catch (err) {
    document.getElementById("modalBody").innerHTML = `
      <div class="modal-error">Failed to generate: ${err.message}</div>
      <div style="margin-top:12px;">
        <div class="modal-field">
          <label class="modal-label">Prompt (copy manually)</label>
          <textarea class="modal-textarea" rows="6" readonly>${prompt || ''}</textarea>
        </div>
      </div>`;
    document.getElementById("modalContainer").querySelector(".modal").insertAdjacentHTML('beforeend',
      `<div class="modal-footer"><button class="modal-btn-secondary" onclick="closeModal()">Close</button></div>`);
  }
}

async function createGmailDraft(itemId, alsoCrm) {
  const to = document.getElementById("draftTo").value.trim();
  const cc = document.getElementById("draftCc").value.trim();
  const subject = document.getElementById("draftSubject").value.trim();
  const body = document.getElementById("draftBody").value.trim();

  if (!to || !body) { document.getElementById("draftStatus").innerHTML = '<div class="modal-error">To and Body are required.</div>'; return; }

  document.getElementById("draftStatus").innerHTML = '<div class="modal-loading"><div class="spin"></div>Creating Gmail draft...</div>';

  try {
    const res = await fetch('/api/draft-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to, cc: cc || undefined, subject, body }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to create draft');

    document.getElementById("draftStatus").innerHTML = `<div class="modal-success">&#10003; Draft created in Gmail</div>`;
    document.getElementById("modalFooter").innerHTML = `

        <label class="modal-label">Call Notes <span style="color:#475569;font-weight:400;">(pulled from Granola — edit if needed)</span></label>
        <textarea class="modal-textarea" id="pcGranolaNotes" rows="10" placeholder="Loading from Granola..."></textarea>
      </div>
    </div>
    <div id="pcPipelineStatus"></div>`,
    `<button class="modal-btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="modal-btn-primary" onclick="runPostCallAnalysis(${item.id})" id="pcAnalyzeBtn" disabled>Analyze Call →</button>`);

  // Auto-fetch from Granola API
  try {
    const res = await fetch('/api/granola', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        granolaUrl: item.granola || '',
        company: item.company,
        analyze: true,
      }),
    });
    const data = await res.json();

    const loadEl = document.getElementById("pcGranolaLoad");
    const formEl = document.getElementById("pcFormArea");
    const btn = document.getElementById("pcAnalyzeBtn");

    if (data.success && data.note) {
      const note = data.note;
      // Populate form with Granola data
      if (loadEl) loadEl.innerHTML = `<div class="modal-success" style="margin-bottom:12px;">&#10003; Found: <strong>${note.title || item.company}</strong> — ${new Date(note.createdAt).toLocaleDateString()}</div>`;
      if (formEl) formEl.style.display = 'block';

      const notesField = document.getElementById("pcGranolaNotes");
      const urlField = document.getElementById("pcGranolaUrl");
      const nameField = document.getElementById("pcContactName");
      const emailField = document.getElementById("pcContactEmail");

      // Fill in call notes (prefer summary, fall back to transcript)
      if (notesField) notesField.value = note.summaryMarkdown || note.summaryText || note.fullTranscriptText || '';

      // Fill in attendees
      const externalAttendees = (note.attendees || []).filter(a => a.email && !a.email.includes('prescient'));
      if (nameField && externalAttendees.length > 0 && !nameField.value) {
        nameField.value = externalAttendees[0].name || '';
      }
      if (emailField && externalAttendees.length > 0 && !emailField.value) {
        emailField.value = externalAttendees[0].email || '';
      }

      // If we already have analysis, skip straight to actions
      if (note.analysis && note.analysis.summary) {
        _postCallState = {
          item, deal,
          granolaUrl: urlField?.value || item.granola || '',
          contactName: nameField?.value || '',
          contactEmail: emailField?.value || '',
          granolaNotes: notesField?.value || '',
          itemId: item.id,
          analysis: note.analysis,
        };
        if (btn) { btn.disabled = false; btn.textContent = "Analyze Call →"; }
        // Show analysis immediately
        showPostCallAnalysisResult(item.id, note.analysis);
        return;
      }

      if (btn) { btn.disabled = false; btn.textContent = "Analyze Call →"; }
    } else {
      // Granola not available — show manual entry
      if (loadEl) loadEl.innerHTML = `<div style="color:#f59e0b;font-size:12px;margin-bottom:12px;">Could not pull from Granola (${data.error || 'API key not set'}). Paste notes manually below.</div>`;
      if (formEl) formEl.style.display = 'block';
      if (btn) { btn.disabled = false; }
    }
  } catch (err) {
    const loadEl = document.getElementById("pcGranolaLoad");
    const formEl = document.getElementById("pcFormArea");
    const btn = document.getElementById("pcAnalyzeBtn");
    if (loadEl) loadEl.innerHTML = `<div style="color:#f59e0b;font-size:12px;margin-bottom:12px;">Granola unavailable. Paste notes manually.</div>`;
    if (formEl) formEl.style.display = 'block';
    if (btn) { btn.disabled = false; }
  }
}

// Store pipeline state across steps
let _postCallState = {};

async function runPostCallAnalysis(itemId) {
  const item = ACTIONS.find(a => a.id === itemId) || { id: itemId, company: 'Unknown' };
  const deal = PIPELINE.find(d => d.name.toLowerCase().includes(item.company.toLowerCase()));

  const granolaUrl = document.getElementById("pcGranolaUrl")?.value.trim() || '';
  const contactName = document.getElementById("pcContactName")?.value.trim() || '';
  const contactEmail = document.getElementById("pcContactEmail")?.value.trim() || '';
  const granolaNotes = document.getElementById("pcGranolaNotes")?.value.trim() || '';

  if (!granolaNotes) {
    document.getElementById("pcPipelineStatus").innerHTML = '<div class="modal-error">No call notes found. Paste notes or check Granola API key.</div>';
    return;
  }

  _postCallState = { item, deal, granolaUrl, contactName, contactEmail, granolaNotes, itemId };

  // If we already have analysis from Granola fetch, use it
  if (_postCallState.analysis) {
    showPostCallAnalysisResult(itemId, _postCallState.analysis);
    return;
  }

  document.getElementById("pcPipelineStatus").innerHTML = `<div class="modal-loading"><div class="spin"></div>Analyzing call with AI...</div>`;
  const btn = document.getElementById("pcAnalyzeBtn");
  if (btn) { btn.disabled = true; btn.textContent = "Analyzing..."; }

  try {
    const res = await fetch('/api/post-call', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        step: 'analyze',
        company: item.company,
        contactName,
        contactEmail,
        granolaNotes,
        granolaUrl,
        hubspotDealId: deal?.id,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Analysis failed');

    _postCallState.analysis = data.analysis;
    showPostCallAnalysisResult(itemId, data.analysis);
  } catch (err) {
    document.getElementById("pcPipelineStatus").innerHTML = `<div class="modal-error">${err.message}</div>`;
    if (btn) { btn.disabled = false; btn.textContent = "Retry →"; }
  }
}

async function runPostCallProposal() {
  const s = _postCallState;
  document.getElementById("pcStep2Status").innerHTML = '<span style="color:#f59e0b;">Running...</span>';

  try {
    const res = await fetch('/api/post-call', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        step: 'proposal',
        company: s.item.company,
        contactName: s.contactName,
        contactEmail: s.contactEmail,
        granolaNotes: s.granolaNotes,
        granolaUrl: s.granolaUrl,
        hubspotDealId: s.deal?.id,
        callAnalysis: s.analysis,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');

    _postCallState.proposal = data.proposal;
    const posted = data.proposal?.slackPosted;
    document.getElementById("pcStep2Status").innerHTML = `<span style="color:#10b981;">Done ✓</span>`;
    addChat("agent", `<strong>&#10003; Proposal generated</strong> — ${s.item.company}${posted ? ' (posted to #dealdesk)' : ''}`);
  } catch (err) {
    document.getElementById("pcStep2Status").innerHTML = `<span style="color:#ef4444;">Failed</span>`;
    addChat("agent", `<span style="color:#ef4444;">Proposal error: ${err.message}</span>`);
  }
}

async function runPostCallEmail() {
  const s = _postCallState;
  document.getElementById("pcStep3Status").innerHTML = '<span style="color:#f59e0b;">Running...</span>';

  // Open the draft modal with Granola context pre-filled
  closeModal();
  showDraftModal(s.item, {
    granolaUrl: s.granolaUrl,
    granolaBody: s.granolaNotes,
    callAnalysis: s.analysis,

async function runPostCallCrm() {
  const s = _postCallState;
  document.getElementById("pcStep4Status").innerHTML = '<span style="color:#f59e0b;">Running...</span>';

  try {
    const res = await fetch('/api/post-call', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        step: 'crm',
        company: s.item.company,
        contactName: s.contactName,
        contactEmail: s.contactEmail,
        granolaNotes: s.granolaNotes,
        granolaUrl: s.granolaUrl,
        hubspotDealId: s.deal?.id,
        callAnalysis: s.analysis,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');

    document.getElementById("pcStep4Status").innerHTML = `<span style="color:#10b981;">Done ✓</span>`;
    addChat("agent", `<strong>&#10003; HubSpot updated</strong> — ${s.item.company}${data.crm?.suggestedStage ? ` (suggest → ${data.crm.suggestedStage})` : ''}`);
  } catch (err) {
    document.getElementById("pcStep4Status").innerHTML = `<span style="color:#ef4444;">Failed</span>`;
    addChat("agent", `<span style="color:#ef4444;">CRM error: ${err.message}</span>`);
  }
}

async function runPostCallAll() {
  // Run proposal + CRM in parallel, then open email modal
  await Promise.all([runPostCallProposal(), runPostCallCrm()]);
  // LinkedIn
  const s = _postCallState;
  if (s.contactName) {
    fetch('/api/linkedin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contactName: s.contactName, company: s.item.company, context: s.analysis?.summary || '' }),
    }).then(r => r.json()).then(data => {
      if (data.profileUrl) {
        window.open(data.profileUrl, '_blank');
        copyToClipboard(data.message);
        showToast('LinkedIn opened + message copied');
      }
    }).catch(() => {});
  }
  // Open email draft last (it replaces the modal)
  setTimeout(() => runPostCallEmail(), 500);
}

async function generateProposal(itemId) {
  const item = ACTIONS.find(a => a.id === itemId);
  const deal = PIPELINE.find(d => d.name.toLowerCase().includes(item.company.toLowerCase()));
  const slackChannel = document.getElementById("propSlackChannel").value.trim();

  const payload = {
    company: document.getElementById("propCompany").value.trim(),
    contactName: document.getElementById("propContact").value.trim(),
    contactEmail: document.getElementById("propEmail").value.trim(),
    dealValue: document.getElementById("propValue").value.trim(),
    term: document.getElementById("propTerm").value.trim(),
    notes: document.getElementById("propNotes").value.trim(),
    hubspotDealId: deal ? deal.id : undefined,
  };

  document.getElementById("propStatus").innerHTML = '<div class="modal-loading"><div class="spin"></div>Generating order form...</div>';

  try {
    // Generate the proposal via AI
    const res = await fetch('/api/proposal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');

    // Post to Slack channel via our Slack API
    let slackPosted = false;
    if (slackChannel && data.orderForm) {
      try {
        const slackRes = await fetch('/api/slack', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            channel: slackChannel,
            text: `New order form submitted for *${payload.company}*\n\`\`\`${data.orderForm}\`\`\``,
          }),
        });
        const slackData = await slackRes.json();
        slackPosted = slackData.success;
      } catch (e) { /* Slack send failed, show form anyway */ }
    }

    document.getElementById("propStatus").innerHTML = `
      <div class="modal-info">${data.orderForm}</div>
      <div style="margin-top:10px;">
        ${slackPosted ? `<div class="modal-success">&#10003; Posted to #${slackChannel}</div>` : '<div style="color:#f59e0b;font-size:12px;">Order form generated. Slack post failed or not configured.</div>'}
      </div>`;
    document.getElementById("modalFooter").innerHTML = `
      <button class="modal-btn-secondary" onclick="copyToClipboard(document.querySelector('.modal-info').textContent);showToast('Order form copied')">Copy</button>
      <button class="modal-btn-green" onclick="closeModal()">Done</button>`;

    addChat("agent", `<strong>&#10003; Order form generated</strong> — ${item.company}${slackPosted ? ` (posted to #${slackChannel})` : ''}`);
  } catch (err) {
    document.getElementById("propStatus").innerHTML = `<div class="modal-error">${err.message}</div>`;
  }
}

function filterSlackPicker(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('#slackPickerChannels .slack-opt, #slackPickerUsers .slack-opt').forEach(el => {
    el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function toggleSlackPicker() {
  const picker = document.getElementById("slackPicker");
  if (picker) picker.style.display = picker.style.display === "none" ? "block" : "none";
}

function pickSlackTarget(id, label) {
  document.getElementById("slackTo").value = id;
  document.getElementById("slackToLabel").textContent = label;
  document.getElementById("slackPicker").style.display = "none";
}

function generateSlackMsg(a) {
  const lines = [`*${a.company}* — update`, a.task];
  if (a.meta) lines.push(`_${a.meta.replace(/<[^>]*>/g,"")}_`);
  const days = daysStale(a.lastActivity);
  if (days >= 5) lines.push(`⚠️ ${days}d since last activity`);
  return lines.join("\n");
}

async function sendSlack(id) {
  const a = ACTIONS.find(x => x.id === id);
  if (!a) return;
  const target = document.getElementById("slackTo").value.trim();
  const label = document.getElementById("slackToLabel").textContent.trim();
  const msg = document.getElementById("slackMsg").value.trim();
  if (!target || !msg) return;

  const btn = document.getElementById("slackSendBtn");
  const status = document.getElementById("slackStatus");
  if (btn) { btn.disabled = true; btn.textContent = "Sending..."; }

  try {
    const payload = { text: msg };
    // If target looks like a Slack ID (starts with C or U), use it directly
    if (target.startsWith('C') || target.startsWith('U')) {
      payload.channel = target;
    } else if (target.startsWith('#')) {
      payload.channel = target.substring(1); // Slack accepts channel name without #
    } else {
      payload.channel = target;
    }

    const res = await fetch('/api/slack', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Send failed');

    if (status) status.innerHTML = `<div class="modal-success" style="font-size:12px;">&#10003; Sent to ${label}</div>`;
    if (btn) { btn.textContent = "Sent ✓"; btn.style.background = "rgba(16,185,129,0.2)"; btn.style.color = "#10b981"; }
    addChat("agent", `<strong>&#10003; Slack sent</strong> → ${label}<br><span style="color:#64748b;font-size:11px;">${msg.substring(0, 100)}${msg.length > 100 ? '...' : ''}</span>`);
    setTimeout(() => renderContextBar(), 1500);
  } catch (err) {
    if (status) status.innerHTML = `<div class="modal-error">${err.message}</div>`;
    if (btn) { btn.disabled = false; btn.textContent = "Send to Slack"; }
  }
}

async function deepPrep(id) {
  const a = ACTIONS.find(x => x.id === id);
  if (!a) return;
  const deal = PIPELINE.find(d => d.name.toLowerCase().includes(a.company.toLowerCase()));
  const emailMatch = (a.draftPrompt || '').match(/[\w.+-]+@[\w.-]+\.\w+/g) || [];

  showModal(`🧠 Deep Prep — ${a.company}`,
    `<div class="modal-loading"><div class="spin"></div>Compiling full research brief...</div>`, '');

  try {
    const res = await fetch('/api/prep', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        company: a.company,
        contactName: '',
        contactEmail: emailMatch[0] || '',
        hubspotDealId: deal?.id,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');

    const p = data.prep;
    let html = '';

    if (p.aiSummary) {
      html += `<div class="modal-info" style="white-space:pre-wrap;margin-bottom:16px;">${p.aiSummary}</div>`;
    }

    if (p.hubspot?.properties) {
      html += `<div class="prep-section"><div class="prep-section-title" style="color:#f59e0b;">HubSpot Deal</div>
        <div style="font-size:12px;color:#94a3b8;">Stage: ${p.hubspot.properties.dealstage} · Amount: ${p.hubspot.properties.amount || 'N/A'} · Close: ${p.hubspot.properties.closedate || 'N/A'}</div></div>`;
    }

    if (p.contactInfo?.properties) {
      const c = p.contactInfo.properties;
      html += `<div class="prep-section"><div class="prep-section-title" style="color:#60a5fa;">Contact</div>
        <div style="font-size:12px;color:#94a3b8;">${c.firstname || ''} ${c.lastname || ''} · ${c.jobtitle || ''} · ${c.company || ''}</div>
        ${p.linkedinUrl ? `<a href="${p.linkedinUrl}" target="_blank" style="font-size:11px;">LinkedIn Profile →</a>` : ''}
      </div>`;
    }

    if (p.recentActivity?.length) {
      html += `<div class="prep-section"><div class="prep-section-title" style="color:#10b981;">Recent Activity</div>`;
      p.recentActivity.forEach(n => {
        if (n.properties) html += `<div style="font-size:12px;color:#94a3b8;margin-bottom:6px;border-left:2px solid #1e293b;padding-left:8px;">${n.properties.hs_note_body?.substring(0, 300) || 'Note'}</div>`;
      });
      html += `</div>`;
    }

    document.getElementById("modalBody").innerHTML = html || '<div style="color:#64748b;">No additional data found. Configure API keys for full research.</div>';
    document.getElementById("modalContainer").querySelector(".modal").insertAdjacentHTML('beforeend',
      `<div class="modal-footer">
        <button class="modal-btn-secondary" onclick="closeModal()">Close</button>
        <button class="modal-btn-linkedin" onclick="closeModal();showLinkedInModal(ACTIONS.find(x=>x.id===${id}))">LinkedIn Connect</button>
      </div>`);
  } catch (err) {
    document.getElementById("modalBody").innerHTML = `<div class="modal-error">${err.message}</div>`;
  }
}

function addChat(role, text) {
  const ts = new Date().toLocaleTimeString([], { hour:"numeric", minute:"2-digit" });
  chatHistory.push({ role, text, ts });
  const c = document.getElementById("chatMessages");
  c.innerHTML = chatHistory.map(m => `<div class="chat-msg ${m.role}">${m.text}<div class="ts">${m.ts}</div></div>`).join("");
  c.scrollTop = c.scrollHeight;
}

function sendChat() {
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if (!text) return;
  addChat("user", text); input.value = ""; input.style.height = "40px";
  if (handleLocalCommand(text)) return;
  // Fallback: send to AI for a response
  addChat("agent", `<div class="modal-loading" style="padding:0;"><div class="spin"></div>Thinking...</div>`);
  fetch('/api/ai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt: text }),
  }).then(r => r.json()).then(data => {
    // Replace the loading message
    const msgs = document.querySelectorAll('.chat-msg.agent');
    const last = msgs[msgs.length - 1];
    if (last && last.innerHTML.includes('Thinking...')) {
      last.innerHTML = (data.text || 'No response.') + `<div class="ts">${new Date().toLocaleTimeString([], {hour:"numeric",minute:"2-digit"})}</div>`;
    }
  }).catch(() => {
    const msgs = document.querySelectorAll('.chat-msg.agent');
    const last = msgs[msgs.length - 1];
    if (last && last.innerHTML.includes('Thinking...')) {
      last.innerHTML = `Try: <strong>draft</strong>, <strong>crm</strong>, <strong>proposal</strong>, <strong>prep</strong>, <strong>linkedin</strong>, or a company name.`;
    }
  });
}

function handleLocalCommand(text) {
  const t = text.toLowerCase();
  const sel = getSelected();

  // Confirmed / on calendar
  if (t.match(/\b(on my calendar|scheduled|confirmed|already booked|meeting.?s? (set|booked|confirmed)|it.?s on|booked it)\b/)) {
    if (sel) { addChat("agent", `✓ ${sel.company} — on calendar.`); markDone(sel.id); return true; }
  }
  // Already replied
  if (t.match(/\b(already (replied|responded|emailed|sent)|i (replied|responded|sent)|wrote them|emailed them|sent (it|that|the email))\b/)) {
    if (sel) { addChat("agent", `✓ ${sel.company} — already handled.`); markDone(sel.id); return true; }
  }
  // Not interested
  if (t.match(/\b(not interested|pass on|not a fit|not for us|too early|not now|waste of time|spam|junk)\b/)) {
    if (sel) { addChat("agent", `✕ ${sel.company} — not a fit.`); archiveItem(sel.id); return true; }
  }
  // Research
  if (t.match(/\b(who (is|are)|look.* up|research|what do we know|tell me (more|about)|background|check (on|this|them))\b/)) {
    if (sel) { buildPrep(sel); return true; }
  }
  // Prep
  if (t.match(/\b(prep|prepare|get ready|talking points|agenda|brief me|meeting prep)\b/)) {
    if (sel) { buildPrep(sel); return true; }
  }
  // Delegate
  if (t.match(/\b(forward|send to brian|delegate|hand off|brian.?s|assign|pass to|have brian|tell brian)\b/)) {
    if (sel) {
      const who = t.match(/brian/) ? "Brian" : t.match(/will/) ? "Will" : t.match(/jason/) ? "Jason" : "the team";
      showSlackMenu(sel.id);
      addChat("agent", `Delegating ${sel.company} → ${who}. Update the Slack message below.`);
      return true;
    }
  }
  // Bump / nudge
  if (t.match(/\b(bump|nudge|ping|poke|follow up again|circle back|touch base|gentle reminder)\b/)) {
    if (sel && sel.draftPrompt) {
      // Modify the draft prompt to be a gentle bump, then open draft modal
      const origPrompt = sel.draftPrompt;
      sel._bumpPrompt = origPrompt.replace(/Draft a follow-up/, "Draft a gentle bump").replace(/Draft a reply/, "Draft a gentle follow-up") + " Keep it 2-3 sentences max. Light and friendly.";
      showDraftModal({ ...sel, draftPrompt: sel._bumpPrompt });
      return true;
    }
  }
  // Create new opportunity / deal
  if (t.match(/\b(create (new |a )?(opportunity|deal|opp)|new (opportunity|deal)|add (to |in )?hubspot|create in hubspot|log (new |a )?(deal|opportunity)|new hubspot)\b/)) {
    if (sel) { showCrmWizard(sel); return true; }
  }
  // Post-call pipeline
  if (t.match(/\b(post.?call|after.?call|granola|call notes|recording|debrief)\b/)) {
    if (sel) { showPostCallFlow(sel); return true; }
  }
  // Proposal / order form
  if (t.match(/\b(order form|contract|proposal|generate proposal)\b/)) {
    if (sel) { showProposalModal(sel); return true; }
  }
  // LinkedIn
  if (t.match(/\b(linkedin|connect on linkedin|send connection|li request)\b/)) {
    if (sel) { showLinkedInModal(sel); return true; }
  }
  // Slack
  if (t.match(/\b(slack|share to|post to|send to #|dm |message )\b/)) {
    if (sel) {
      showSlackMenu(sel.id);
      setTimeout(() => {
        const toInput = document.getElementById("slackTo");
        if (!toInput) return;
        const ch = t.match(/#(\w+)/);
        const per = t.match(/\b(brian|will|jason|elliot|ali)\b/i);
        if (ch) toInput.value = "#" + ch[1];
        else if (per) toInput.value = per[1].charAt(0).toUpperCase() + per[1].slice(1).toLowerCase();
      }, 100);
      return true;
    }
  }
  // Archive
  if (t.match(/\b(archive|dismiss|remove|kill it|nah|drop it|forget it|trash)\b/)) {
    if (sel) { archiveItem(sel.id); return true; }
  }
  // Skip
  if (t.match(/\b(skip|next|move on|pass|later|come back|tomorrow|no action)\b/)) {
    if (sel) { addChat("agent", `Skipping <strong>${sel.company}</strong>.`); setTimeout(() => advanceToNext(), 200); return true; }
  }
  // Done
  if (t.match(/\b(done|finished|complete|handled|checked off)\b/) && sel) { markDone(sel.id); return true; }
  // Draft
  if (t.match(/\b(draft|email|write|send|reply|compose|follow.?up)\b/)) {
    if (sel && sel.draftPrompt) { runAction("draft"); return true; }
    const match = findCompanyInText(t);
    if (match) { selectItem(match.id); setTimeout(() => { if(match.draftPrompt) runAction("draft"); }, 100); return true; }
  }
  // HubSpot
  if (t.match(/\b(hubspot|crm|update crm|log|update hub)\b/)) {
    if (sel && sel.crmPrompt) { runAction("hubspot"); return true; }
    const match = findCompanyInText(t);
    if (match) { selectItem(match.id); setTimeout(() => { if(match.crmPrompt) runAction("hubspot"); }, 100); return true; }
  }
  // (order form handled above with proposal)
  // Start
  if (t.match(/^(start|begin|go|let.?s go|ready|work|run through)/)) { startWork(); return true; }
  // Company name match
  const match = findCompanyInText(t);
  if (match && match.status === "open") { selectItem(match.id); return true; }

  return false;
}

function findCompanyInText(text) {
  const t = text.toLowerCase();
  return ACTIONS.find(a => a.status === "open" && t.includes(a.company.toLowerCase()));
}

function copyToClipboard(text) {
  // file:// protocol doesn't support navigator.clipboard — always use fallback first
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    ta.style.top = "-9999px";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    if (ok) { showToast("Copied — paste in Cowork"); return; }
  } catch(e) {}
  // Fallback to modern API if available (HTTPS only)
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast("Copied — paste in Cowork")).catch(() => showToast("Copy failed — select text manually"));
  } else {
    showToast("Copy failed — select text manually");
  }
}

function showToast(msg) {
  const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}
