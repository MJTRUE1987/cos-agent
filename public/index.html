<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prescient AI — Chief of Staff</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e1a; color: #e2e8f0; min-height: 100vh; }
  a { color: #60a5fa; text-decoration: none; }
  a:hover { text-decoration: underline; }
  button { cursor: pointer; border: none; font-family: inherit; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 5px; transition: all 0.15s; }
  button:active { transform: scale(0.96); }
  .layout { display: flex; height: 100vh; }

  /* SIDEBAR */
  .sidebar { width: 200px; background: #0f1525; border-right: 1px solid #1e293b; padding: 20px 14px; flex-shrink: 0; display: flex; flex-direction: column; }
  .sidebar h2 { font-size: 14px; color: #fff; font-weight: 700; margin-bottom: 4px; }
  .sidebar .sub { font-size: 11px; color: #10b981; margin-bottom: 20px; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; color: #94a3b8; font-size: 13px; cursor: pointer; margin-bottom: 2px; }
  .nav-item:hover, .nav-item.active { background: #1e293b; color: #fff; }
  .nav-item .dot { width: 6px; height: 6px; border-radius: 50%; }
  .nav-item .count { margin-left: auto; font-size: 10px; background: #1e293b; color: #64748b; padding: 1px 6px; border-radius: 8px; }
  .sidebar .spacer { flex: 1; }
  .sidebar .user { font-size: 12px; color: #64748b; border-top: 1px solid #1e293b; padding-top: 12px; }
  .sidebar .user strong { color: #cbd5e1; display: block; }

  /* CENTER */
  .center { flex: 1; overflow: hidden; }
  #main { padding: 24px 28px; }
  .center h1 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .center .subtitle { font-size: 13px; color: #64748b; margin-bottom: 20px; }

  /* SECTION HEADERS */
  .section { margin-bottom: 28px; }
  .section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .section-icon { font-size: 16px; }
  .section-title { font-size: 13px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
  .section-count { font-size: 10px; color: #475569; background: #1e293b; padding: 1px 6px; border-radius: 8px; }
  .section-empty { font-size: 13px; color: #334155; padding: 12px 16px; font-style: italic; }

  /* MEETING CARD (Today → Up Next) */
  .mtg-card { background: #111827; border: 2px solid #1e293b; border-radius: 8px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
  .mtg-card:hover { border-color: #334155; }
  .mtg-card.selected { border-color: #3b82f6; background: rgba(59,130,246,0.06); }
  .mtg-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .mtg-date { font-size: 11px; color: #10b981; font-weight: 700; background: rgba(16,185,129,0.12); padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
  .mtg-title { font-size: 14px; font-weight: 600; color: #fff; flex: 1; }
  .mtg-people { font-size: 11px; color: #64748b; }
  .mtg-summary { font-size: 12px; color: #94a3b8; line-height: 1.5; margin-bottom: 6px; }
  .mtg-action { font-size: 12px; color: #f59e0b; font-weight: 500; }
  .mtg-btns { display: flex; gap: 6px; margin-top: 8px; }

  /* ITEMS (Reply Now, CRM Gaps, Leads) */
  .item { background: #111827; border: 2px solid #1e293b; border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; transition: all 0.2s; position: relative; }
  .item:hover { border-color: #334155; background: #131b2e; transform: translateY(-1px); }
  .item.selected { border-color: #3b82f6; background: rgba(59,130,246,0.08); box-shadow: 0 0 0 1px rgba(59,130,246,0.1); }
  .item .company { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
  .item .body { flex: 1; min-width: 0; }
  .item .body .task { font-size: 13px; color: #cbd5e1; line-height: 1.4; }
  .item .body .meta { font-size: 11px; color: #64748b; margin-top: 3px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .item .actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; flex-wrap: wrap; }
  .badge-overdue { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; background: rgba(239,68,68,0.15); color: #ef4444; }
  .badge-stale { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; background: rgba(245,158,11,0.15); color: #f59e0b; }
  .badge-fresh { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; background: rgba(16,185,129,0.15); color: #10b981; }
  .deal-val { font-size: 10px; color: #10b981; font-weight: 600; }
  .owner-tag { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
  .owner-mike { background: rgba(96,165,250,0.15); color: #60a5fa; }
  .owner-brian { background: rgba(168,85,247,0.15); color: #a855f7; }
  .owner-will { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .owner-other { background: rgba(100,116,139,0.15); color: #94a3b8; }
  .btn-link { background: transparent; color: #64748b; border: 1px solid #334155; }
  .btn-link:hover { color: #cbd5e1; border-color: #475569; }
  .btn-sm { font-size: 10px; padding: 3px 8px; border-radius: 4px; background: transparent; border: 1px solid #334155; color: #94a3b8; }
  .btn-sm:hover { border-color: #60a5fa; color: #60a5fa; }
  .btn-action { font-size: 10px; padding: 4px 10px; border-radius: 4px; background: #1e40af; color: #93c5fd; }
  .btn-action:hover { background: #1d4ed8; }

  .tag { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 3px; }
  .tg { background: rgba(16,185,129,0.15); color: #10b981; }
  .tb { background: rgba(96,165,250,0.15); color: #60a5fa; }
  .ta { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .tr { background: rgba(239,68,68,0.15); color: #ef4444; }
  .tp { background: rgba(168,85,247,0.15); color: #a855f7; }
  .done-item { opacity: 0.4; cursor: default; }
  .done-item .task { text-decoration: line-through; }
  .archived-item { display: none; }

  /* SEARCH BAR (Leads) */
  .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .search-input { flex: 1; background: #111827; border: 1px solid #1e293b; border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: 13px; font-family: inherit; outline: none; }
  .search-input::placeholder { color: #475569; }
  .search-input:focus { border-color: #3b82f6; }
  .filter-btn { padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; background: #111827; border: 1px solid #1e293b; color: #94a3b8; cursor: pointer; }
  .filter-btn:hover, .filter-btn.active { border-color: #3b82f6; color: #60a5fa; background: rgba(59,130,246,0.08); }
  .ai-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; background: rgba(168,85,247,0.15); color: #a855f7; }

  /* PIPELINE TABLE */
  .pipe-table { width: 100%; border-collapse: collapse; }
  .pipe-table th { font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 0.8px; text-align: left; padding: 8px 12px; border-bottom: 1px solid #1e293b; }
  .pipe-table td { font-size: 13px; padding: 10px 12px; border-bottom: 1px solid rgba(30,41,59,0.4); }
  .pipe-table tr:hover { background: rgba(30,41,59,0.3); }
  .pipe-table .deal-name { color: #cbd5e1; font-weight: 500; }
  .pipe-table .deal-amount { color: #10b981; font-weight: 600; }
  .stage-pill { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; white-space: nowrap; }

  /* CHAT PANEL */
  .chat-panel { width: 370px; background: #0f1525; border-left: 1px solid #1e293b; display: flex; flex-direction: column; flex-shrink: 0; }
  .chat-header { padding: 14px 18px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 10px; }
  .chat-header .pulse { width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  .chat-header h3 { font-size: 14px; font-weight: 600; color: #fff; }
  .chat-header .badge { font-size: 10px; background: rgba(16,185,129,0.15); color: #10b981; padding: 2px 8px; border-radius: 10px; margin-left: auto; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .chat-msg { max-width: 92%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; word-wrap: break-word; }
  .chat-msg.agent { background: #1e293b; color: #cbd5e1; align-self: flex-start; border-bottom-left-radius: 4px; }
  .chat-msg.user { background: #1e40af; color: #dbeafe; align-self: flex-end; border-bottom-right-radius: 4px; }
  .chat-msg .ts { font-size: 10px; color: #475569; margin-top: 4px; }
  .chat-msg.user .ts { color: rgba(219,234,254,0.5); }

  /* CONTEXT BAR */
  .context-bar { padding: 10px 16px; border-top: 1px solid #1e293b; background: #111827; }
  .ctx-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .ctx-company { font-size: 13px; font-weight: 700; color: #fff; flex: 1; }
  .ctx-status-btns { display: flex; gap: 4px; }
  .ctx-status-btns button { font-size: 10px; padding: 3px 8px; border-radius: 4px; }
  .ctx-actions { display: flex; gap: 6px; }
  .ctx-btn { padding: 8px 0; border-radius: 6px; font-size: 12px; font-weight: 600; flex: 1; text-align: center; }
  .ctx-primary { background: #1e40af; color: #93c5fd; }
  .ctx-primary:hover { background: #1d4ed8; }
  .ctx-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
  .ctx-secondary:hover { color: #cbd5e1; border-color: #475569; }
  .ctx-slack { background: #4A154B; color: #E8D5E8; }
  .ctx-slack:hover { background: #5b1f5e; }
  .ctx-done-btn { background: transparent; color: #10b981; border: 1px solid #1e293b; }
  .ctx-done-btn:hover { border-color: #10b981; }
  .ctx-skip-btn { background: transparent; color: #64748b; border: 1px solid transparent; }
  .ctx-skip-btn:hover { color: #94a3b8; }
  .ctx-archive-btn { background: transparent; color: #475569; border: 1px solid transparent; }
  .ctx-archive-btn:hover { color: #ef4444; }

  /* QUICK CHIPS */
  .quick-chip { font-size: 11px; padding: 5px 10px; border-radius: 14px; background: #111827; border: 1px solid #1e293b; color: #94a3b8; cursor: pointer; transition: all 0.15s; display: inline-block; }
  .quick-chip:hover { border-color: #3b82f6; color: #60a5fa; background: rgba(59,130,246,0.08); }

  /* INPUT */
  .chat-input-area { padding: 12px 16px; border-top: 1px solid #1e293b; display: flex; gap: 8px; align-items: flex-end; }
  .chat-input { flex: 1; background: #111827; border: 1px solid #1e293b; border-radius: 10px; padding: 10px 14px; color: #e2e8f0; font-size: 13px; font-family: inherit; resize: none; outline: none; min-height: 40px; max-height: 120px; line-height: 1.4; }
  .chat-input::placeholder { color: #475569; }
  .chat-input:focus { border-color: #3b82f6; }
  .chat-send { width: 36px; height: 36px; border-radius: 50%; background: #1e40af; color: #93c5fd; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; padding: 0; }
  .chat-send:hover { background: #1d4ed8; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #10b981; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }

  /* DROPDOWN ACTION MENU */
  .action-group { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
  .action-primary { font-size: 11px; padding: 6px 14px; border-radius: 6px 0 0 6px; background: #1e40af; color: #93c5fd; font-weight: 600; white-space: nowrap; }
  .action-primary:hover { background: #1d4ed8; }
  .action-primary.green { background: rgba(16,185,129,0.2); color: #10b981; }
  .action-primary.green:hover { background: rgba(16,185,129,0.3); }
  .action-primary.purple { background: rgba(168,85,247,0.2); color: #a855f7; }
  .action-primary.purple:hover { background: rgba(168,85,247,0.3); }
  .action-chevron { font-size: 11px; padding: 6px 8px; border-radius: 0 6px 6px 0; background: #1e40af; color: #93c5fd; border-left: 1px solid rgba(147,197,253,0.2); position: relative; }
  .action-chevron:hover { background: #1d4ed8; }
  .action-chevron.green { background: rgba(16,185,129,0.2); color: #10b981; border-left-color: rgba(16,185,129,0.3); }
  .action-chevron.green:hover { background: rgba(16,185,129,0.3); }
  .action-chevron.purple { background: rgba(168,85,247,0.2); color: #a855f7; border-left-color: rgba(168,85,247,0.3); }
  .action-chevron.purple:hover { background: rgba(168,85,247,0.3); }
  .action-dropdown { display: none; position: absolute; right: 0; top: 100%; margin-top: 4px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 4px 0; min-width: 180px; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .action-dropdown.open { display: block; }
  .action-dropdown-item { display: flex; align-items: center; gap: 8px; padding: 8px 14px; font-size: 12px; color: #cbd5e1; cursor: pointer; white-space: nowrap; background: transparent; width: 100%; text-align: left; border-radius: 0; }
  .action-dropdown-item:hover { background: #334155; color: #fff; }
  .action-dropdown-item .dd-icon { width: 16px; text-align: center; font-size: 13px; flex-shrink: 0; }
  .action-dropdown-item.danger { color: #ef4444; }
  .action-dropdown-item.danger:hover { background: rgba(239,68,68,0.1); }
  .slack-opt { display: block; width: 100%; text-align: left; padding: 7px 14px; font-size: 13px; color: #cbd5e1; background: transparent; border: none; cursor: pointer; font-family: inherit; }
  .slack-opt:hover { background: #334155; color: #fff; }
  .dd-sep { height: 1px; background: #334155; margin: 4px 0; }

  /* MODAL OVERLAY */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .modal { background: #111827; border: 1px solid #1e293b; border-radius: 12px; width: 560px; max-width: 92vw; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #1e293b; }
  .modal-title { font-size: 15px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
  .modal-close { background: transparent; color: #64748b; font-size: 18px; padding: 4px 8px; border-radius: 4px; }
  .modal-close:hover { color: #fff; background: #1e293b; }
  .modal-body { padding: 20px; }
  .modal-footer { padding: 14px 20px; border-top: 1px solid #1e293b; display: flex; gap: 8px; justify-content: flex-end; }
  .modal-footer button { padding: 8px 20px; border-radius: 6px; font-size: 13px; font-weight: 600; }
  .modal-btn-primary { background: #1e40af; color: #93c5fd; }
  .modal-btn-primary:hover { background: #1d4ed8; }
  .modal-btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
  .modal-btn-secondary:hover { color: #fff; }
  .modal-btn-green { background: rgba(16,185,129,0.2); color: #10b981; }
  .modal-btn-green:hover { background: rgba(16,185,129,0.3); }
  .modal-btn-purple { background: rgba(168,85,247,0.2); color: #a855f7; }
  .modal-btn-purple:hover { background: rgba(168,85,247,0.3); }
  .modal-btn-linkedin { background: #0a66c2; color: #fff; }
  .modal-btn-linkedin:hover { background: #004182; }
  .modal-field { margin-bottom: 14px; }
  .modal-label { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; display: block; }
  .modal-input { width: 100%; background: #0a0e1a; border: 1px solid #334155; border-radius: 6px; padding: 10px 12px; color: #e2e8f0; font-size: 13px; font-family: inherit; outline: none; box-sizing: border-box; }
  .modal-input:focus { border-color: #3b82f6; }
  .modal-textarea { width: 100%; background: #0a0e1a; border: 1px solid #334155; border-radius: 6px; padding: 10px 12px; color: #e2e8f0; font-size: 13px; font-family: inherit; outline: none; resize: vertical; line-height: 1.6; box-sizing: border-box; }
  .modal-textarea:focus { border-color: #3b82f6; }
  .modal-info { background: #0a0e1a; border: 1px solid #1e293b; border-radius: 8px; padding: 14px; font-size: 12px; line-height: 1.7; color: #94a3b8; white-space: pre-wrap; }
  .modal-loading { display: flex; align-items: center; gap: 10px; padding: 20px; color: #64748b; font-size: 13px; }
  .modal-loading .spin { width: 16px; height: 16px; border: 2px solid #334155; border-top-color: #60a5fa; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .modal-success { color: #10b981; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .modal-error { color: #ef4444; font-size: 12px; margin-top: 8px; }
  .crm-option { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #0a0e1a; border: 1px solid #1e293b; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
  .crm-option:hover { border-color: #3b82f6; background: rgba(59,130,246,0.04); }
  .crm-option.selected { border-color: #3b82f6; background: rgba(59,130,246,0.08); }
  .crm-option-icon { font-size: 20px; width: 32px; text-align: center; }
  .crm-option-text { flex: 1; }
  .crm-option-title { font-size: 13px; font-weight: 600; color: #fff; }
  .crm-option-desc { font-size: 11px; color: #64748b; margin-top: 2px; }
  .prep-section { margin-bottom: 16px; }
  .prep-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #1e293b; }

  /* HERO START MY DAY */
  .hero { background: linear-gradient(135deg, #0f1525 0%, #1a1f3a 100%); border: 1px solid #1e293b; border-radius: 12px; padding: 24px 28px; margin-bottom: 24px; }
  .hero-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .hero-greeting { font-size: 22px; font-weight: 700; color: #fff; }
  .hero-date { font-size: 13px; color: #64748b; }
  .hero-stats { display: flex; gap: 20px; margin-bottom: 18px; }
  .hero-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .hero-stat-num { font-size: 26px; font-weight: 800; }
  .hero-stat-num.green { color: #10b981; }
  .hero-stat-num.red { color: #ef4444; }
  .hero-stat-num.blue { color: #60a5fa; }
  .hero-stat-num.yellow { color: #f59e0b; }
  .hero-stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
  .hero-start-btn { width: 100%; padding: 14px 24px; border-radius: 10px; font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #1e40af 0%, #7c3aed 100%); color: #fff; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; box-shadow: 0 4px 16px rgba(30,64,175,0.3); }
  .hero-start-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(30,64,175,0.4); }
  .hero-start-btn .arrow { font-size: 18px; transition: transform 0.2s; }
  .hero-start-btn:hover .arrow { transform: translateX(3px); }
  .hero-next-mtg { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .hero-next-mtg .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; animation: pulse 2s infinite; flex-shrink: 0; }
  .hero-next-mtg strong { color: #fff; }
  .hero-next-mtg span { color: #94a3b8; }

  /* PROGRESS BAR */
  .progress-wrap { margin-bottom: 20px; }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .progress-label { font-size: 12px; color: #64748b; }
  .progress-count { font-size: 12px; color: #10b981; font-weight: 700; }
  .progress-track { height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #10b981, #3b82f6); border-radius: 3px; transition: width 0.5s ease; }

  /* IMPROVED CONTEXT BAR */
  .context-bar { padding: 14px 16px; border-top: 1px solid #1e293b; background: #111827; }

function getStateColor(state) { return SIGNAL_STATE_COLORS[state] || '#94a3b8'; }
function formatStateName(state) { return SIGNAL_STATE_LABELS[state] || state; }

function runSignalEngine() {
  const { results, log } = _computeSignalStates(ACTIONS, CALENDAR_EVENTS, MEETINGS, PIPELINE);
  // Debug output
  const resolutions = log.filter(l => l.source === 'resolution');
  if (resolutions.length > 0) {
    console.log('[signal-engine] Computed states for ' + results.size + ' actions:',
      resolutions.map(l => l.company + ':' + l.state).join(', '));
  }
  // Log scheduling details
  const schedLogs = log.filter(l => l.source === 'scheduling');
  schedLogs.forEach(l => {
    console.log('[signal-engine:scheduling] ' + l.company + ': ' + l.result +
      (l.proposed ? ' proposed="' + l.proposed + '"' : '') +
      (l.conflicts ? ' conflicts=' + l.conflicts : '') +
      (l.event ? ' event="' + l.event + '"' : ''));
  });
  // Log suppressed recommendations
  for (const [id, state] of results) {
    const action = ACTIONS.find(a => a.id === id);
    if (action && state.recommendation.overridden && state.recommendation.originalAiRec) {
      const suppReason = state.recommendation.suppress?.length > 0 ? ' (suppressing: ' + state.recommendation.suppress.join(',') + ')' : '';
      console.debug('[signal-engine] ' + action.company + ': ' + state.canonicalState +
        ' — "' + state.recommendation.text + '" (was: "' + state.recommendation.originalAiRec + '")' + suppReason);
    }
  }
  // Emit live feed items for state changes
  emitSignalFeedItems(results);
  return results;
}

function _computeSignalStates(actions, calendarEvents, meetings, pipeline) {
  const log = [];
  const results = new Map();
  for (const action of actions) {
    if (action.status !== 'open') continue;
    const signals = _collectSignals(action, calendarEvents, meetings, pipeline, log);
    const state = _resolveCanonicalState(signals, log, action.company);
    const recommendation = _mapStateToRec(state, action, signals);
    const signalState = { canonicalState: state, signals, recommendation, computedAt: new Date().toISOString() };
    action._signalState = signalState;
    results.set(action.id, signalState);
  }
  return { results, log };
}

function _collectSignals(action, calendarEvents, meetings, pipeline, log) {
  const signals = { email: null, calendar: null, meeting: null, crm: null, scheduling: null };
  signals.email = _extractEmailSignal(action);
  log.push({ company: action.company, source: 'email', signal: signals.email });
  signals.calendar = _matchCalendarEvent(action, calendarEvents, log);
  signals.meeting = _matchMeeting(action, meetings, log);
  signals.crm = _matchPipelineDeal(action, pipeline, log);
  signals.scheduling = _resolveScheduling(action, signals.email, calendarEvents, signals.calendar, log);
  return signals;
}

function _extractEmailSignal(action) {
  const daysSince = _signalDaysBetween(action.lastActivity, new Date());
  const textLower = ((action.emailSummary||'') + ' ' + (action.task||'') + ' ' + (action.meta||'') + ' ' + (action.aiRec||'') + ' ' + (action.latestReply||'')).toLowerCase();
  return {
    hasReply: /\breplied\b|\bresponse\b|\bre:/.test(textLower),
    daysSinceActivity: daysSince,
    isIntro: !!action.isIntro,
    schedulingIntent: /schedul|calendly|set up.*time|book.*call|availab|setting up time|can you do|how about|let'?s do/i.test(textLower),
    proposalSent: /proposal sent|order form sent|pricing sent|quote sent/i.test(textLower),
    waitingForReply: daysSince >= 2 && /\b(sent|followed up|no response|waiting|nudge)\b/i.test(textLower),
    hasProposedTime: /\d{1,2}(?::\d{2})?\s*(?:am|pm)/i.test(textLower),
  };
}

function _signalExtractEmails(action) {
  const sources = [action.draftPrompt||'', action.crmPrompt||'', action.emailSummary||'', action.meta||'',
    ...(action.prospects||[]).map(p=>p.email||''), ...(action.replyTo||[])];
  const all = sources.join(' ').match(/[\w.+-]+@[\w.-]+\.\w+/g) || [];
  return [...new Set(all)].filter(e => !e.includes('prescientai.com') && !e.includes('prescient.ai'));
}

function _signalExtractNames(action) {
  const names = [];
  (action.prospects||[]).forEach(p => { if (p.name) names.push(p.name.toLowerCase()); });
  const metaNames = (action.meta||'').match(/^([A-Z][a-z]+ [A-Z][a-z]+)/);
  if (metaNames) names.push(metaNames[1].toLowerCase());
  const taskNames = (action.task||'').match(/(?:with|from)\s+([A-Z][a-z]+ [A-Z][a-z]+)/);
  if (taskNames) names.push(taskNames[1].toLowerCase());
  return [...new Set(names)];
}

function _matchCalendarEvent(action, calendarEvents, log) {
  if (!calendarEvents || calendarEvents.length === 0) return null;
  const companyLower = action.company.toLowerCase();
  const actionEmails = _signalExtractEmails(action);
  const actionNames = _signalExtractNames(action);
  let bestMatch = null, bestScore = 0;

  for (const ev of calendarEvents) {
    let score = 0;
    const reasons = [];
    const evAttendees = ev.attendees || ev.externalAttendees || [];
    const evEmails = evAttendees.map(a => (a.email||'').toLowerCase()).filter(Boolean);

    // +5: exact attendee email match
    for (const ae of actionEmails) {
      if (evEmails.includes(ae.toLowerCase())) { score += 5; reasons.push('email_match:'+ae); break; }
    }
    // +3: same company domain
    const evDomains = evEmails.map(e => e.split('@')[1]).filter(Boolean);
    const actionDomains = actionEmails.map(e => e.split('@')[1]).filter(Boolean);
    if (evDomains.some(d => actionDomains.includes(d)) ||
        evDomains.some(d => d.includes(companyLower.replace(/\s+/g,'')) || companyLower.includes(d.split('.')[0]))) {
      score += 3; reasons.push('domain_match');
    }
    // +2: contact name in title/attendees
    const titleLower = (ev.title||ev.summary||'').toLowerCase();
    const attendeeNames = evAttendees.map(a => (a.name||'').toLowerCase());
    for (const name of actionNames) {
      if (name.length >= 3 && (titleLower.includes(name) || attendeeNames.some(an => an.includes(name)))) {
        score += 2; reasons.push('name_match:'+name); break;
      }
    }
    // +2: company name in meeting title
    const companyWords = companyLower.split(/\s+/).filter(w => w.length >= 4);
    if (titleLower.includes(companyLower) || companyWords.some(w => titleLower.includes(w))) {
      score += 2; reasons.push('company_in_title');
    }
    // +2: event within 7 days of thread
    const evDate = new Date(ev.start);
    const actDate = new Date(action.lastActivity);
    if (!isNaN(evDate) && !isNaN(actDate) && Math.abs(evDate - actDate) <= 7*86400000) {
      score += 2; reasons.push('time_proximity');
    }
    if (score > bestScore) { bestScore = score; bestMatch = { event: ev, confidence: score, reasons }; }
  }

  if (bestScore >= 5 && bestMatch) {
    const evStart = new Date(bestMatch.event.start);
    log.push({ company: action.company, source: 'calendar', match: bestMatch.event.title, confidence: bestScore, reasons: bestMatch.reasons });
    return { matchedEvent: bestMatch.event, confidence: bestScore, reasons: bestMatch.reasons,
      isUpcoming: evStart > new Date(), isPast: evStart <= new Date() };
  }
  log.push({ company: action.company, source: 'calendar', match: null, bestScore });
  return null;
}

function _matchMeeting(action, meetings, log) {
  if (!meetings || meetings.length === 0) return null;
  const companyLower = action.company.toLowerCase();
  // Direct actionId link
  const directMatch = meetings.find(m => m.actionId === action.id);
  if (directMatch) {
    log.push({ company: action.company, source: 'meeting', match: directMatch.title, method: 'actionId' });
    return { matchedMeeting: directMatch, hasGranola: !!(directMatch.granolaId||directMatch.url||directMatch.granolaUrl),
      isUpcoming: !!directMatch.upcoming, isPast: !directMatch.upcoming };
  }
  // Fuzzy match
  const companyWords = companyLower.split(/\s+/).filter(w => w.length >= 4);
  const fuzzyMatch = meetings.find(m => {
    const tl = (m.title||'').toLowerCase(), pl = (m.people||'').toLowerCase();
    return tl.includes(companyLower) || pl.includes(companyLower) || companyWords.some(w => tl.includes(w) || pl.includes(w));
  });
  if (fuzzyMatch) {
    log.push({ company: action.company, source: 'meeting', match: fuzzyMatch.title, method: 'fuzzy' });
    return { matchedMeeting: fuzzyMatch, hasGranola: !!(fuzzyMatch.granolaId||fuzzyMatch.url||fuzzyMatch.granolaUrl),
      isUpcoming: !!fuzzyMatch.upcoming, isPast: !fuzzyMatch.upcoming };
  }
  log.push({ company: action.company, source: 'meeting', match: null });
  return null;
}

function _matchPipelineDeal(action, pipeline, log) {
  if (!pipeline || pipeline.length === 0) return null;
  const companyLower = action.company.toLowerCase();
  const deal = pipeline.find(d => { const n = (d.name||'').toLowerCase(); return n.includes(companyLower) || companyLower.includes(n); });
  if (deal) {
    const sl = (deal.stage||'').toLowerCase();
    log.push({ company: action.company, source: 'crm', deal: deal.name, stage: deal.stage });
    return { deal, stage: deal.stage, isClosedWon: sl === 'closed won', isClosedLost: sl === 'closed lost', isClosed: sl.startsWith('closed') };
  }
  log.push({ company: action.company, source: 'crm', deal: null });
  return null;
}

// ── Scheduling time extraction + availability (client-side) ──

function _extractProposedTimes(action) {
  const text = [action.emailSummary||'', action.task||'', action.meta||'', action.aiRec||'', action.latestReply||''].join(' ');
  const clean = text.replace(/<[^>]*>/g, ' ').replace(/&[a-z]+;/g, ' ');
  const proposals = [];

  const patterns = [
    /(?:can you do|how about|let's do|propose|suggesting|available)\s+(?:on\s+)?(\w+ \d{1,2}(?:st|nd|rd|th)?)\s+(?:at\s+)?(\d{1,2}(?::\d{2})?\s*(?:am|pm))\s*(\w{2,4})?/gi,
    /((?:jan|feb|mar|march|apr|april|may|jun|june|jul|july|aug|sept?|oct|nov|dec)\w*\s+\d{1,2}(?:st|nd|rd|th)?)\s+(?:at\s+)?(\d{1,2}(?::\d{2})?\s*(?:am|pm))\s*(\w{2,4})?/gi,
    /(\d{1,2}\/\d{1,2}(?:\/\d{2,4})?)\s+(?:at\s+)?(\d{1,2}(?::\d{2})?\s*(?:am|pm))\s*(\w{2,4})?/gi,
    /((?:mon|tue|wed|thu|fri|sat|sun)\w*)\s+(?:at\s+)?(\d{1,2}(?::\d{2})?\s*(?:am|pm))\s*(\w{2,4})?/gi,
  ];

  for (const pat of patterns) {
    let m;
    while ((m = pat.exec(clean)) !== null) {
      const parsed = _parseProposedDateTime(m);
      if (parsed) proposals.push({ raw: m[0].trim(), ...parsed });
    }
  }

  // Explicit proposedTimes override parsed — these are authoritative
  if (action.proposedTimes?.length) {
    const explicit = [];
    for (const pt of action.proposedTimes) {
      if (pt.date) explicit.push({ raw: pt.raw || pt.date, date: new Date(pt.date), timezone: pt.timezone || 'EST', source: 'explicit' });
    }
    if (explicit.length > 0) return explicit;
  }

  // Deduplicate parsed by rounding to nearest 15 min
  const seen = new Set();
  return proposals.filter(p => {
    if (!p.date) return false;
    const key = Math.round(p.date.getTime() / 900000);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function _parseProposedDateTime(match) {
  const now = new Date();
  const year = now.getFullYear();
  let datePart = match[1], timePart = match[2], tzPart = match[3];
  if (!datePart || !timePart) return null;
  datePart = datePart.replace(/(st|nd|rd|th)/gi, '').trim();

  const tm = timePart.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)/i);
  if (!tm) return null;
  let hrs = parseInt(tm[1]), mins = parseInt(tm[2]||'0');
  if (tm[3].toLowerCase() === 'pm' && hrs < 12) hrs += 12;
  if (tm[3].toLowerCase() === 'am' && hrs === 12) hrs = 0;

  let d;
  const dowMatch = datePart.match(/^(mon|tue|wed|thu|fri|sat|sun)/i);
  if (dowMatch) {
    const dayMap = {sun:0,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6};
    const target = dayMap[dowMatch[1].toLowerCase().substring(0,3)];
    d = new Date(now);
    let ahead = target - d.getDay();
    if (ahead <= 0) ahead += 7;
    d.setDate(d.getDate() + ahead);
  } else if (/^\d+\/\d+/.test(datePart)) {
    const parts = datePart.split('/');
    d = new Date(parts[2] ? (parseInt(parts[2]) < 100 ? parseInt(parts[2])+2000 : parseInt(parts[2])) : year, parseInt(parts[0])-1, parseInt(parts[1]));
  } else {
    const months = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
    const mm = datePart.match(/(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\w*/i);
    const dd = datePart.match(/\d+/);
    if (!mm || !dd) return null;
    d = new Date(year, months[mm[1].toLowerCase().substring(0,3)], parseInt(dd[0]));
    if (d < now && (now - d) > 30*86400000) d.setFullYear(year+1);
  }
  if (!d || isNaN(d)) return null;
  d.setHours(hrs, mins, 0, 0);
  return { date: d, timezone: tzPart ? tzPart.toUpperCase() : null, source: 'parsed' };
}

function _checkAvailability(proposedDate, calendarEvents) {
  if (!proposedDate || !calendarEvents?.length) return { available: true, conflicts: [] };
  const pStart = new Date(proposedDate);
  const pEnd = new Date(pStart.getTime() + 30*60000);
  const conflicts = [];
  for (const ev of calendarEvents) {
    const eStart = new Date(ev.start);
    const eEnd = new Date(ev.end || eStart.getTime()+3600000);
    if (pStart < eEnd && pEnd > eStart) {
      conflicts.push({ title: ev.title||ev.summary||'(No title)', start: ev.start, end: ev.end });
    }
  }
  return { available: conflicts.length === 0, conflicts };
}

function _findAlternativeSlots(proposedDate, calendarEvents, count) {
  count = count || 3;
  const alts = [];
  const base = new Date(proposedDate);
  const offsets = [{d:0,h:-1},{d:0,h:1},{d:0,h:2},{d:1,h:0},{d:1,h:-1},{d:1,h:1},{d:-1,h:0},{d:2,h:0}];
  for (const off of offsets) {
    if (alts.length >= count) break;
    const c = new Date(base);
    c.setDate(c.getDate()+off.d);
    c.setHours(c.getHours()+off.h);
    if (c.getDay()===0||c.getDay()===6) continue;
    if (c.getHours()<9||c.getHours()>=17) continue;
    if (c <= new Date()) continue;
    if (_checkAvailability(c, calendarEvents).available) alts.push(c);
  }
  return alts;
}

function _resolveScheduling(action, emailSignal, calendarEvents, calendarMatch, log) {
  const proposedTimes = _extractProposedTimes(action);
  if (proposedTimes.length === 0 && !emailSignal?.schedulingIntent) return null;

  if (calendarMatch?.isUpcoming) {
    log.push({ company: action.company, source: 'scheduling', result: 'already_scheduled', event: calendarMatch.matchedEvent?.title });
    return { status: 'already_scheduled', matchedEvent: calendarMatch.matchedEvent, proposedTimes };
  }

  if (proposedTimes.length > 0) {
    const primary = proposedTimes[0];
    const availability = _checkAvailability(primary.date, calendarEvents);
    const alternatives = availability.available ? [] : _findAlternativeSlots(primary.date, calendarEvents);
    const result = { status: availability.available ? 'available_to_book' : 'conflict', proposedTimes, primaryProposal: primary, availability, alternatives };
    log.push({ company: action.company, source: 'scheduling', result: result.status, proposed: primary.raw, proposedDate: primary.date?.toISOString(), conflicts: availability.conflicts.length });
    return result;
  }

  const textLower = [action.emailSummary||'', action.task||'', action.latestReply||''].join(' ').toLowerCase();
  if (/you (sent|replied|shared).*availab|sent.*calendly|here.*my.*availab/i.test(textLower)) {
    log.push({ company: action.company, source: 'scheduling', result: 'waiting_on_prospect' });
    return { status: 'waiting_on_prospect', proposedTimes: [] };
  }
  log.push({ company: action.company, source: 'scheduling', result: 'intent_only' });
  return { status: 'intent_only', proposedTimes: [] };
}

function _resolveCanonicalState(signals, log, company) {
  const { email, calendar, meeting, crm, scheduling } = signals;
  if (crm?.isClosedWon) return _logSignalState('CLOSED_WON', company, log);
  if (crm?.isClosedLost) return _logSignalState('CLOSED_LOST', company, log);
  // MEETING_COMPLETED only within 72h — after that, fall through to email signals
  const meetingAge = meeting?.isPast && meeting.matchedMeeting?.date ? _signalDaysBetween(meeting.matchedMeeting.date, new Date()) : 999;
  const calendarAge = calendar?.isPast && calendar.matchedEvent?.start ? _signalDaysBetween(calendar.matchedEvent.start, new Date()) : 999;
  if (meeting?.isPast && meeting.hasGranola && meetingAge <= 3) return _logSignalState('MEETING_COMPLETED', company, log);
  if (calendar?.isPast && calendarAge <= 3) return _logSignalState('MEETING_COMPLETED', company, log);
  if (calendar?.isUpcoming) return _logSignalState('MEETING_BOOKED', company, log);
  if (meeting?.isUpcoming) return _logSignalState('MEETING_BOOKED', company, log);
  // Scheduling sub-states
  if (scheduling?.status === 'already_scheduled') return _logSignalState('ALREADY_SCHEDULED', company, log);
  if (scheduling?.status === 'available_to_book') return _logSignalState('AVAILABLE_TO_BOOK', company, log);
  if (scheduling?.status === 'conflict') return _logSignalState('SCHEDULING_CONFLICT', company, log);
  if (scheduling?.status === 'waiting_on_prospect') return _logSignalState('WAITING_ON_PROSPECT', company, log);
  if (email?.proposalSent) return _logSignalState('PROPOSAL_ACTIVE', company, log);
  if (email?.waitingForReply) return _logSignalState('FOLLOW_UP_REQUIRED', company, log);
  if (scheduling?.proposedTimes?.length > 0) return _logSignalState('SCHEDULING_PROPOSED', company, log);
  if (email?.schedulingIntent) return _logSignalState('SCHEDULING_INTENT', company, log);
  if (email?.hasReply) return _logSignalState('REPLIED', company, log);
  if (email?.isIntro) return _logSignalState('INTRO_RECEIVED', company, log);
  return _logSignalState('NEW_INBOUND', company, log);
}

function _logSignalState(state, company, log) { log.push({ company, source: 'resolution', state }); return state; }

function _mapStateToRec(state, action, signals) {
  const config = SIGNAL_STATE_RECS[state];
  if (!config || !config.rec) return { text: action.aiRec, chips: null, suppress: [], overridden: false, state };
  let text = config.rec;

  if (state === 'AVAILABLE_TO_BOOK' && signals.scheduling?.primaryProposal) {
    const p = signals.scheduling.primaryProposal;
    const d = p.date;
    if (d && !isNaN(d)) {
      const dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      text = dn[d.getDay()] + ' ' + (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}).toLowerCase() + ' is OPEN — confirm + send invite';
    }
  } else if (state === 'SCHEDULING_CONFLICT' && signals.scheduling?.primaryProposal) {
    const p = signals.scheduling.primaryProposal;
    const d = p.date;
    const conflicts = signals.scheduling.availability?.conflicts || [];
    const altCount = signals.scheduling.alternatives?.length || 0;
    if (d && !isNaN(d)) {
      const dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      text = dn[d.getDay()] + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}).toLowerCase() + ' conflicts with "' + (conflicts[0]?.title||'another meeting') + '" — ' + altCount + ' alternatives';
    }
  } else if (state === 'SCHEDULING_PROPOSED' && signals.scheduling?.primaryProposal) {
    text = 'Proposed: "' + signals.scheduling.primaryProposal.raw + '" — checking calendar...';
  } else if (state === 'ALREADY_SCHEDULED' && signals.scheduling?.matchedEvent) {
    const ev = signals.scheduling.matchedEvent;
    const d = new Date(ev.start);
    if (!isNaN(d)) {
      const dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      text = 'Already on calendar: ' + dn[d.getDay()] + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}).toLowerCase() + ' — "' + (ev.title||ev.summary) + '"';
    }
  } else if (state === 'WAITING_ON_PROSPECT') {
    text = 'You sent availability — waiting for prospect to book';
  } else if (state === 'MEETING_BOOKED' && signals.calendar?.matchedEvent) {
    const ev = signals.calendar.matchedEvent;
    const d = new Date(ev.start);
    if (!isNaN(d)) {
      const dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      text = 'Meeting booked ' + dn[d.getDay()] + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}).toLowerCase() + ' — generate prep?';
    }
  } else if (state === 'MEETING_BOOKED' && signals.meeting?.matchedMeeting) {
    text = 'Meeting scheduled: ' + (signals.meeting.matchedMeeting.title||signals.meeting.matchedMeeting.date) + ' — generate prep?';
  } else if (state === 'MEETING_COMPLETED' && signals.meeting?.matchedMeeting) {
    text = 'Meeting completed: ' + signals.meeting.matchedMeeting.title + ' — run post-call?';
  }
  return { text, chips: config.chips, suppress: config.suppress||[], overridden: true, state, originalAiRec: action.aiRec, scheduling: signals.scheduling || null };
}

function _signalDaysBetween(dateStr, now) {
  if (!dateStr) return 999;
  const d = new Date(dateStr);
  if (isNaN(d)) return 999;
  return Math.floor((now - d) / 86400000);
}

async function reseedData() {
  try {
    const res = await apiFetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'reseed' }),
    });
    const data = await res.json();
    if (data.success) {
      console.log('[data] KV reseeded:', data);
      await loadData();
      runSignalEngine();
      renderCurrentTab();
      addFeedItem('sync', 'Data reseeded from latest config', null);
    }
  } catch (err) { console.error('Reseed failed:', err); }
}

async function loadData() {
  try {
    const res = await apiFetch("/api/data");
    if (!res.ok) throw new Error("API error: " + res.status);
    const data = await res.json();
    if (data.actions) ACTIONS = data.actions;
    if (data.meetings) MEETINGS = data.meetings;
    if (data.pipeline) PIPELINE = data.pipeline;
  } catch (err) {
    console.error("Failed to load data:", err);
    const chat = document.getElementById("chatMessages");
    if (chat) {
      chat.innerHTML = '<div class="chat-msg agent"><strong>Error loading data.</strong> Check API connection.<br><span style="color:#ef4444;font-size:11px;">' + err.message + '</span></div>';
    }
  }
  // Load live calendar in background (non-blocking)
  loadCalendar();
}

async function loadCalendar() {
  try {
    const res = await apiFetch("/api/calendar");
    if (!res.ok) return;
    const data = await res.json();
    if (data.meetings) {
      CALENDAR_EVENTS = data.meetings;
      // Merge calendar events into MEETINGS if they're external and not already tracked
      const existingTitles = new Set(MEETINGS.map(m => m.title.toLowerCase()));
      data.meetings.filter(m => m.external).forEach(ev => {
        if (!existingTitles.has(ev.title.toLowerCase())) {
          const startDate = new Date(ev.start);
          const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
          const timeStr = startDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }).toLowerCase();
          const dateStr = `${dayNames[startDate.getDay()]} ${startDate.getMonth()+1}/${startDate.getDate()} · ${timeStr}`;
          MEETINGS.push({
            date: dateStr,
            title: ev.title,
            people: ev.externalAttendees.map(a => a.name).join(', '),
            upcoming: startDate > new Date(),
            external: true,
            summary: `External meeting with ${ev.externalAttendees.map(a => `${a.name} (${a.company})`).join(', ')}`,
            action: startDate > new Date() ? 'Prep needed' : 'Post-call follow-up needed',
            status: 'open',
            calendarEvent: ev, // Store full event for post-call flow
          });
        }
      });
      runSignalEngine(); // Reconcile signals now that calendar is loaded
      renderCurrentTab();
    }
  } catch (e) {
    // Calendar not configured — silent fail
  }
}

// LIVE DATA SYNC (Feature 3)
// ═══════════════════════════════════════
let _syncing = false;
async function syncInBackground() {
  if (_syncing) return;
  _syncing = true;
  const indicator = document.getElementById("syncIndicator");
  if (indicator) indicator.innerHTML = '<span style="color:#f59e0b;">Syncing...</span>';

  try {
    const res = await apiFetch('/api/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lastSyncedAt: _lastSyncedAt }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Sync failed');

    // Merge new data into globals
    if (data.newActions?.length) {
      const existingIds = new Set(ACTIONS.map(a => a.id));
      const deduped = data.newActions.filter(a => !existingIds.has(a.id));
      // Also deduplicate by company name for recently added — but never dedup intros
      const existingCompanies = new Set(ACTIONS.filter(a => a.status === 'open').map(a => a.company.toLowerCase()));
      const truly = deduped.filter(a => a.isIntro || !existingCompanies.has(a.company.toLowerCase()));
      ACTIONS.push(...truly);
    }
    if (data.updatedPipeline?.length) {
      const pipeMap = new Map(PIPELINE.map(d => [String(d.id), d]));
      data.updatedPipeline.forEach(d => {
        if (pipeMap.has(String(d.id))) {
          Object.assign(pipeMap.get(String(d.id)), d);
        } else {
          PIPELINE.push(d);
        }
      });
    }
    if (data.newMeetings?.length) {
      const existingTitles = new Set(MEETINGS.map(m => m.title.toLowerCase()));
      const newMtgs = data.newMeetings.filter(m => !existingTitles.has(m.title.toLowerCase()));
      MEETINGS.push(...newMtgs);
    }

    // Store sync time
    _lastSyncedAt = data.syncedAt;
    localStorage.setItem('lastSyncedAt', _lastSyncedAt);

    // Clear caches so they regenerate with fresh data
    _briefingCache = null;
    _intelligenceCache = null;
    _endOfDayCache = null;
    _endOfWeekCache = null;

    // Recompute signal states after merge
    runSignalEngine();

    // Update UI
    renderCurrentTab();
    updateSyncIndicator();

    // Post to live feed
    const newEmails = data.summary?.emailsProcessed || 0;
    const newDeals = data.summary?.dealsUpdated || 0;
    const newMtgs = data.summary?.meetingsFound || 0;
    const total = newEmails + newDeals + newMtgs;

    if (newEmails > 0) {
      const intros = [];
      (data.newActions || []).forEach(a => {
        if (a.isIntro) {
          addFeedItem('email', `<strong style="color:#10b981;">🤝 WARM INTRO</strong> <strong>${a.company}</strong> — ${a.task}`, a.id);
          intros.push(a);
          console.log(`[sync:feed] Intro email surfaced: company=${a.company}, introducer=${a.introducer}, prospects=${JSON.stringify(a.prospects)}`);
        } else {
          addFeedItem('email', `<strong>${a.company}</strong> — ${a.task}`, a.id);
        }
      });
      // Auto-select intro if it's the only new item and nothing is selected
      if (intros.length === 1 && !selectedId) {
        const introItem = ACTIONS.find(x => x.id === intros[0].id);
        if (introItem) setTimeout(() => selectItem(introItem.id), 300);
      }
    }
    if (newDeals > 0) {
      (data.updatedPipeline || []).forEach(d => {
        addFeedItem('deal', `<strong>${d.name}</strong> moved to ${d.stage}`, null);
      });
    }
    if (newMtgs > 0) {
      (data.newMeetings || []).forEach(m => {
        addFeedItem('meeting', `<strong>${m.title}</strong> — ${m.people}`, null);
      });
    }

    if (total > 0) {
      showToast(`Synced: ${newEmails} emails, ${newDeals} deals, ${newMtgs} meetings`);
    } else {
      addFeedItem('sync', 'No new updates', null);
    }

    if (data.summary?.errors?.length) {
      data.summary.errors.forEach(e => addFeedItem('error', e, null));
    }
  } catch (err) {
    console.error('Sync error:', err);
    if (indicator) indicator.innerHTML = '<span style="color:#ef4444;">Sync failed</span>';
    addFeedItem('error', 'Sync failed — ' + (err.message || 'unknown error'), null);
  } finally {
    _syncing = false;
  }
}

function updateSyncIndicator() {
  const indicator = document.getElementById("syncIndicator");
  if (!indicator) return;
  if (_lastSyncedAt) {
    const mins = Math.floor((Date.now() - new Date(_lastSyncedAt).getTime()) / 60000);
    const label = mins < 1 ? 'just now' : mins < 60 ? `${mins}m ago` : `${Math.floor(mins/60)}h ago`;
    indicator.innerHTML = `<span style="color:#64748b;">Synced ${label}</span>`;
  } else {
    indicator.innerHTML = '<span style="color:#475569;">Not synced</span>';
  }
}

let _feedUnread = 0;

function startAutoSync() {
  if (_syncTimer) clearInterval(_syncTimer);
  _syncTimer = setInterval(() => {
    syncInBackground();
    updateSyncIndicator();
  }, SYNC_INTERVAL_MS);
  // Also keep the "synced X ago" label fresh
  setInterval(updateSyncIndicator, 30000);
}

function toggleFeed() {
  _feedOpen = !_feedOpen;
  const feed = document.getElementById('liveFeed');
  if (feed) feed.classList.toggle('open', _feedOpen);
  if (_feedOpen) {
    _feedUnread = 0;
    updateFeedCount();
  }
}

function addFeedItem(type, text, actionId) {
  const icons = {
    email: '\u2709\uFE0F', deal: '\u26A1', meeting: '\uD83D\uDCC5', sync: '\u2714\uFE0F', error: '\u26A0\uFE0F',
    scheduling: '\uD83D\uDCC5', signal: '\uD83D\uDCE1', reply: '\u21A9\uFE0F', conflict: '\u26A0\uFE0F',
    available: '\u2705', intro: '\uD83E\uDD1D', state_change: '\uD83D\uDD04',
  };
  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }).toLowerCase();

  const item = { type, text, time: timeStr, actionId, ts: now.getTime() };
  _feedItems.unshift(item);
  if (_feedItems.length > 50) _feedItems.length = 50; // cap at 50

  if (!_feedOpen) {
    _feedUnread++;
    updateFeedCount();
  }

  const feed = document.getElementById('liveFeed');
  if (!feed) return;

  const clickAttr = actionId ? ` onclick="selectItem(${actionId})" style="cursor:pointer;"` : '';
  const el = document.createElement('div');
  el.className = 'feed-item';
  el.innerHTML = `<span class="feed-time">${timeStr}</span><span class="feed-icon">${icons[type] || '\u2022'}</span><span class="feed-text"${clickAttr}>${text}</span>`;

  feed.insertBefore(el, feed.firstChild);

  // Trim DOM to 50 items
  while (feed.children.length > 50) feed.removeChild(feed.lastChild);
}

// Emit signal-state-driven feed items after engine runs
function emitSignalFeedItems(results) {
  for (const [id, state] of results) {
    const action = ACTIONS.find(a => a.id === id);
    if (!action) continue;
    const prev = action._prevCanonicalState;
    const cur = state.canonicalState;

    // Only emit on state change or first computation of interesting states
    if (prev === cur) continue;
    action._prevCanonicalState = cur;

    switch (cur) {
      case 'AVAILABLE_TO_BOOK': {
        const sched = state.scheduling || state.recommendation?.scheduling;
        const timeStr = sched?.primaryProposal?.raw || 'proposed time';
        addFeedItem('available', `<strong style="color:#10b981;">${action.company}</strong> — ${timeStr} is <strong>OPEN</strong>. Confirm + invite!`, id);
        break;
      }
      case 'SCHEDULING_CONFLICT': {
        const sched = state.scheduling || state.recommendation?.scheduling;
        const timeStr = sched?.primaryProposal?.raw || 'proposed time';
        const conflictName = sched?.availability?.conflicts?.[0]?.title || 'another meeting';
        addFeedItem('conflict', `<strong style="color:#ef4444;">${action.company}</strong> — ${timeStr} <strong>CONFLICTS</strong> with "${conflictName}"`, id);
        break;
      }
      case 'SCHEDULING_PROPOSED':
        addFeedItem('scheduling', `<strong>${action.company}</strong> — time proposed, checking availability...`, id);
        break;
      case 'WAITING_ON_PROSPECT':
        addFeedItem('scheduling', `<strong>${action.company}</strong> — sent availability, waiting for prospect`, id);
        break;
      case 'MEETING_BOOKED':
        addFeedItem('meeting', `<strong style="color:#a855f7;">${action.company}</strong> — meeting booked! ${state.recommendation?.text || ''}`, id);
        break;
      case 'MEETING_COMPLETED':
        addFeedItem('meeting', `<strong>${action.company}</strong> — meeting completed. Run post-call?`, id);
        break;
      case 'INTRO_RECEIVED':
        if (!prev) addFeedItem('intro', `<strong style="color:#10b981;">${action.company}</strong> — warm intro received`, id);
        break;
      case 'FOLLOW_UP_REQUIRED':
        addFeedItem('signal', `<strong style="color:#f59e0b;">${action.company}</strong> — follow-up needed (${state.signals?.email?.daysSinceActivity || '?'}d stale)`, id);
        break;
      case 'REPLIED':
        addFeedItem('reply', `<strong style="color:#60a5fa;">${action.company}</strong> — prospect replied`, id);
        break;
      case 'CLOSED_WON':
        addFeedItem('deal', `<strong style="color:#10b981;">${action.company}</strong> — CLOSED WON!`, id);
        break;
      case 'CLOSED_LOST':
        addFeedItem('deal', `<strong style="color:#ef4444;">${action.company}</strong> — deal lost`, id);
        break;
      case 'PROPOSAL_ACTIVE':
        addFeedItem('deal', `<strong style="color:#f59e0b;">${action.company}</strong> — proposal active`, id);
        break;
    }
  }
}

function updateFeedCount() {
  const badge = document.getElementById('feedCount');
  if (!badge) return;
  if (_feedUnread > 0) {
    badge.textContent = _feedUnread;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

async function startMyDay() {
  if (_briefingCache) {
    renderBriefing(_briefingCache);
    return;
  }

  addChat("agent", '<div class="modal-loading" style="padding:0;"><div class="spin"></div>Building your daily briefing...</div>');

  // Fetch intelligence in parallel with briefing
  let intelligence = _intelligenceCache;
  if (!intelligence) {
    try {
      const intRes = await apiFetch('/api/intelligence', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pipeline: PIPELINE, actions: ACTIONS, meetings: MEETINGS }),
      });
      const intData = await intRes.json();
      if (intData.success) {
        intelligence = intData.intelligence;
        _intelligenceCache = intelligence;
      }
    } catch {}
  }

  try {
    const res = await apiFetch('/api/briefing', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        actions: ACTIONS,
        meetings: MEETINGS,
        pipeline: PIPELINE,
        calendarEvents: CALENDAR_EVENTS,
        dealIntelligence: intelligence,
      }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Briefing failed');

    _briefingCache = data.briefing;
    // Save daily snapshot for End My Day diff comparison
    saveDailySnapshot();
    // Save weekly snapshot on Mondays for End of Week diff
    if (new Date().getDay() === 1) saveWeeklySnapshot();
    // Replace the loading message
    chatHistory.pop();
    renderBriefing(data.briefing);
  } catch (err) {
    chatHistory.pop();
    addChat("agent", `<span style="color:#ef4444;">Briefing failed: ${err.message}</span><br>Falling back to first item.`);
    const open = getOpen();
    if (open.length) selectItem(open[0].id);
  }
}

function renderBriefing(b) {
  const urgColors = { critical: '#ef4444', high: '#f59e0b', medium: '#60a5fa' };

  let html = `<div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:8px;">Your Daily Briefing</div>`;
  html += `<div style="font-size:12px;color:#94a3b8;margin-bottom:12px;">${b.summary || ''}</div>`;

  // Priorities
  if (b.priorities?.length) {
    html += `<div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:6px;">Top Priorities</div>`;
    b.priorities.forEach(p => {
      const color = urgColors[p.urgency] || '#64748b';
      html += `<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;cursor:pointer;" onclick="selectItem(${p.actionId})">
        <span style="font-size:16px;font-weight:800;color:${color};min-width:20px;">${p.rank}</span>
        <div>
          <div style="font-size:13px;font-weight:600;color:#fff;">${p.company} <span style="font-size:9px;padding:2px 6px;border-radius:3px;background:${color}20;color:${color};margin-left:4px;">${p.urgency}</span></div>
          <div style="font-size:11px;color:#94a3b8;line-height:1.4;">${p.reason}</div>
        </div>
      </div>`;
    });
  }

  // Quick wins
  if (b.quickWins?.length) {
    html += `<div style="font-size:11px;font-weight:700;color:#10b981;text-transform:uppercase;margin:10px 0 4px;">Quick Wins</div>`;
    b.quickWins.forEach(w => {
      html += `<div style="font-size:11px;color:#6ee7b7;margin-bottom:3px;">&#8226; ${w}</div>`;
    });
  }

  // Risks
  if (b.risks?.length) {
    html += `<div style="font-size:11px;font-weight:700;color:#ef4444;text-transform:uppercase;margin:10px 0 4px;">Risks</div>`;
    b.risks.forEach(r => {
      html += `<div style="font-size:11px;color:#fca5a5;margin-bottom:3px;">&#9888; ${r.company || ''}: ${r.detail}</div>`;
    });
  }

  // Today's meetings
  if (b.todaysMeetings?.length) {
    html += `<div style="font-size:11px;font-weight:700;color:#f59e0b;text-transform:uppercase;margin:10px 0 4px;">Today's Meetings</div>`;
    b.todaysMeetings.forEach(m => {
      html += `<div style="font-size:11px;color:#fcd34d;margin-bottom:3px;">&#128197; ${m.time || ''} — ${m.title} <span style="color:#94a3b8;">${m.prepSuggestion || ''}</span></div>`;
    });
  }

  html += `<div style="display:flex;gap:6px;margin-top:12px;">
    <div class="quick-chip" style="border-color:#10b981;color:#10b981;" onclick="acceptTriageOrder()">Accept triage order</div>
  </div>`;

  addChat("agent", html);

  // Auto-select top priority
  if (b.priorities?.length && b.priorities[0].actionId) {
    selectedId = b.priorities[0].actionId;
    renderContextBar();
    renderCurrentTab();
  }
}

function acceptTriageOrder() {
  if (!_briefingCache?.triageOrder?.length) return;
  const orderMap = new Map(_briefingCache.triageOrder.map((id, i) => [id, i]));
  ACTIONS.sort((a, b) => {
    const ai = orderMap.has(a.id) ? orderMap.get(a.id) : 9999;
    const bi = orderMap.has(b.id) ? orderMap.get(b.id) : 9999;
    return ai - bi;
  });
  renderCurrentTab();
  showToast('Triage order applied');
}

  // Biggest Wins
  if (eow.biggestWins?.length) {
    html += `<div style="font-size:11px;font-weight:700;color:#10b981;text-transform:uppercase;margin-bottom:4px;">Biggest Wins</div>`;
    eow.biggestWins.forEach(w => {
      html += `<div style="font-size:11px;color:#6ee7b7;margin-bottom:3px;">&#10003; <strong>${w.title}</strong>${w.value ? ` (${fmtK(w.value)})` : ''} — ${w.detail}</div>`;
    });
    html += `<div style="margin-bottom:10px;"></div>`;
  }

  // New Deals This Week
  if (eow.newDeals?.length) {
    html += `<div style="font-size:11px;font-weight:700;color:#22d3ee;text-transform:uppercase;margin-bottom:4px;">New Deals This Week</div>`;
    eow.newDeals.forEach(d => {
      html += `<div style="font-size:11px;color:#67e8f9;margin-bottom:3px;">+ <strong>${d.company}</strong> — ${d.stage}${d.amount ? ` (${fmtK(d.amount)})` : ''}</div>`;
    });
    html += `<div style="margin-bottom:10px;"></div>`;
  }

  // Stage Movements
  if (eow.stageMovements?.length) {
    html += `<div style="font-size:11px;font-weight:700;color:#60a5fa;text-transform:uppercase;margin-bottom:4px;">Stage Movements</div>`;
    eow.stageMovements.forEach(m => {
      const arrow = m.direction === 'forward' ? '→' : '←';
      const color = m.direction === 'forward' ? '#60a5fa' : '#f59e0b';
      html += `<div style="font-size:11px;color:#93c5fd;margin-bottom:3px;"><span style="color:${color};">${arrow}</span> <strong>${m.company}</strong>: ${m.from} → ${m.to}</div>`;
    });
    html += `<div style="margin-bottom:10px;"></div>`;
  }

  // Closed Won
  if (eow.closedWon?.length) {
    html += `<div style="font-size:11px;font-weight:700;color:#10b981;text-transform:uppercase;margin-bottom:4px;">Closed Won</div>`;
    eow.closedWon.forEach(d => {
      html += `<div style="font-size:11px;color:#6ee7b7;margin-bottom:3px;">&#127881; <strong>${d.company}</strong>${d.amount ? ` — ${fmtK(d.amount)}` : ''}</div>`;
    });
    html += `<div style="margin-bottom:10px;"></div>`;
  }

  // Closed Lost
  if (eow.closedLost?.length) {
    html += `<div style="font-size:11px;font-weight:700;color:#ef4444;text-transform:uppercase;margin-bottom:4px;">Closed Lost</div>`;
    eow.closedLost.forEach(d => {
      html += `<div style="font-size:11px;color:#fca5a5;margin-bottom:3px;">&#10005; <strong>${d.company}</strong>${d.amount ? ` — ${fmtK(d.amount)}` : ''}${d.reason ? ` (${d.reason})` : ''}</div>`;
    });
    html += `<div style="margin-bottom:10px;"></div>`;
  }

  // Stalled / Risky Deals
  if (eow.stalledDeals?.length) {
    html += `<div style="font-size:11px;font-weight:700;color:#f59e0b;text-transform:uppercase;margin-bottom:4px;">Stalled / Risky Deals</div>`;
    eow.stalledDeals.forEach(d => {
      html += `<div style="font-size:11px;color:#fcd34d;margin-bottom:3px;">&#9888; <strong>${d.company}</strong> — ${d.stage}${d.daysSinceActivity ? ` (${d.daysSinceActivity}d idle)` : ''} — ${d.risk}</div>`;
    });
    html += `<div style="margin-bottom:10px;"></div>`;
  }

  // CRM Hygiene
  if (eow.crmHygiene?.length) {
    html += `<div style="font-size:11px;font-weight:700;color:#a855f7;text-transform:uppercase;margin-bottom:4px;">CRM Hygiene Gaps</div>`;
    eow.crmHygiene.forEach(c => {
      html += `<div style="font-size:11px;color:#c084fc;margin-bottom:3px;">&#8226; <strong>${c.company}</strong> — ${c.issue}</div>`;
    });
    html += `<div style="margin-bottom:10px;"></div>`;
  }

  // Next Week Priorities
  if (eow.nextWeekPriorities?.length) {
    html += `<div style="font-size:11px;font-weight:700;color:#22d3ee;text-transform:uppercase;margin-bottom:6px;">Next Week Priorities</div>`;
    eow.nextWeekPriorities.forEach(p => {
      const color = urgColors[p.urgency] || '#64748b';
      html += `<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;cursor:pointer;" onclick="${p.actionId && p.actionId > 0 ? `selectItem(${p.actionId})` : ''}">
        <span style="font-size:14px;font-weight:800;color:${color};min-width:18px;">${p.rank}</span>
        <div>
          <div style="font-size:12px;font-weight:600;color:#fff;">${p.company} <span style="font-size:9px;padding:2px 5px;border-radius:3px;background:${color}20;color:${color};">${p.urgency}</span></div>
          <div style="font-size:11px;color:#94a3b8;line-height:1.3;">${p.reason}</div>
        </div>
      </div>`;
    });
  }

  // Recommendations
  if (eow.recommendations?.length) {
    html += `<div style="font-size:11px;font-weight:700;color:#f59e0b;text-transform:uppercase;margin:10px 0 6px;">Recommended Actions</div>`;
    eow.recommendations.forEach(r => {
      html += renderRecommendation(r);
    });
  }

  // Action buttons
  html += `<div style="display:flex;gap:6px;margin-top:12px;">
    <div class="quick-chip" style="border-color:#22d3ee;color:#22d3ee;" onclick="acceptNextWeekPlan()">Accept next week's plan</div>
    <div class="quick-chip" style="border-color:#334155;color:#94a3b8;" onclick="saveWeeklySnapshot()">Save weekly snapshot</div>
  </div>`;

  addChat("agent", html);
}

function acceptNextWeekPlan() {
  if (!_nextWeekPlanCache?.length) { showToast('No next week plan available'); return; }
  const orderMap = new Map(_nextWeekPlanCache.map((id, i) => [id, i]));
  ACTIONS.sort((a, b) => {
    const ai = orderMap.has(a.id) ? orderMap.get(a.id) : 9999;
    const bi = orderMap.has(b.id) ? orderMap.get(b.id) : 9999;
    return ai - bi;
  });
  renderCurrentTab();
  showToast('Next week\'s priority order applied');
}

function renderRecommendation(r) {
  const prioColors = { high: '#f59e0b', medium: '#60a5fa', low: '#94a3b8' };
  const color = prioColors[r.priority] || '#94a3b8';

  let chips = '';
  if (r.actionable && r.actionType) {
    const chipActions = {
      'open_crm_editor': { label: 'Open CRM', fn: r.targetId ? `showCrmEditor({id:${r.targetId},company:'${(r.targetCompany||'').replace(/'/g,"\\'")}',task:'',status:'open'})` : null },
      'preset_deal_stage': { label: r.actionPayload?.stage ? `Set ${r.actionPayload.stage}` : 'Set Stage', fn: r.targetId ? `showCrmEditor({id:${r.targetId},company:'${(r.targetCompany||'').replace(/'/g,"\\'")}',task:'',status:'open'},null,{presetStage:'${r.actionPayload?.stage || ''}'})` : null },
      'pull_email_thread': { label: 'Pull Emails', fn: `pullEmailThread('${(r.targetCompany||'').replace(/'/g,"\\'")}')` },
      'pull_call_notes': { label: 'Pull Notes', fn: r.targetCompany ? `fetchGranolaBySearch('${(r.targetCompany||'').replace(/'/g,"\\'")}')` : null },
      'draft_email_reply': { label: 'Draft Email', fn: r.targetId && r.targetId > 0 ? `selectItem(${r.targetId});setTimeout(()=>runAction('draft'),100)` : null },
      'draft_follow_up': { label: 'Draft Follow-up', fn: r.targetId && r.targetId > 0 ? `selectItem(${r.targetId});setTimeout(()=>runAction('draft'),100)` : null },
      'draft_proposal': { label: 'Draft Proposal', fn: r.targetId && r.targetId > 0 ? `selectItem(${r.targetId});setTimeout(()=>showProposalModal(ACTIONS.find(a=>a.id===${r.targetId})),100)` : null },
      'select_item': { label: 'Select', fn: r.targetId && r.targetId > 0 ? `selectItem(${r.targetId})` : null },
      'archive_item': { label: 'Archive', fn: r.targetId && r.targetId > 0 ? `archiveItem(${r.targetId})` : null },
      'accept_tomorrow_plan': { label: 'Accept Plan', fn: 'acceptTomorrowPlan()' },
      'accept_next_week_plan': { label: 'Accept Plan', fn: 'acceptNextWeekPlan()' },
    };

    const chipDef = chipActions[r.actionType];
    if (chipDef?.fn) {
      chips = `<div style="margin-top:4px;"><button onclick="${chipDef.fn}" style="font-size:10px;padding:3px 8px;border-radius:4px;background:rgba(96,165,250,0.12);color:#60a5fa;border:1px solid rgba(96,165,250,0.3);cursor:pointer;font-weight:600;">${chipDef.label}</button></div>`;
    }
  }

  return `<div style="background:#0a0e1a;border:1px solid #1e293b;border-radius:6px;padding:8px 10px;margin-bottom:6px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div style="font-size:12px;font-weight:600;color:#fff;">${r.title}</div>
      <span style="font-size:9px;padding:2px 5px;border-radius:3px;background:${color}20;color:${color};font-weight:700;flex-shrink:0;">${r.priority}</span>
    </div>
    <div style="font-size:11px;color:#94a3b8;margin-top:2px;">${r.reason}</div>
    ${r.targetCompany ? `<div style="font-size:10px;color:#64748b;margin-top:2px;">${r.targetCompany}</div>` : ''}
    ${chips}
  </div>`;
}
